<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>カレンダー画像作成&ダウンロード</title>
    <link rel="stylesheet" href="/statics/main-style.css" />
    <script type="module" src="/statics/main-script.js"></script>
    <style>
      html, body {
        height: 100%;
        width: 100%;
        overflow: scroll;
      }
      
      body {
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <nav id="breadcrumb"></nav>
    <h1>カレンダー画像</h1>
    <div>
      <h2>テンプレート</h2>
      <div id="template"></div>
    </div>
    <div>
      <h2>カスタム</h2>
      <a href="./custom">カスタムカレンダーを作成する</a>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image-more/3.5.0/dom-to-image-more.min.js"></script>
    <script type="module">
      import Calendar from "https://mathotagamma.github.io/APIs/Calendarer/1-01-01/Calendarer.js";
      const template = document.getElementById('template');
      
      async function main() {
        try {
          let calendar = new Calendar();
          console.log(Calendar.help);
          for(let i = 0; i < 3; i++) {
            /*await calendar.getInfo();
            calendar.render();
            await calendar.capture();
            const img = await calendar.getImg();*/
            
            const container = document.createElement('div');
            container.style.display = "flex";
            container.style.flexDirection = "column";
            container.style.float = "left";
            const head = document.createElement('div');
            head.style.textAlign = "center";
            
            const data = await calendar.run({
              render: {
                calendarFontFamily: "30cqmin cursive",
                holidayName: true
              },
              capture: {
                scale: 3
              }
            });
            const img = data.img;
            img.style.width = "200px";
            
            const clone = calendar.copy();
            container.onclick = () => clone.downloadImg();
            
            head.innerHTML = data.meta.year+'年'+data.meta.month+'月';
            
            container.appendChild(head);
            container.appendChild(img);
            template.appendChild(container);
            calendar.nextMonth();
          }
        } catch(error) {
          console.log(error);
        }
      }
          
      main();
    </script>
  </body>
</html>
