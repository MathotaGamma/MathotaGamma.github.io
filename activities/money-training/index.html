<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Money Training</title>
    <style>
     html, body {
       margin: 0;
       width: 100%;
       height: 100%;
       overflow: hidden;
     }
     
     body {
       background: black;
     }
     
     /*
       scriptで、screenのサイズを調整する。余白は黒に
     */
     .screen {
       /*background-image: url("");*/
       height: 100%;
       background-repeat: no-repeat;
       background-size: cover;
       background-position: center;
     }
     
     .talk-name {
       position: relative;
       left: 5px;
       font-size: 13px;
     }
     
     .talk-name::after {
       content: '';
       position: absolute;
       left: 50%;
       bottom: 0;
       /* talk-nameのleftに依存 */
       transform: translateX(calc(-50% - 5px));
       /* talk-containerのpaddingに依存 */
       width: calc(100% + 20px);
       height: 1px;
       background-color: #333;
     }
     
     .talk-container {
       position: absolute;
       left: 50%;
       bottom: 20px;
       transform: translate(-50%, 0);
       border: 3px solid #7fffd4;
       border-radius: 3px;
       background: rgba(240, 240, 240, 0.75);
       min-width: 70%;
       padding: 5px 20px;
     }
     
     .talk {
       
     }
    </style>
  </head>
  <body>
    <div id="screen" class="screen">
      <img id="indoor">
      <div class="talk-container">
        <div class="talk-name" id="talk-name">
          あなた
        </div>
        <div class="talk" id="talk">
          Talk
        </div>
      </div>
    </div>
    <script>
      const path = "https://lh3.googleusercontent.com/d/"
      const img = {
        indoor: {
          id: "1pxugzqZQJlzZYvLtg_Wb4E9F6X1JYaqE",
        },
        outdoor: {
          id: "1maeBS30Rldiz96GzQIyPvxyJ5IfPEagl",
        }
      }
      
      window.onload = () => {
        const screen = document.getElementById('screen');
        screen.style.backgroundImage = 'url("'+path + img.indoor.id+'")';
        /*window.onresize = () => {
          
        }*/
      }
    </script>
  </body>
</html>
