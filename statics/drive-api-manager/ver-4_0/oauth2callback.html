<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>OAuth Callback Processing...</title>
</head>
<body>
  <p style="font-family:sans-serif; text-align:center; margin-top:40px; color:#555;">
    認証を処理しています。このウィンドウは自動的に閉じます...
  </p>
  <script>
    const p = new URLSearchParams(location.search);
    // 安全に呼び出し元のウィンドウ(index.html)へ認証パラメータを送信
    window.opener?.postMessage(
      { 
        type: 'oauth_callback', 
        code: p.get('code'), 
        state: p.get('state'), 
        error: p.get('error') 
      },
      location.origin
    );
    // ポップアップを閉じる
    window.close();
  </script>
</body>
</html>
