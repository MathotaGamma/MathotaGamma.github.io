<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Group Chat</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── リセット ─────────────────────────────────────────── */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ── カラー変数 ───────────────────────────────────────── */
      :root {
        --bg:      #0c0c0c;
        --panel:   #111111;
        --border:  #1e1e1e;
        --accent:  #4af0c8;
        --muted:   #555555;
        --text:    #dddddd;
        --me-bg:   #002018;
        --sys-col: #444444;
      }

      /* ── ベース ───────────────────────────────────────────── */
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Mono', monospace;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── ロゴ ─────────────────────────────────────────────── */
      .logo {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 1.3rem;
        letter-spacing: 0.12em;
        color: var(--accent);
      }

      /* ── ステータスドット ─────────────────────────────────── */
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #333;
        flex-shrink: 0;
        display: inline-block;
      }

      .dot.spin { background: #e0a020; animation: blink 1s infinite; }
      .dot.ok   { background: var(--accent); }
      .dot.err  { background: #d04040; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.15; }
      }

      /* ── ボタン共通 ───────────────────────────────────────── */
      .btn {
        font-family: 'Syne', sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 0.6rem 1.2rem;
        border: none;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      .btn:hover:not(:disabled) { opacity: 0.8; }
      .btn:disabled { opacity: 0.3; cursor: default; }

      .btn-accent { background: var(--accent); color: #0c0c0c; }

      .btn-ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
        font-family: 'DM Mono', monospace;
        font-size: 0.65rem;
      }

      .btn-ghost:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
        opacity: 1;
      }


      /* ════════════════════════════════════════════════════════
         ロビー画面
         ════════════════════════════════════════════════════════ */
      #lobby {
        width: 100%;
        max-width: 400px;
        padding: 2.5rem 2rem;
        animation: slideUp 0.3s ease both;
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      #lobby .logo {
        margin-bottom: 2.5rem;
      }

      /* サーバー状態行 */
      .status-row {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        font-size: 0.73rem;
        color: var(--muted);
        margin-bottom: 1.8rem;
      }

      /* フォームフィールド */
      .field {
        margin-bottom: 1rem;
      }

      .field label {
        display: block;
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.4rem;
      }

      .field input {
        width: 100%;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: 'DM Mono', monospace;
        font-size: 0.85rem;
        padding: 0.6rem 0.85rem;
        outline: none;
        transition: border-color 0.15s;
      }

      .field input:focus      { border-color: var(--accent); }
      .field input::placeholder { color: var(--muted); }

      .btn-row {
        display: flex;
        gap: 0.5rem;
        margin-top: 1.2rem;
      }

      .btn-row .btn { flex: 1; }


      /* ════════════════════════════════════════════════════════
         チャット画面
         ════════════════════════════════════════════════════════ */
      #chat {
        display: none;
        flex-direction: column;
        width: 100%;
        max-width: 500px;
        height: 100dvh;
        max-height: 720px;
      }

      #chat.show { display: flex; }

      /* ヘッダー */
      .chat-header {
        padding: 0.8rem 1.1rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 0.8rem;
        flex-shrink: 0;
      }

      /* 自分のID表示 */
      .my-id-row {
        font-size: 0.65rem;
        color: var(--muted);
      }

      .my-id-value {
        color: var(--accent);
        font-size: 0.75rem;
        letter-spacing: 0.05em;
      }

      /* 招待ボタン群 */
      .invite-row {
        display: flex;
        gap: 0.4rem;
        margin-left: auto;
        align-items: center;
      }

      /* 接続人数バッジ */
      .member-badge {
        font-size: 0.68rem;
        color: var(--muted);
        white-space: nowrap;
      }

      .member-badge span { color: var(--accent); }

      /* 再接続バー */
      #reconnect-bar {
        display: none;
        background: #001a10;
        border-bottom: 1px solid #003020;
        padding: 0.5rem 1rem;
        font-size: 0.72rem;
        color: #20e0a0;
        align-items: center;
        gap: 0.6rem;
        flex-shrink: 0;
      }

      #reconnect-bar.show { display: flex; }

      #reconnect-bar button {
        margin-left: auto;
        background: none;
        border: 1px solid #003020;
        color: #20e0a0;
        font-family: 'DM Mono', monospace;
        font-size: 0.65rem;
        padding: 0.2rem 0.6rem;
        cursor: pointer;
      }

      /* メッセージ一覧 */
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 0.8rem;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      .messages::-webkit-scrollbar       { width: 3px; }
      .messages::-webkit-scrollbar-thumb { background: var(--border); }

      /* メッセージバブル */
      .msg-wrap {
        display: flex;
        flex-direction: column;
      }

      .msg-wrap.me  { align-items: flex-end; }
      .msg-wrap.sys { align-items: center; }

      .msg-bubble {
        max-width: 75%;
        padding: 0.5rem 0.8rem;
        font-size: 0.82rem;
        line-height: 1.5;
        word-break: break-word;
      }

      .me   .msg-bubble { background: var(--me-bg); color: var(--accent); }
      .them .msg-bubble { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
      .sys  .msg-bubble { background: transparent; color: var(--sys-col); font-size: 0.68rem; font-style: italic; }

      .msg-meta {
        font-size: 0.6rem;
        color: var(--muted);
        margin-top: 0.15rem;
        padding: 0 0.2rem;
      }

      /* 入力欄 */
      .input-row {
        display: flex;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }

      #msg-input {
        flex: 1;
        background: var(--panel);
        border: none;
        color: var(--text);
        font-family: 'DM Mono', monospace;
        font-size: 0.85rem;
        padding: 0.85rem 1rem;
        outline: none;
      }

      #msg-input::placeholder { color: var(--muted); }

      #send-btn {
        background: var(--accent);
        color: #0c0c0c;
        border: none;
        font-family: 'Syne', sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        padding: 0 1.2rem;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      #send-btn:hover:not(:disabled) { opacity: 0.8; }
      #send-btn:disabled { opacity: 0.3; cursor: default; }
    </style>
  </head>
  <body>

    <!-- ════════════════════════════════════════════════════════
         ロビー画面
         ════════════════════════════════════════════════════════ -->
    <div id="lobby">
      <div class="logo">GROUP CHAT</div>

      <!-- サーバー状態 -->
      <div class="status-row">
        <span class="dot spin" id="dot"></span>
        <span id="st-txt">サーバー起動中…</span>
      </div>

      <!-- Room ID入力 -->
      <div class="field">
        <label>Room ID（空欄で新規作成）</label>
        <input
          id="room-input"
          placeholder="招待リンクのRoom IDを入力して参加"
          autocomplete="off"
        />
      </div>

      <div class="btn-row">
        <button class="btn btn-accent" id="start-btn" disabled>入室</button>
      </div>
    </div>


    <!-- ════════════════════════════════════════════════════════
         チャット画面
         ════════════════════════════════════════════════════════ -->
    <div id="chat">

      <!-- ヘッダー -->
      <div class="chat-header">
        <div>
          <div class="logo" style="font-size:0.95rem; margin-bottom:0.2rem;">GROUP CHAT</div>
          <div class="my-id-row">
            あなたのID: <span class="my-id-value" id="my-id-display">—</span>
          </div>
        </div>

        <!-- 招待ボタン -->
        <div class="invite-row">
          <button class="btn btn-ghost" id="copy-link-btn">🔗 招待リンク</button>
          <button class="btn btn-ghost" id="copy-id-btn">ID コピー</button>
        </div>

        <!-- 接続人数 -->
        <div class="member-badge">
          <span id="member-count">1</span>人
        </div>
      </div>

      <!-- 再接続バー -->
      <div id="reconnect-bar">
        <span id="reconn-txt">切断されました。再接続中…</span>
        <button id="back-btn">待機画面に戻る</button>
      </div>

      <!-- メッセージ一覧 -->
      <div class="messages" id="messages"></div>

      <!-- 入力欄 -->
      <div class="input-row">
        <input
          id="msg-input"
          placeholder="メッセージを入力…"
          autocomplete="off"
        />
        <button id="send-btn" disabled>SEND</button>
      </div>
    </div>


    <!-- ════════════════════════════════════════════════════════
         スクリプト
         ════════════════════════════════════════════════════════ -->
    <script src="statics/communication/manager.js"></script>
    <script>
      // ── 設定 ───────────────────────────────────────────────
      const SIGNALING_BASE = "wss://signaling-server-dman.onrender.com";
      const WAKE_URL       = "https://signaling-server-dman.onrender.com/";
      const MAX_RETRY      = 8;
      const RETRY_DELAY_MS = 3000;

      // ── DOM参照 ────────────────────────────────────────────
      const $dot          = document.getElementById("dot");
      const $stTxt        = document.getElementById("st-txt");
      const $roomInput    = document.getElementById("room-input");
      const $startBtn     = document.getElementById("start-btn");
      const $lobby        = document.getElementById("lobby");
      const $chat         = document.getElementById("chat");
      const $myIdDisplay  = document.getElementById("my-id-display");
      const $copyLinkBtn  = document.getElementById("copy-link-btn");
      const $copyIdBtn    = document.getElementById("copy-id-btn");
      const $memberCount  = document.getElementById("member-count");
      const $reconnectBar = document.getElementById("reconnect-bar");
      const $reconnTxt    = document.getElementById("reconn-txt");
      const $backBtn      = document.getElementById("back-btn");
      const $messages     = document.getElementById("messages");
      const $msgInput     = document.getElementById("msg-input");
      const $sendBtn      = document.getElementById("send-btn");

      // ── 状態変数 ───────────────────────────────────────────
      let group       = null;
      let currentRoom = "";
      let retries     = 0;
      let stopping    = false;  // 「待機画面に戻る」押下フラグ

      // ── URLパラメータからRoom IDを自動入力 ────────────────
      const params = new URLSearchParams(location.search);
      const paramRoom = params.get("room");
      if (paramRoom) {
        $roomInput.value = paramRoom;
      }

      // ── ユーティリティ ─────────────────────────────────────

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function nowStr() {
        return new Date().toLocaleTimeString("ja-JP", {
          hour:   "2-digit",
          minute: "2-digit",
        });
      }

      function addMsg(text, side, meta = "") {
        const wrap = document.createElement("div");
        wrap.className = `msg-wrap ${side}`;
        wrap.innerHTML = `
          <div class="msg-bubble">${escHtml(text)}</div>
          ${meta ? `<div class="msg-meta">${meta}</div>` : ""}
        `;
        $messages.appendChild(wrap);
        $messages.scrollTop = $messages.scrollHeight;
      }

      function addSys(text) {
        addMsg(text, "sys");
      }

      function updateMemberCount() {
        // 自分 + 接続中のpeer数
        const count = group ? group.members.length + 1 : 1;
        $memberCount.textContent = count;
      }

      // ── Renderウォームアップ ───────────────────────────────
      async function wakeServer() {
        const startTime = Date.now();

        while (Date.now() - startTime < 60000) {
          try {
            const res = await fetch(WAKE_URL, { cache: "no-store" });
            if (res.ok) return true;
          } catch (_) {
            // サーバーまだ起動中
          }

          const elapsed = Math.round((Date.now() - startTime) / 1000);
          $stTxt.textContent = `サーバー起動中… ${elapsed}s`;
          await new Promise(r => setTimeout(r, 3000));
        }

        return false;
      }

      // ── Group接続開始 ──────────────────────────────────────
      function startGroup(roomId) {
        if (stopping) return;

        group = new Group(`${SIGNALING_BASE}/ws/${roomId}`);

        // IDはnew Group()の時点で確定しているので即表示
        $myIdDisplay.textContent = group.id.slice(0, 8);

        // 招待ボタンも即座に設定（readyを待たない）
        $copyLinkBtn.onclick = () => {
          const url = `${location.origin}${location.pathname}?room=${roomId}`;
          navigator.clipboard.writeText(url);
          $copyLinkBtn.textContent = "✓ コピー済み";
          setTimeout(() => { $copyLinkBtn.textContent = "🔗 招待リンク"; }, 1800);
        };

        $copyIdBtn.onclick = () => {
          navigator.clipboard.writeText(roomId);
          $copyIdBtn.textContent = "✓ コピー済み";
          setTimeout(() => { $copyIdBtn.textContent = "ID コピー"; }, 1500);
        };

        // ─ 入室完了（WSが繋がった） ─
        group.on("ready", () => {
          retries = 0;
          $reconnectBar.classList.remove("show");
          $sendBtn.disabled = false;
          updateMemberCount();
          addSys(`入室しました — Room: ${roomId}`);
          $msgInput.focus();
        });

        // ─ 新メンバー参加 ─
        group.on("join", (peerId) => {
          updateMemberCount();
          addSys(`${peerId.slice(0, 8)} が参加しました（${group.members.length + 1}人）`);
        });

        // ─ メンバー退出 ─
        group.on("leave", (peerId) => {
          updateMemberCount();
          addSys(`${peerId.slice(0, 8)} が退出しました（${group.members.length + 1}人）`);

          // 自分一人になったらホームに戻す
          if (group.members.length === 0) {
            addSys("全員退出しました。ホームに戻ります…");
            setTimeout(() => goHome(), 2000);
          }
        });

        // ─ メッセージ受信 ─
        group.on("data", (peerId, msg) => {
          const text = typeof msg === "string" ? msg : JSON.stringify(msg);
          addMsg(text, "them", `${peerId.slice(0, 8)} · ${nowStr()}`);
        });

        // ─ エラー ─
        group.on("error", (e) => {
          addSys(`エラー: ${e?.message ?? e}`);
        });

        // ─ シグナリングWS切断 → 再接続 ─
        group._sig.on("close", () => {
          if (stopping) return;

          $sendBtn.disabled = true;
          retries++;

          if (retries > MAX_RETRY) {
            $reconnTxt.textContent = "再接続に失敗しました";
            $reconnectBar.classList.add("show");
            return;
          }

          $reconnTxt.textContent = `シグナリング切断。再接続中… (${retries}/${MAX_RETRY})`;
          $reconnectBar.classList.add("show");
          addSys("接続が切断されました。再接続中…");

          setTimeout(() => startGroup(roomId), RETRY_DELAY_MS);
        });
      }

      // ── ホームへ戻る ───────────────────────────────────────
      function goHome() {
        stopping = true;
        group?.close();
        group = null;

        $chat.classList.remove("show");
        $lobby.style.display = "";
        $reconnectBar.classList.remove("show");
        $messages.innerHTML = "";
        $sendBtn.disabled = true;
        $memberCount.textContent = "1";
        $myIdDisplay.textContent = "—";

        // URLからroomパラメータを除去
        history.replaceState(null, "", location.pathname);
        $roomInput.value = "";

        stopping = false;
        retries  = 0;
      }

      // ── メッセージ送信 ─────────────────────────────────────
      function sendMsg() {
        const text = $msgInput.value.trim();
        if (!text) return;

        try {
          group.broadcast(text);
          addMsg(text, "me", nowStr());
          $msgInput.value = "";
        } catch (e) {
          addSys(`送信失敗: ${e.message}`);
        }
      }

      // ── イベントリスナー ───────────────────────────────────

      $sendBtn.addEventListener("click", sendMsg);

      $msgInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMsg();
        }
      });

      $backBtn.addEventListener("click", goHome);

      $startBtn.addEventListener("click", () => {
        let roomId = $roomInput.value.trim();

        // Room IDが空なら新規作成
        if (!roomId) {
          roomId = crypto.randomUUID().slice(0, 8);
        }

        currentRoom = roomId;

        // ロビー → チャット切り替え
        $lobby.style.display = "none";
        $chat.classList.add("show");

        startGroup(roomId);
      });

      // ── 起動: サーバー起動待ち → ボタン有効化 ─────────────
      (async () => {
        const ok = await wakeServer();

        if (!ok) {
          $dot.className    = "dot err";
          $stTxt.textContent = "サーバー起動タイムアウト";
          return;
        }

        $dot.className    = "dot ok";
        $stTxt.textContent = "サーバー接続完了";
        $startBtn.disabled = false;

        // URLにroom指定があれば自動入室
        if (paramRoom) {
          $roomInput.value = paramRoom;
          $startBtn.click();
        }
      })();
    </script>
  </body>
</html>
