<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <title>無題.md — Markdown Editor</title>

    <!-- 【オフライン対応】ホーム画面追加時に単独アプリとして起動させるための設定 -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
    <link rel="icon" href="./icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MD Editor">
    <meta name="theme-color" content="#1a1715">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">

    <style>
              /* ==================================================
                 デザイントークン
                 「暗いグラファイトの机の上に、クリーム色の原稿(プレビュー)が乗っている」
                 ================================================== */
              :root {
                --color-canvas: #1a1715;
                --color-surface: #221e1a;
                --color-surface-2: #2b2620;
                --color-border: #3a332c;
                --color-ink: #ece5d8;
                --color-ink-muted: #a89c8c;
                --color-brass: #c89a4a;
                --color-brass-strong: #e0b563;
                --color-teal: #6fa3a8;
                --color-paper: #f1e9d8;
                --color-paper-ink: #2a2520;
                --color-paper-muted: #6b6055;
                --color-danger: #c1604a;
                --color-warning: #d2a23f;
                --color-success: #7a9f6a;

                --font-ui: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
                --font-mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, 'Hiragino Sans', monospace;
                --font-serif: 'IBM Plex Serif', Georgia, 'Hiragino Mincho ProN', 'Yu Mincho', serif;

                --radius-sm: 4px;
                --radius-md: 8px;
              }

              * { box-sizing: border-box; }
              html, body { height: 100%; margin: 0; }
              body {
                font-family: var(--font-ui);
                background: var(--color-canvas);
                color: var(--color-ink);
              }
              button, input, select { font: inherit; }

              #app {
                display: flex;
                flex-direction: column;
                height: 100vh;
              }
              @supports (height: 100dvh) {
                #app { height: 100dvh; }
              }

              /* ===== ヘッダー / ツールバー ===== */
              .toolbar {
                flex: 0 0 auto;
                background: var(--color-surface);
                border-bottom: 2px solid var(--color-brass);
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 16px;
                flex-wrap: wrap;
              }
              .brandMark {
                font-family: var(--font-serif);
                font-style: italic;
                font-size: 15px;
                color: var(--color-brass-strong);
                margin-right: 6px;
                white-space: nowrap;
              }
              .toolbarGroup {
                display: flex;
                gap: 6px;
                align-items: center;
              }
              .toolbarDivider {
                width: 1px;
                height: 22px;
                background: var(--color-border);
              }
              .copyTriggerInput {
                font-size: 13px;
                background: transparent;
                color: var(--color-ink);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-sm);
                padding: 6px 10px;
                width: 130px;
                touch-action: manipulation;
              }
              .copyTriggerInput:focus {
                outline: none;
                border-color: var(--color-brass);
              }
              .fileLabel {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 13px;
                font-weight: 500;
                color: var(--color-ink);
                margin-right: 4px;
                white-space: nowrap;
                max-width: 220px;
                overflow: hidden;
                text-overflow: ellipsis;
              }
              .dirtyDot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--color-brass);
                opacity: 0;
                transition: opacity 0.15s ease;
                flex: 0 0 auto;
              }
              .dirtyDot.visible { opacity: 1; }

              .toolbar button {
                font-size: 13px;
                background: transparent;
                color: var(--color-ink);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-sm);
                padding: 6px 12px;
                cursor: pointer;
                transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
                white-space: nowrap;
                /* 【タップ反応性修正】iPad Safariでダブルタップ判定待ちによりタップが
                   取りこぼされることがあるため、ボタンは即座にタップ確定させる */
                touch-action: manipulation;
              }
              .toolbar button:hover { background: var(--color-surface-2); border-color: var(--color-ink-muted); }
              .toolbar button:disabled { opacity: 0.45; cursor: not-allowed; }
              .toolbar button.primary {
                background: var(--color-brass);
                border-color: var(--color-brass);
                color: #241c0f;
                font-weight: 600;
              }
              .toolbar button.primary:hover { background: var(--color-brass-strong); border-color: var(--color-brass-strong); }

              .segmented {
                display: inline-flex;
                border: 1px solid var(--color-border);
                border-radius: var(--radius-md);
                overflow: hidden;
              }
              .segmented button {
                background: transparent;
                border: none;
                border-radius: 0;
                color: var(--color-ink-muted);
                padding: 6px 12px;
                font-size: 13px;
                cursor: pointer;
                transition: background-color 0.15s ease, color 0.15s ease;
              }
              .segmented button + button { border-left: 1px solid var(--color-border); }
              .segmented button.active { background: var(--color-brass); color: var(--color-canvas); font-weight: 600; }
              .segmented button:hover:not(.active) { background: var(--color-surface-2); color: var(--color-ink); }

              .authStatus {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 12px;
                color: var(--color-ink-muted);
                margin-left: auto;
                white-space: nowrap;
              }
              .authStatus .dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: var(--color-ink-muted);
                flex: 0 0 auto;
              }
              .authStatus.online .dot { background: var(--color-success); }

              /* ===== ワークスペース(エディタ/プレビュー) ===== */
              #workspace {
                flex: 1 1 auto;
                display: flex;
                min-height: 0;
                overflow: hidden;
              }
              #editorPane, #previewPane {
                flex: 1 1 50%;
                min-width: 0;
                overflow: hidden;
                display: flex;
                flex-direction: column;
              }
              #editorPane { background: var(--color-canvas); }

              /* 【背景追従修正】flexコンテナにして子要素の高さが正しく伸びるようにする */
              #previewPane {
                background: var(--color-canvas);
                overflow-y: auto;
                padding: 32px 24px;
                display: flex;
                flex-direction: column;
              }
              #workspace.mode-edit #previewPane,
              #workspace.mode-preview #editorPane { display: none; }
              #workspace.mode-edit #editorPane,
              #workspace.mode-preview #previewPane { flex: 1 1 100%; }
              #workspace.mode-split #editorPane { border-right: 1px solid var(--color-border); }

              #editor {
                flex: 1 1 auto;
                width: 100%;
                height: 100%;
                resize: none;
                border: none;
                outline: none;
                background: var(--color-canvas);
                color: var(--color-ink);
                font-family: var(--font-mono);
                font-size: 14px;
                line-height: 1.6;
                padding: 16px;
              }
              #editorPane .CodeMirror {
                flex: 1 1 auto;
                height: 100%;
              }

              /* CodeMirror 独自テーマ: deskmono */
              .cm-s-deskmono.CodeMirror {
                background: var(--color-canvas);
                color: var(--color-ink);
                font-family: var(--font-mono);
                font-size: 14px;
                line-height: 1.6;
              }
              .cm-s-deskmono .CodeMirror-gutters { background: var(--color-canvas); border-right: 1px solid var(--color-border); }
              .cm-s-deskmono .CodeMirror-linenumber { color: var(--color-ink-muted); }
              .cm-s-deskmono .CodeMirror-cursor { border-left: 2px solid var(--color-brass); }
              .cm-s-deskmono div.CodeMirror-selected { background: rgba(200, 154, 74, 0.22); }
              .cm-s-deskmono .cm-header { color: var(--color-brass-strong); font-weight: 600; }
              .cm-s-deskmono .cm-strong { color: var(--color-ink); font-weight: 700; }
              .cm-s-deskmono .cm-em { color: var(--color-teal); font-style: italic; }
              .cm-s-deskmono .cm-link { color: var(--color-teal); }
              .cm-s-deskmono .cm-url { color: var(--color-ink-muted); }
              .cm-s-deskmono .cm-quote { color: var(--color-ink-muted); font-style: italic; }
              .cm-s-deskmono .cm-comment { color: var(--color-ink-muted); }
              .cm-s-deskmono .cm-variable-2 { color: var(--color-brass); }
              .cm-s-deskmono .cm-keyword { color: var(--color-teal); }
              .cm-s-deskmono .cm-string { color: #b5c98a; }
              .cm-s-deskmono .cm-atom { color: var(--color-brass); }
              .cm-s-deskmono .cm-tag { color: var(--color-brass-strong); }
              .cm-s-deskmono .cm-attribute { color: var(--color-teal); }

              /* ===== プレビュー(原稿カード) ===== */
              /* 【背景追従修正】flex-grow: 1 と flex-shrink: 0 を使用し、コンテンツ量に関わらず底まで伸ばす */
              #previewInner {
                max-width: 720px;
                width: 100%;
                margin: 0 auto;
                background: var(--color-paper);
                color: var(--color-paper-ink);
                font-family: var(--font-serif);
                font-size: 16px;
                line-height: 1.8;
                padding: 48px 56px;
                border-radius: var(--radius-md);
                box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
                
                flex-grow: 1;
                flex-shrink: 0;
                display: flow-root;
              }
              #previewInner h1, #previewInner h2, #previewInner h3, #previewInner h4 {
                font-weight: 600;
                line-height: 1.3;
                margin-top: 1.4em;
              }
              #previewInner h1 { font-size: 2em; border-bottom: 2px solid var(--color-brass); padding-bottom: 0.3em; }
              #previewInner h2 { font-size: 1.5em; border-bottom: 1px solid rgba(40, 35, 30, 0.15); padding-bottom: 0.25em; }
              #previewInner a { color: var(--color-teal); text-decoration: underline; }
              #previewInner blockquote {
                margin: 1em 0;
                padding: 0.2em 1.2em;
                border-left: 3px solid var(--color-brass);
                color: var(--color-paper-muted);
                font-style: italic;
              }
              #previewInner pre {
                background: var(--color-canvas);
                color: var(--color-ink);
                font-family: var(--font-mono);
                font-size: 0.85em;
                padding: 16px;
                border-radius: var(--radius-sm);
                overflow-x: auto;
              }
              #previewInner code {
                font-family: var(--font-mono);
                background: rgba(40, 35, 30, 0.08);
                padding: 0.1em 0.4em;
                border-radius: 3px;
                font-size: 0.9em;
              }
              #previewInner pre code { background: none; padding: 0; }
              #previewInner table { border-collapse: collapse; width: 100%; margin: 1.2em 0; }
              #previewInner th, #previewInner td { border: 1px solid rgba(40, 35, 30, 0.18); padding: 0.5em 0.8em; text-align: left; }
              #previewInner th { background: rgba(40, 35, 30, 0.06); }
              #previewInner img { max-width: 100%; border-radius: 4px; }
              #previewInner hr { border: none; border-top: 1px solid rgba(40, 35, 30, 0.18); margin: 2em 0; }
              #previewInner ul, #previewInner ol { padding-left: 1.4em; }
              #previewInner li { margin: 0.3em 0; }

              /* ===== LaTeX数式 (KaTeX) ===== */
              #previewInner .katex-display {
                margin: 1em 0;
                overflow-x: auto;
                overflow-y: hidden;
                padding-bottom: 4px;
              }
              #previewInner .katex { font-size: 1.05em; }
              #previewInner .katex-error {
                color: var(--color-danger);
                font-family: var(--font-mono);
                font-size: 0.9em;
              }

              /* ===== 図表 (Mermaid フローチャート等) ===== */
              #previewInner .mermaid {
                display: flex;
                justify-content: center;
                margin: 1.2em 0;
                overflow-x: auto;
                background: transparent;
              }
              #previewInner .mermaid svg { max-width: 100%; height: auto; }
              #previewInner .mermaid-error {
                color: var(--color-danger);
                font-family: var(--font-mono);
                font-size: 0.85em;
                white-space: pre-wrap;
                background: rgba(193, 96, 74, 0.08);
                border: 1px solid rgba(193, 96, 74, 0.35);
                border-radius: var(--radius-sm);
                padding: 12px 14px;
                margin: 1.2em 0;
              }

              /* ===== コンソール ===== */
              #consolePanel {
                flex: 0 0 auto;
                background: #100f0d;
                border-top: 1px solid var(--color-border);
                display: flex;
                flex-direction: column;
                max-height: 220px;
              }
              /* 【初期化修正】初期状態で閉じるためのクラス定義 */
              #consolePanel.collapsed #consoleBody { display: none; }
              
              #consoleHeader {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 6px 14px;
                font-size: 12px;
                color: var(--color-ink-muted);
                letter-spacing: 0.04em;
                border-bottom: 1px solid var(--color-border);
                flex: 0 0 auto;
              }
              .consoleControls { display: flex; gap: 6px; }
              .consoleControls button {
                background: transparent;
                border: 1px solid var(--color-border);
                color: var(--color-ink-muted);
                border-radius: var(--radius-sm);
                font-size: 11px;
                padding: 2px 9px;
                cursor: pointer;
              }
              .consoleControls button:hover { color: var(--color-ink); border-color: var(--color-ink-muted); }
              #consoleBody {
                flex: 1 1 auto;
                overflow-y: auto;
                font-family: var(--font-mono);
                font-size: 12px;
                padding: 8px 14px;
              }
              .log-entry { display: flex; gap: 10px; padding: 2px 0; }
              .log-time { color: var(--color-brass); opacity: 0.75; flex: 0 0 auto; }
              .log-message { white-space: pre-wrap; word-break: break-word; }
              .log-info .log-message { color: var(--color-ink-muted); }
              .log-warn .log-message { color: var(--color-warning); }
              .log-error .log-message { color: var(--color-danger); }

              /* ===== モーダル ===== */
              .modalOverlay {
                position: fixed;
                inset: 0;
                background: rgba(10, 9, 8, 0.65);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 50;
                padding: 16px;
              }
              .modalOverlay.hidden { display: none; }
              .modalBox {
                background: var(--color-surface-2);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-md);
                padding: 24px;
                width: min(440px, 100%);
                display: flex;
                flex-direction: column;
                gap: 14px;
              }
              .modalBox h2 { font-size: 16px; color: var(--color-ink); margin: 0; }
              .modalBox label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--color-ink-muted); }
              .modalBox input, .modalBox select {
                font-family: var(--font-mono);
                font-size: 13px;
                background: var(--color-canvas);
                color: var(--color-ink);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-sm);
                padding: 8px 10px;
              }
              .modalBox .hint { font-size: 11px; color: var(--color-ink-muted); line-height: 1.5; margin: 0; }
              .modalButtons { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }
              .modalButtons button {
                font-size: 13px;
                padding: 7px 14px;
                border-radius: var(--radius-sm);
                border: 1px solid var(--color-border);
                background: transparent;
                color: var(--color-ink);
                cursor: pointer;
              }
              .modalButtons button.primary { background: var(--color-brass); border-color: var(--color-brass); color: #241c0f; font-weight: 600; }

              :focus-visible { outline: 2px solid var(--color-brass); outline-offset: 2px; }

              @media (prefers-reduced-motion: reduce) {
                * { transition: none !important; }
              }

              @media (max-width: 760px) {
                .toolbar { padding: 8px 10px; gap: 8px; }
                .toolbar button { font-size: 12px; padding: 5px 9px; }
                #previewInner { padding: 28px 20px; }
                #consolePanel { max-height: 160px; }
                .brandMark { display: none; }
                .fileLabel { max-width: 120px; }
              }
    </style>
  </head>
  <body>

    <div id="app">

      <header class="toolbar">
        <span class="brandMark">Markdown Editor</span>

        <span class="fileLabel">
          <span id="fileNameLabel">無題.md</span>
          <span id="dirtyDot" class="dirtyDot"></span>
        </span>

        <div class="toolbarDivider"></div>

        <div class="toolbarGroup">
          <button id="newBtn" type="button">新規</button>
          <button id="openDriveBtn" type="button">Driveから開く</button>
          <button id="openLocalBtn" type="button">ローカルを開く</button>
        </div>

        <div class="toolbarDivider"></div>

        <div class="toolbarGroup">
          <button id="undoBtn" type="button" title="元に戻す (Ctrl+Z)">↶ 元に戻す</button>
          <button id="redoBtn" type="button" title="やり直す (Ctrl+Shift+Z)">↷ やり直す</button>
        </div>

        <div class="toolbarDivider"></div>

        <div class="toolbarGroup">
          <button id="saveBtn" type="button" class="primary">保存</button>
          <button id="saveAsBtn" type="button">名前を付けて保存</button>
          <button id="downloadBtn" type="button">ダウンロード</button>
        </div>

        <div class="toolbarDivider"></div>

        <div class="toolbarGroup">
          <button id="copyAllBtn" type="button" title="本文全体をクリップボードにコピー">全文コピー</button>
          <input id="copyTriggerInput" type="text" class="copyTriggerInput" placeholder="「copy」で全文コピー" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
        </div>

        <div class="toolbarDivider"></div>

        <div class="toolbarGroup segmented" role="group" aria-label="表示モード">
          <button type="button" data-mode="edit">編集</button>
          <button type="button" data-mode="split">分割</button>
          <button type="button" data-mode="preview">プレビュー</button>
        </div>

        <button id="newTabBtn" type="button">新規タブで表示</button>

        <span class="authStatus" id="authStatus">
          <span class="dot"></span>
          <span id="authStatusText">未設定</span>
        </span>

        <div class="toolbarGroup">
          <button id="authBtn" type="button" disabled>ログイン</button>
          <button id="settingsBtn" type="button">設定</button>
        </div>
      </header>

      <main id="workspace" class="mode-split">
        <section id="editorPane">
          <textarea id="editor" spellcheck="false" autocapitalize="off" autocomplete="off"></textarea>
        </section>
        <section id="previewPane">
          <article id="previewInner"></article>
        </section>
      </main>

      <footer id="consolePanel" class="collapsed">
        <div id="consoleHeader">
          <span>コンソール</span>
          <div class="consoleControls">
            <button id="consoleClearBtn" type="button">消去</button>
            <button id="consoleToggleBtn" type="button">▴</button>
          </div>
        </div>
        <div id="consoleBody"></div>
      </footer>

    </div>

    <input type="file" id="localFileInput" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden>

    <div id="settingsModal" class="modalOverlay hidden">
      <div class="modalBox">
        <h2>Drive連携設定</h2>
        <label>Client ID
          <input type="text" id="settingClientId" placeholder="xxxxx.apps.googleusercontent.com">
        </label>
        <label>Redirect URI
          <input type="text" id="settingRedirectUri" placeholder="https://example.com/oauth-redirect.html">
        </label>
        <label>アクセス範囲(space)
          <select id="settingSpace">
            <option value="file">file — Driveから開く/新規作成したファイルのみ</option>
            <option value="drive">drive — マイドライブ全体</option>
            <option value="appdata">appdata — 専用の隠しフォルダのみ</option>
          </select>
        </label>
        <p class="hint">Redirect URIには、認証結果(アクセストークン)をlocalStorageの「oauth_result」に保存してウィンドウを閉じる、中継用ページのURLを指定してください。</p>
        <div class="modalButtons">
          <button id="settingsCancelBtn" type="button">キャンセル</button>
          <button id="settingsSaveBtn" type="button" class="primary">保存して適用</button>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/overlay.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js" crossorigin="anonymous"></script>

      /* ==================================================

      const MAX_LOG_ENTRIES = 500;

      function log(level, message) {
        const time = new Date().toLocaleTimeString('ja-JP', { hour12: false });
        const text = message instanceof Error ? message.message : String(message);

        const entry = document.createElement('div');
        entry.className = `log-entry log-${level}`;

        const timeSpan = document.createElement('span');
        timeSpan.className = 'log-time';
        timeSpan.textContent = time;

        const msgSpan = document.createElement('span');
        msgSpan.className = 'log-message';
        msgSpan.textContent = text;

        entry.appendChild(timeSpan);
        entry.appendChild(msgSpan);
        consoleBodyEl.appendChild(entry);

        while (consoleBodyEl.children.length > MAX_LOG_ENTRIES) {
          consoleBodyEl.removeChild(consoleBodyEl.firstChild);
        }
        consoleBodyEl.scrollTop = consoleBodyEl.scrollHeight;

        const nativeFn = level === 'error' ? console.error : level === 'warn' ? console.warn : console.log;
        nativeFn.call(console, `[${time}] ${text}`);
      }

      window.addEventListener('error', (event) => {

      /* ==================================================
      編集履歴データの保存/復元 (localStorage)
      【パフォーマンス修正】以前は本文+Undo/Redo履歴をキー入力のたびに
      まとめてJSON.stringifyしていたが、履歴データはドキュメントが育つと
      肥大化し、その同期保存がちょうど「入力が止まった直後(=ボタンに

      そのため、
        - 本文(buffer)  : 変更のたびに軽量な内容だけを短い間隔で保存

      const HISTORY_KEY = `${DRAFT_KEY}:history`;
      let historyDirty = false;

      function saveDraftToStorage() {

            savedAt: Date.now()
          };
          localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
        } catch (e) {
          log('warn', `編集内容の自動保存に失敗しました: ${e.message}`);
        }
      }

      function scheduleDraftSave() {

        draftSaveTimer = setTimeout(saveDraftToStorage, 800);

      // Undo/Redo履歴のみを保存する(呼び出し頻度は低く保つこと)

            log('warn', '編集履歴が大きすぎるため、Undo/Redo履歴の保存を省略しました。');
          } else {
            log('warn', `編集履歴の保存に失敗しました: ${e.message}`);
          }
        }
      }

      function loadDraftFromStorage() {
        try {
          const raw = localStorage.getItem(DRAFT_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch (e) {
          log('warn', `保存された編集内容の読み込みに失敗しました: ${e.message}`);
          return null;
        }
      }

      function loadHistoryFromStorage() {
        try {
          const raw = localStorage.getItem(HISTORY_KEY);
          return raw ? JSON.parse(raw).history : null;
        } catch (e) {
          return null;
        }
      }

      function clearDraftStorage() {

      /* ==================================================
      Markdownレンダラー共通設定
      【HTMLタグ誤認識修正】CommonMarkの仕様では、コードフェンスの外に書いた
      生のHTMLタグ(例: 文章中の <div> や、フェンスなしで行頭に書いたタグ)は
      「生のHTMLとして」そのまま出力に埋め込まれる。このアプリは書いた文字を
      そのまま見せる用途のため、html/tag系のトークナイザを無効化し、
      本文中のタグ記法は常にエスケープして「文字」として表示させる。
      (```コードフェンス内は元々marked自身がエスケープするため影響なし)
      ================================================== */

      function escapeHtml(text) {
        return String(text ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function configureMarked() {
        if (typeof marked === 'undefined') return;
        marked.setOptions({ gfm: true, breaks: true });

        const renderer = new marked.Renderer();
        // フェンス付きコードブロック: ```mermaid``` はダイアグラム描画用のdivに、
        // それ以外は通常どおりエスケープしたコードとして出力する
        renderer.code = (code, infostring) => {
          const lang = (infostring || '').trim().split(/\s+/)[0].toLowerCase();
          if (lang === 'mermaid') {
            return `<div class="mermaid">${escapeHtml(code)}</div>\n`;
          }
          const langClass = lang ? ` class="language-${escapeHtml(lang)}"` : '';
          return `<pre><code${langClass}>${escapeHtml(code)}</code></pre>\n`;
        };

        marked.use({
          renderer,
          tokenizer: {
            // 生のHTMLブロック/インラインタグを無効化し、通常のテキストとして扱わせる
            html() { return undefined; },
            tag() { return undefined; }
          }
        });
      }

      /* ==================================================
      プレビュー / LaTeX (KaTeX) / Mermaid(フローチャート等) 対応
      ブロック数式: $$...$$ / \[...\]  インライン数式: $...$ / \(...\)
      Markdownパーサーが数式中の "_" や "*" を誤って強調記法として解釈しないよう、
      先に数式部分をプレースホルダーへ退避してからmarked.parse()を実行し、
      あとでKaTeXのレンダリング結果に置き換える。
      ================================================== */
      function renderMarkdownWithMath(text) {
        if (typeof katex === 'undefined') {
          return typeof marked !== 'undefined' ? marked.parse(text) : text;
        }

        const mathStore = [];
        const stash = (expr, displayMode) => {
          let html;
          try {
            html = katex.renderToString(expr.trim(), { displayMode, throwOnError: false });
          } catch (e) {
            html = `<span class="katex-error" title="${escapeForTitle(e.message)}">${escapeForTitle(expr)}</span>`;
          }
          const token = `\u0000MATH${mathStore.length}\u0000`;
          mathStore.push(html);
          return token;
        };

        let processed = text
          // ブロック数式 $$...$$
          .replace(/\$\$([\s\S]+?)\$\$/g, (m, expr) => stash(expr, true))
          // ブロック数式 \[...\]
          .replace(/\\\[([\s\S]+?)\\\]/g, (m, expr) => stash(expr, true))
          // インライン数式 \(...\)
          .replace(/\\\(([\s\S]+?)\\\)/g, (m, expr) => stash(expr, false))
          // インライン数式 $...$ (直後に空白/数字が来る通貨表記$との混同を避けるため、$の直後直前に空白を許さない)
          .replace(/(^|[^\\$])\$(?!\s)([^\n$]+?)(?<!\s)\$(?!\$)/g, (m, pre, expr) => pre + stash(expr, false));

        let html = typeof marked !== 'undefined' ? marked.parse(processed) : processed;
        html = html.replace(/\u0000MATH(\d+)\u0000/g, (m, idx) => mathStore[Number(idx)]);
        return html;
      }

      function schedulePreviewUpdate() {
        clearTimeout(previewTimer);
        previewTimer = setTimeout(renderPreview, 150);
      }

      function renderPreview() {
        try {
          const text = getEditorValue();
          if (typeof marked === 'undefined') {
            previewInnerEl.textContent = text;
            return;
          }
          const raw = renderMarkdownWithMath(text);
          const safe = typeof DOMPurify !== 'undefined'
            ? DOMPurify.sanitize(raw, { USE_PROFILES: { html: true, svg: true, mathMl: true } })
            : raw;
          previewInnerEl.innerHTML = safe;
          renderMermaidBlocks();
        } catch (e) {
          log('error', `プレビューの生成に失敗しました: ${e.message}`);
        }
      }

      // 【フローチャート対応】プレビュー内の <div class="mermaid"> を実際の図(SVG)に描画する。
      // 入力中の連続レンダリングで古い非同期処理が新しい結果を上書きしないよう、
      // 描画のたびに世代番号(mermaidRenderSeq)を発行して破棄判定に使う。
      async function renderMermaidBlocks() {
        if (typeof mermaid === 'undefined') return;
        const nodes = previewInnerEl.querySelectorAll('.mermaid');
        if (nodes.length === 0) return;

        const seq = ++mermaidRenderSeq;
        let index = 0;
        for (const node of nodes) {
          const source = node.textContent;
          const graphId = `mermaid-graph-${seq}-${index++}`;
          try {
            const { svg } = await mermaid.render(graphId, source);
            if (seq !== mermaidRenderSeq) return; // 描画中に本文が変わった場合は結果を捨てる
            node.innerHTML = svg;
          } catch (e) {
            if (seq !== mermaidRenderSeq) return;
            node.outerHTML = `<pre class="mermaid-error">${escapeHtml(`図の描画に失敗しました: ${e.message}`)}</pre>`;
            log('warn', `Mermaid図の描画に失敗しました: ${e.message}`);
          }
        }
      }

      previewInnerEl.addEventListener('click', (event) => {
          const anchor = event.target.closest('a');
          if (anchor && anchor.href) {
            event.preventDefault();
            window.open(anchor.href, '_blank', 'noopener');
          }
        });

      function escapeForTitle(text) {
        return String(text ?? '').replace(/[<>&]/g, (char) => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[char]));
      }

      function buildStandaloneHtml(markdownText, title) {
        let bodyHtml;
        if (typeof marked === 'undefined') {
          bodyHtml = `<pre>${escapeForTitle(markdownText)}</pre>`;
        } else {
          const raw = renderMarkdownWithMath(markdownText);
          bodyHtml = typeof DOMPurify !== 'undefined'
            ? DOMPurify.sanitize(raw, { USE_PROFILES: { html: true, svg: true, mathMl: true } })
            : raw;
        }
        return `<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${escapeForTitle(title)}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.1/mermaid.min.js" crossorigin="anonymous"><\/script>
    <style>
      :root { color-scheme: light; }
      body {
        font-family: 'IBM Plex Serif', Georgia, 'Hiragino Mincho ProN', 'Yu Mincho', serif;
        max-width: 760px;
        margin: 0 auto;
        padding: 56px 28px 96px;
        background: #f6f1e6;
        color: #2a2520;
        line-height: 1.75;
      }
      h1, h2, h3, h4, h5, h6 { font-weight: 600; line-height: 1.3; }
      h1 { font-size: 2.1em; border-bottom: 2px solid #c89a4a; padding-bottom: 0.3em; }
      h2 { font-size: 1.6em; border-bottom: 1px solid #d8cdb8; padding-bottom: 0.25em; }
      a { color: #3f7a80; }
      blockquote { margin: 1em 0; padding: 0.2em 1.2em; border-left: 3px solid #c89a4a; color: #5a5044; font-style: italic; }
      pre { background: #221e1a; color: #ece5d8; padding: 16px; border-radius: 6px; overflow-x: auto; font-family: 'IBM Plex Mono', monospace; font-size: 0.9em; }
      code { font-family: 'IBM Plex Mono', monospace; background: rgba(40, 35, 30, 0.08); padding: 0.1em 0.35em; border-radius: 3px; }
      pre code { background: none; padding: 0; }
      table { border-collapse: collapse; width: 100%; margin: 1.2em 0; }
      th, td { border: 1px solid #d8cdb8; padding: 0.5em 0.8em; text-align: left; }
      th { background: #ece1cb; }
      img { max-width: 100%; }
      hr { border: none; border-top: 1px solid #d8cdb8; margin: 2em 0; }
      .mermaid { display: flex; justify-content: center; margin: 1.2em 0; }
    </style>
  </head>
  <body>
${bodyHtml}
    <script>
      if (typeof mermaid !== 'undefined') {
        mermaid.initialize({ startOnLoad: true, theme: 'neutral' });
      }
    <\/script>
  </body>
</html>`;
      }

      function openPreviewInNewTab() {
        try {
          const html = buildStandaloneHtml(getEditorValue(), currentFile.name || '無題');
          const blob = new Blob([html], { type: 'text/html' });
          const url = URL.createObjectURL(blob);
          const win = window.open(url, '_blank');
          if (!win) {
            log('warn', 'ポップアップがブロックされました。ブラウザのポップアップ許可設定を確認してください。');
          } else {
            log('info', '新規タブでプレビューを開きました。');
          }
          setTimeout(() => URL.revokeObjectURL(url), 30000);
        } catch (e) {
          log('error', `新規タブでの表示に失敗しました: ${e.message}`);
        }
      }

      /* ==================================================
      ファイル状態 (タイトル / dirty)
      ================================================== */

      function updateFileLabel() {
        const name = currentFile.name || '無題.md';
        fileNameLabelEl.textContent = name;
        dirtyDotEl.classList.toggle('visible', dirty);
        document.title = `${dirty ? '● ' : ''}${name} — Markdown Editor`;
      }

      function markDirty() {
        dirty = true;
        updateFileLabel();
      }

      function markClean() {
        dirty = false;
        updateFileLabel();
      }

      window.addEventListener('beforeunload', (event) => {
          // 【安全策】デバウンス待ちの間にタブが閉じられても消えないよう、
          // 離脱直前に本文・履歴とも確実に一度保存しておく
          clearTimeout(draftSaveTimer);
          saveDraftToStorage();
          if (historyDirty) saveHistoryToStorage();
          if (dirty) {
            event.preventDefault();
            event.returnValue = '';
          }
        });

      // iPadでアプリ切替/ホーム画面に戻る際は beforeunload が発火しないことがあるため、
      // 非表示になったタイミングでも保存しておく(履歴保存はここでまとめて行う分には
      // 頻度が低いので操作性に影響しない)
      document.addEventListener('visibilitychange', () => {
          if (document.visibilityState !== 'hidden') return;
          clearTimeout(draftSaveTimer);
          saveDraftToStorage();
          if (historyDirty) saveHistoryToStorage();
        });

      function flashFeedback(button, text) {
        const original = button.dataset.originalText || button.textContent;
        button.dataset.originalText = original;
        button.textContent = text;
        clearTimeout(button._flashTimer);
        button._flashTimer = setTimeout(() => {
            button.textContent = original;
          }, 1500);
      }

      /* ==================================================
      表示モード (編集 / 分割 / プレビュー)
      ================================================== */

      function setViewMode(mode) {
        workspaceEl.classList.remove('mode-edit', 'mode-split', 'mode-preview');
        workspaceEl.classList.add(`mode-${mode}`);
        segmentedButtons.forEach((btn) => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
          });
        if (mode !== 'edit') renderPreview();
        window.requestAnimationFrame(() => {
            try { if (cm) cm.refresh(); } catch (e) { log('warn', `エディタ再描画に失敗しました: ${e.message}`); }
          });
      }

      segmentedButtons.forEach((btn) => {
          btn.addEventListener('click', () => setViewMode(btn.dataset.mode));
        });

      window.addEventListener('resize', () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
              try { if (cm) cm.refresh(); } catch (e) { log('warn', `エディタ再描画に失敗しました: ${e.message}`); }
            }, 150);
        });

      /* ==================================================
      認証UI
      ================================================== */

      async function updateAuthUI() {
        if (!drive) {
          authStatusTextEl.textContent = '未設定';
          authStatusEl.classList.remove('online');
          authBtn.textContent = 'ログイン';
          authBtn.disabled = true;
          return;
        }
        authBtn.disabled = false;
        const status = drive.checker();
        if (status.ok) {
          authBtn.textContent = 'ログアウト';
          authStatusEl.classList.add('online');
          authStatusTextEl.textContent = '確認中…';
          try {
            const email = await drive.getEmail();
            authStatusTextEl.textContent = email;
          } catch (e) {
            authStatusTextEl.textContent = 'ログイン中';
            log('warn', `メールアドレスの取得に失敗しました: ${e.message}`);
          }
        } else {
          authBtn.textContent = 'ログイン';
          authStatusEl.classList.remove('online');
          authStatusTextEl.textContent = '未ログイン';
        }
      }

      async function ensureLoggedIn() {
        if (!drive) {
          openSettingsModal();
          throw new Error('Drive連携が未設定です。設定を行ってください。');
        }
        const status = drive.checker();
        if (status.ok) return true;

        log('info', 'ログイン状態を確認しています…');
        const silentResult = await drive.auth(true);
        if (silentResult && silentResult.ok) {
          updateAuthUI();
          return true;
        }

        log('info', 'ログインしてください。ポップアップウィンドウを確認してください。');
        await drive.auth();
        updateAuthUI();
        return true;
      }

      authBtn.addEventListener('click', async () => {
          if (!drive) {
            openSettingsModal();
            log('warn', 'Drive連携の設定を入力してください。');
            return;
          }
          const status = drive.checker();
          if (status.ok) {
            drive.signOut();
            log('info', 'ログアウトしました。');
            updateAuthUI();
            return;
          }
          authBtn.disabled = true;
          try {
            log('info', 'ログイン処理を開始します。ポップアップウィンドウを確認してください。');
            await drive.auth();
            log('info', 'ログインに成功しました。');
          } catch (e) {
            log('error', `ログインに失敗しました: ${e.message}`);
          } finally {
            authBtn.disabled = false;
            updateAuthUI();
          }
        });

      /* ==================================================
      ファイル操作: 新規 / 開く / 保存 / ダウンロード
      ================================================== */

      function confirmDiscardIfDirty(message) {
        if (!dirty) return true;
        return window.confirm(message);
      }

      newBtn.addEventListener('click', () => {
          if (!confirmDiscardIfDirty('保存されていない変更があります。新規作成すると失われます。続行しますか?')) return;
          setEditorValue('');
          currentFile = { id: null, name: '無題.md', path: '無題.md' };
          markClean();
          renderPreview();
          log('info', '新規ドキュメントを作成しました。');
        });

      // 【全文コピー】クリップボードAPIを優先し、非対応/非セキュアコンテキストの場合は
      // 従来のselect+execCommand('copy')にフォールバックする
      async function copyAllToClipboard() {
        const text = getEditorValue();
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
          } else {
            const temp = document.createElement('textarea');
            temp.value = text;
            temp.style.position = 'fixed';
            temp.style.opacity = '0';
            document.body.appendChild(temp);
            temp.focus();
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
          }
          flashFeedback(copyAllBtn, 'コピーしました');
          log('info', '本文全体をクリップボードにコピーしました。');
        } catch (e) {
          log('error', `クリップボードへのコピーに失敗しました: ${e.message}`);
        }
      }

      copyAllBtn.addEventListener('click', copyAllToClipboard);

      // 「copy」と入力すると全文コピーを実行するミニ入力欄(タップ操作が苦手な場面向け)
      copyTriggerInput.addEventListener('input', () => {
          if (copyTriggerInput.value.trim().toLowerCase() === 'copy') {
            copyAllToClipboard();
            copyTriggerInput.value = '';
            copyTriggerInput.blur();
          }
        });

      undoBtn.addEventListener('click', () => {
          try {
            if (cm) {
              cm.undo();
              cm.focus();
            } else {
              editorTextareaEl.focus();
              document.execCommand('undo');
            }
            updateUndoRedoState();
          } catch (e) {
            log('error', `元に戻す操作に失敗しました: ${e.message}`);
          }
        });

      redoBtn.addEventListener('click', () => {
          try {
            if (cm) {
              cm.redo();
              cm.focus();
            } else {
              editorTextareaEl.focus();
              document.execCommand('redo');
            }
            updateUndoRedoState();
          } catch (e) {
            log('error', `やり直す操作に失敗しました: ${e.message}`);
          }
        });

      openDriveBtn.addEventListener('click', async () => {
          try {
            await ensureLoggedIn();
          } catch (e) {
            log('error', e.message);
            return;
          }
          if (!confirmDiscardIfDirty('保存されていない変更があります。開くと失われます。続行しますか?')) return;

          try {
            log('info', 'Google Drive のファイル選択ダイアログを開きます。');
            const picked = await drive.openPicker({
                mimeType: 'text/markdown,text/plain,text/x-markdown',
                title: 'Markdownファイルを選択'
              });
            if (!picked) {
              log('info', 'ファイル選択をキャンセルしました。');
              return;
            }
            log('info', `「${picked.name}」を読み込んでいます…`);
            const content = await drive.getFile({ fileId: picked.id });
            
            // 【パス記憶修正】Pickerから取得したフルパス(無い場合はファイル名)を保持
            const resolvedPath = picked.path || picked.name;

            setEditorValue(typeof content === 'string' ? content : String(content ?? ''));
            currentFile = { id: picked.id, name: picked.name, path: resolvedPath };
            markClean();
            renderPreview();
            log('info', `「${resolvedPath}」を読み込みました。`);
          } catch (e) {
            log('error', `ファイルの読み込みに失敗しました: ${e.message}`);
          }
        });

      openLocalBtn.addEventListener('click', () => {
          if (!confirmDiscardIfDirty('保存されていない変更があります。開くと失われます。続行しますか?')) return;
          localFileInputEl.click();
        });

      localFileInputEl.addEventListener('change', (event) => {
          const file = event.target.files && event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            setEditorValue(String(reader.result ?? ''));
            currentFile = { id: null, name: file.name, path: file.name };
            markClean();
            renderPreview();
            log('info', `ローカルファイル「${file.name}」を読み込みました。`);
          };
          reader.onerror = () => {
            log('error', `ローカルファイルの読み込みに失敗しました: ${reader.error?.message ?? '不明なエラー'}`);
          };
          reader.readAsText(file, 'utf-8');
          localFileInputEl.value = '';
        });

      async function saveCurrentFile() {
        try {
          await ensureLoggedIn();
        } catch (e) {
          log('error', e.message);
          return;
        }

        if (currentFile.id) {
          try {
            saveBtn.disabled = true;
            log('info', `「${currentFile.path}」を保存しています…`);
            await drive.saveFile({ fileId: currentFile.id, data: getEditorValue(), mimeType: 'text/markdown' });
            markClean();
            flashFeedback(saveBtn, '保存済み');
            log('info', `「${currentFile.path}」を保存しました。`);
          } catch (e) {
            log('error', `保存に失敗しました: ${e.message}`);
          } finally {
            saveBtn.disabled = false;
          }
        } else {
          await saveAsFlow();
        }
      }

      async function saveAsFlow() {
        try {
          await ensureLoggedIn();
        } catch (e) {
          log('error', e.message);
          return;
        }

        // 【タッチ操作対応】保存先フォルダはパスを手入力させず、Google Picker で
        // フォルダを開いて選んでもらう(ファイル名だけ入力すればよい)
        let folder;
        try {
          log('info', '保存先フォルダを選択してください。');
          folder = await drive.openPicker({
            mimeType: 'application/vnd.google-apps.folder',
            title: '保存先フォルダを選択(フォルダを開いて「選択」で決定)',
            rootCut: true,
          });
          log('info', JSON.stringify(folder));
        } catch (e) {
          log('error', `フォルダ選択ダイアログの表示に失敗しました: ${e.message}`);
          return;
        }
        if (!folder) {
          log('info', '名前を付けて保存をキャンセルしました。');
          return;
        }

        const defaultName = (currentFile.path || currentFile.name || '無題.md').split('/').pop();
        const folderPath = folder.path;
        let filename = window.prompt(`「${folder.path}」に保存するファイル名を入力してください`, defaultName);
        if (filename === null) {
          log('info', '名前を付けて保存をキャンセルしました。');
          return;
        }
        filename = filename.trim();
        if (!filename) {
          log('warn', 'ファイル名が空のため保存を中止しました。');
          return;
        }
        if (!/\.(md|markdown|txt)$/i.test(filename)) {
          filename += '.md';
        }

        try {
          saveAsBtn.disabled = true;

          // 選択したフォルダのフルパスを解決し、ファイル名と結合する
          // (フォルダがマイドライブ直下の場合は getPath が空文字を返す)
          
          log('info', `選択したフォルダのpath: ${folderPath}`);
          const fullPath = folderPath ? `${folderPath}/${filename}` : filename;

          log('info', `「${fullPath}」として保存しています…`);
          const res = await drive.saveFile({ path: fullPath, data: getEditorValue(), mimeType: 'text/markdown' });
          let newId = res && res.id ? res.id : null;
          if (!newId) {
            newId = await drive.getFileId({ path: fullPath });
          }

          currentFile = { id: newId || null, name: filename, path: fullPath };
          markClean();
          flashFeedback(saveAsBtn, '保存済み');
          log('info', `「${fullPath}」として保存しました。`);
        } catch (e) {
          log('error', `名前を付けて保存に失敗しました: ${e.message}`);
        } finally {
          saveAsBtn.disabled = false;
        }
      }

      saveBtn.addEventListener('click', saveCurrentFile);
      saveAsBtn.addEventListener('click', saveAsFlow);

      downloadBtn.addEventListener('click', () => {
          try {
            const name = currentFile.name || '無題.md';
            const blob = new Blob([getEditorValue()], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(url), 5000);
            log('info', `「${name}」をダウンロードしました。`);
          } catch (e) {
            log('error', `ダウンロードに失敗しました: ${e.message}`);
          }
        });

      newTabBtn.addEventListener('click', openPreviewInNewTab);

      document.addEventListener('keydown', (event) => {
          const isSaveCombo = (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's';
          if (isSaveCombo) {
            event.preventDefault();
            saveCurrentFile();
          }
        });

      /* ==================================================
      設定モーダル
      ================================================== */

      function openSettingsModal() {
        const current = loadSettings();
        settingClientIdEl.value = current.clientId || '';
        settingRedirectUriEl.value = current.redirectUri || '';
        settingSpaceEl.value = current.space || 'file';
        settingsModalEl.classList.remove('hidden');
      }

      function closeSettingsModal() {
        settingsModalEl.classList.add('hidden');
      }

      settingsBtn.addEventListener('click', openSettingsModal);
      settingsCancelBtn.addEventListener('click', closeSettingsModal);
      settingsModalEl.addEventListener('click', (event) => {
          if (event.target === settingsModalEl) closeSettingsModal();
        });

      settingsSaveBtn.addEventListener('click', () => {
          const clientId = settingClientIdEl.value.trim();
          const redirectUri = settingRedirectUriEl.value.trim();
          const space = settingSpaceEl.value;
          if (!clientId || !redirectUri) {
            log('warn', 'Client ID と Redirect URI の両方を入力してください。');
            return;
          }
          saveSettings({ clientId, redirectUri, space });
          initDrive();
          closeSettingsModal();
          log('info', 'Drive連携の設定を保存しました。');
        });

      /* ==================================================
      起動処理
      ================================================== */

      configureMarked();
      if (typeof DOMPurify === 'undefined') {
        log('warn', 'DOMPurifyが読み込まれていないため、プレビューのサニタイズが行われません。');
      }
      if (typeof mermaid !== 'undefined') {
        mermaid.initialize({
          startOnLoad: false,
          securityLevel: 'strict',
          theme: 'base',
          themeVariables: {
            background: '#f1e9d8',
            primaryColor: '#ece1cb',
            primaryTextColor: '#2a2520',
            primaryBorderColor: '#c89a4a',
            lineColor: '#6b6055',
            secondaryColor: '#dfd2b0',
            tertiaryColor: '#f1e9d8'
          },
          fontFamily: "'IBM Plex Sans', sans-serif"
        });
      } else {
        log('warn', 'Mermaidが読み込まれていないため、フローチャート等の図は描画されません。');
      }

      initEditor();
      if (!restoreDraftIfAny()) {
        setEditorValue(WELCOME_TEXT);
        markClean();
      }
      renderPreview();
      initDrive();
      setViewMode(window.innerWidth < 760 ? 'edit' : 'split');

      log('info', `Markdown Editor を起動しました。(DriveAPIManager v${DriveAPIManager.ver})`);
      if (loadSettings().clientId === PLACEHOLDER_CLIENT_ID) {
        log('warn', 'Client ID/Redirect URIがプレースホルダーのままです。コード内のEMBEDDED_CLIENT_ID/EMBEDDED_REDIRECT_URIを書き換えるか、「設定」から登録してください。');
      }

      /* ==================================================
      オフライン対応 (Service Worker登録)
      ================================================== */
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((reg) => {
              log('info', `オフライン用キャッシュを準備しました。(scope: ${reg.scope})`);
            })
            .catch((e) => {
              log('warn', `Service Workerの登録に失敗したため、オフライン表示には対応できません: ${e.message}`);
            });
        });
      } else {
        log('warn', 'このブラウザはService Workerに対応していないため、オフライン表示はできません。');
      }

    </script>
  </body>
</html>
