<head><meta charset="UTF-8"><title>認証中...</title></head>

<script>
  const p = new URLSearchParams(location.search);
  window.opener?.postMessage({
    type:  'oauth_callback',

    error: p.get('error'),
  }, location.origin);
  window.close();
</script>
