<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>CompVisJSの使い方 ｜ ver:1.02.02</title>
    <link rel="stylesheet" href="/statics/main-style.css" />
    <!--<script src="https://mathotagamma.github.io/APIs/CompVisJS/1-02-02/CompVisJS.js"></script>-->
    <script type="module">
      import { registerLibs } from "https://mathotagamma.github.io/APIs/JS-Window/1-02-01/JS-Window.js";
      registerLibs([
        "https://mathotagamma.github.io/APIs/CompVisJS/1-02-02/CompVisJS.js"
      ]);
    </script>
    <script type="module" src="/statics/main-script.js"></script>
    <style>
      a.anchor {
        color: inherit;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>CompVisJS ｜ ver:1.02.02</h1>
    <div style="display: flex;">
      <nav id="breadcrumb"></nav>
    </div>
    <p>
      APIのURLは(クリックでコピー -->)<b><span id="API_URL" style="color: blue;">https://mathotagamma.github.io/APIs/CompVisJS/1-02-02/CompVisJS.js</span></b>です。
    </p>
    <main>
      <p>
        Web版のEditorは<a href="./Editor">こちら</a><br>
        <!--CompVisのGraphの使い方についての詳細は<a href="./explanation_graph" target="_blank">こちら</a><br>
        CompVisのMatrixクラスの使い方についての詳細は<a href="./explanation_matrix" target="_blank">こちら</a>-->
      </p>
      
    </main>
    <script>
      let element = document.getElementById('API_URL');
      function copy_func(copy_text){
        if (navigator.clipboard) {
          alert('クリップボードにコピーしました。');
          return navigator.clipboard.writeText(copy_text);
        }
      }
      element.addEventListener('click',()=>{
        copy_func(element.innerText);
      });
    </script>
  </body>
</html>
