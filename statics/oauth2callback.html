<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>認証処理中...</title>
</head>
<body>
  <script>
    (function() {
      // 1. Googleからハッシュフラグメント（#access_token=...）で渡ってくるデータを解析
      // ※ URL の '?' 以降（search）と '#' 以降（hash）の両方に対応させます
      const urlParams = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.substring(1));

      // Implicit Flow の access_token、またはエラーを取得
      const token = hashParams.get('access_token') || urlParams.get('access_token');
      const error = urlParams.get('error') || hashParams.get('error');
      const state = hashParams.get('state') || urlParams.get('state');

      // 2. 💡 iPad対策: 親ウィンドウが冬眠していても確実に届くように localStorage に書き込む
      // DriveAPIManager側は「data.code」としてトークンを待っているのでキー名を合わせます
      if (token || error) {
        localStorage.setItem('oauth_result', JSON.stringify({
          code: token,
          error: error,
          state: state
        }));
      }

      // 3. PCや他ブラウザ環境などのために、従来の postMessage も一応投げておく（保険）
      if (window.opener) {
        window.opener.postMessage({
          type: 'oauth_callback',
          code: token,
          error: error,
          state: state
        }, window.location.origin); // セキュリティのため自分のオリジンに限定
      }

      // 4. 処理が終わったら、このポップアップ（別タブ）を即座に閉じる
      window.close();
    })();
  </script>
</body>
</html>
