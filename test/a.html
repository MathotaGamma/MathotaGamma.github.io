<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveAPIManager プレイグラウンド Ver:4.0</title>
    <style>
      :root {
        --bg-color: #f8f9fa;
        --panel-bg: #ffffff;
        --border-color: #dee2e6;
        --text-color: #212529;
        --primary-color: #0d6efd;
        --success-color: #198754;
        --danger-color: #dc3545;
      }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid var(--border-color);
      }
      .setup-fields {
        display: flex;
        gap: 15px;
        align-items: flex-end;
        margin-bottom: 10px;
      }
      .field-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
        flex: 1;
      }
      label { font-size: 0.85rem; font-weight: bold; }
      input, select, textarea {
        padding: 8px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-family: inherit;
      }
      .main-container {
        display: flex;
        gap: 20px;
        flex: 1;
        min-height: 0;
      }
      .control-panel {
        flex: 1.2;
        overflow-y: auto;
        padding-right: 10px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .output-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 50%;
      }
      .card {
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 15px;
      }
      .card h3 { margin-top: 0; margin-bottom: 12px; font-size: 1rem; border-left: 4px solid var(--primary-color); padding-left: 8px; }
      .btn-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
      button {
        padding: 8px 14px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 500;
        background-color: #6c757d;
        color: white;
        transition: opacity 0.2s;
      }
      button:hover { opacity: 0.9; }
      button.primary { background-color: var(--primary-color); }
      button.success { background-color: var(--success-color); }
      button.danger { background-color: var(--danger-color); }
      
      .console-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: auto;
      }
      .console-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 5px;
      }
      .console-log {
        flex: 1;
        background: #1e1e1e;
        color: #f8f8f2;
        font-family: "Courier New", Courier, monospace;
        padding: 12px;
        border-radius: 6px;
        overflow-y: auto;
        white-space: pre-wrap;
        font-size: 0.9rem;
      }
      .progress-log {
        height: 100px;
        background: #2d3748;
        color: #e2e8f0;
        font-family: monospace;
        padding: 8px;
        border-radius: 6px;
        overflow-y: auto;
        font-size: 0.8rem;
        margin-bottom: 10px;
      }
      .info-badge {
        display: inline-block;
        padding: 2px 6px;
        background: #e9ecef;
        border-radius: 4px;
        font-size: 0.8rem;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>

    <header>
      <h2>DriveAPIManager 開発・検証用プレイグラウンド Ver:4.0用</h2>
      <div class="setup-fields">
        <div class="field-group">
          <label for="clientId">Client ID</label>
          <input type="text" id="clientId" placeholder="YOUR_CLIENT_ID.apps.googleusercontent.com">
        </div>
        <div class="field-group">
          <label for="redirectUri">Redirect URI</label>
          <input type="text" id="redirectUri" placeholder="https://yourname.github.io/yourrepo/oauth2callback">
        </div>
        <button id="btnInit" class="primary">マネージャー初期化</button>
      </div>
      <div id="initStatus" class="info-badge">状態: 未初期化 (Client ID を入力して初期化してください)</div>
    </header>

    <div class="main-container">
      <div class="control-panel">
        <div class="card">
          <h3>0. Debug</h3>
          <div class="btn-grid">
            <button id="btnDebug" class="primary">Debug用ボタン</button>
          </div>
        </div>
        <div class="card">
          <h3>1. AUTH (認証)</h3>
          <div class="btn-grid">
            <button id="btnAuthPop" class="primary">auth(false) [ポップアップ認証]</button>
            <button id="btnAuthSilent">auth(true) [サイレント確認]</button>
            <button id="btnChecker">checker() [同期状態取得]</button>
            <button id="btnGetEmail">getEmail()</button>
            <button id="btnSignOut" class="danger">signOut()</button>
          </div>
        </div>

        <div class="card">
          <h3>2. FOLDER & PATH</h3>
          <div class="field-group">
            <label for="folderPath">対象フォルダパス / ファイルパス</label>
            <input type="text" id="folderPath" value="/saves/2026/test-folder">
          </div>
          <div class="btn-grid">
            <button id="btnCreateFolder" class="success">createFolder()</button>
            <button id="btnGetFileId">getFileId()</button>
            <button id="btnListFiles">listFiles()</button>
            <button id="btnRemove" class="danger">removeFile()</button>
          </div>
        </div>

        <div class="card">
          <h3>3. FILE CRUD (ファイルの読み書き)</h3>
          <div class="field-group" style="margin-bottom: 8px;">
            <label for="filePath">ファイルパス または ID</label>
            <input type="text" id="filePath" value="/saves/slot1.json">
          </div>
          <div style="display: flex; gap: 10px; margin-bottom: 8px;">
            <div class="field-group" style="flex: 1;">
              <label for="fileDataType">データ型 (保存用)</label>
              <select id="fileDataType">
                <option value="json">JSON (Object)</option>
                <option value="text">Text (String)</option>
              </select>
            </div>
            <div class="field-group" style="flex: 1;">
              <label for="getAs">取得形式 (getFile用: as)</label>
              <select id="getAs">
                <option value="auto">auto</option>
                <option value="json">json</option>
                <option value="text">text</option>
                <option value="arraybuffer">arraybuffer</option>
                <option value="blob">blob</option>
              </select>
            </div>
          </div>
          <div class="field-group">
            <label for="fileContent">ファイル中身 (保存する文字列 / JSONデータ)</label>
            <textarea id="fileContent" rows="3" placeholder='{"theme": "dark", "score": 999}'></textarea>
          </div>
          <div class="btn-grid">
            <button id="btnSaveFile" class="success">saveFile()</button>
            <button id="btnGetFile" class="primary">getFile()</button>
          </div>
        </div>

        <div class="card">
          <h3>4. METADATA / SEARCH / UTILS</h3>
          <div style="display: flex; gap: 10px; margin-bottom: 8px;">
            <div class="field-group" style="flex: 1;">
              <label for="searchQuery">検索クエリ / メタ更新値</label>
              <input type="text" id="searchQuery" placeholder="slot または {'name': 'new.json'}">
            </div>
          </div>
          <div class="btn-grid">
            <button id="btnGetStructure">getStructure() [ツリー一括取得]</button>
            <button id="btnSearch">search()</button>
            <button id="btnGetMeta">getFileInfo()</button>
            <button id="btnUpdateMeta">updateMeta()</button>
            <button id="btnRemoveAll" class="danger">removeAllFiles() [全消去]</button>
          </div>
        </div>

      </div>

      <div class="output-panel">
        <div>
          <label>内部進捗イベント (progressコールバック)</label>
          <div id="progressLog" class="progress-log"></div>
        </div>

        <div class="console-wrapper">
          <div class="console-header">
            <label>実行結果コンソール (API 戻り値 / エラー)</label>
            <button id="btnClearConsole" style="padding: 4px 8px; font-size: 0.75rem;">クリア</button>
          </div>
          <div id="consoleLog" class="console-log">ここに結果が出力されます。</div>
        </div>
      </div>
    </div>
    <script>
class DriveAPIManager {
  static ver = "4.1";
  
  constructor({ clientId, redirectUri, progress }) {
    if (!clientId || !redirectUri)
      throw new Error('引数にclient_idとredirect_uriを含めてください。');
    
    this.progress = progress || (() => {});
    this.clientId = clientId;
    this.redirectUri = redirectUri;
    
    const cachedToken = localStorage.getItem('dapi_access_token');
    const cachedExpires = parseInt(localStorage.getItem('dapi_expires_at') || '0', 10);
    const isAlive = cachedToken && cachedExpires > Date.now();

    this.state = {
      loggedIn: isAlive ? true : false,
      token: isAlive ? cachedToken : null,
      expiresAt: cachedExpires,
      email: null
    };
    
    this._authPromise = null;
    this._idCache = {};
  }
  
  checker() {
    return {
      ok: this.state.loggedIn && !!this.state.token && this.state.expiresAt > Date.now(),
      loggedIn: this.state.loggedIn && !!this.state.token,
      expired: !this.state.loggedIn || this.state.expiresAt <= Date.now(),
      token: this.state.token
    };
  }
  
  getCache(key=null) {
    const cache = {
      id: this._idCache
    };
    if (key) return cache[key];
    return cache;
  }

  /* ==================================================
     共通
     ================================================== */
  
  async request(method = 'GET', path = '', options = {}) {
    if (!this.state.loggedIn || !this.state.token) {
      throw new Error('ログインしていません。先に auth() を実行してください。');
    }
    if (this.state.expiresAt && Date.now() > this.state.expiresAt) {
      this.signOut();
      throw new Error('アクセストークンの有効期限が切れています。再ログインが必要です。');
    }

    const upperMethod = method.toUpperCase();

    /*let url = `https://www.googleapis.com/drive/v3/${path}`;
    if (options.params) {
      const q = new URLSearchParams(options.params).toString();
      if (q) url += `?${q}`;
    }*/
    
    const baseUrl = options.origin ? `https://www.googleapis.com/${path}` : `https://www.googleapis.com/drive/v3/${path}`;
    const urlObj = new URL(baseUrl);
    
    if (options.params) {
      Object.keys(options.params).forEach(key => {
        if (options.params[key] !== undefined && options.params[key] !== null) {
          urlObj.searchParams.append(key, options.params[key]);
        }
      });
    }
    const url = urlObj.toString();
    
    this.progress(`request:${upperMethod}`, `${url}:start`);

    const fetchOptions = {
      method: upperMethod,
      headers: {
        'Authorization': `Bearer ${this.state.token}`,
        /*'Accept': 'application/json',*/
        ...options.headers
      }
    };

    if (options.body) {
      if (typeof options.body === 'object' && !(options.body instanceof FormData) && !(options.body instanceof Blob)) {
        fetchOptions.headers['Content-Type'] = 'application/json';
        fetchOptions.body = JSON.stringify(options.body);
      } else {
        fetchOptions.body = options.body;
      }
    }
    
    
    try {
      const res = await fetch(url, fetchOptions);

      if (res.status === 401) {
        this.signOut();
        throw new Error('認証エラー(401): セッションが破棄されました。');
      }

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(`Drive API Error [${res.status}]: ${errData.error?.message || res.statusText}`);
      }

      const contentType = res.headers.get('content-type') || '';
      
      let data;
      if (res.status === 204) {
        data = { ok: true };
      } else if (contentType.includes('application/json')) {
        data = await res.text();
        if (data !== '') data = JSON.parse(data);
        
      } else {
        data = await res.text();
      }
      
      
      this.progress(`request:${upperMethod}`, `${url}:done`);
      return data;
    } catch (e) {
      this.progress(`request:${upperMethod}`, `${url}:fail`);
      throw e;
    }
  }

  /* ==================================================
     auth
     ================================================== */
  
  auth(silent=false, prompt=null) {
    if (this._authPromise) return this._authPromise;

    if (silent) {
      if (this.state.loggedIn && this.state.token && this.state.expiresAt > Date.now()) {
        this.progress('auth', 'silent:done');
        return Promise.resolve({ ok: true, token: this.state.token, silent: true });
      } else {
        this.progress('auth', 'silent:fail');
        this.signOut(); 
        return Promise.resolve({ ok: false, error: 'silent_auth_failed' });
      }
    }

    if (this.state.loggedIn && this.state.token && this.state.expiresAt > Date.now()) {
      this.progress('auth', 'silent:done');
      return Promise.resolve({ ok: true, token: this.state.token, silent: true });
    }

    this.progress('auth', 'start');
    
    const oauth2Endpoint = 'https://accounts.google.com/o/oauth2/v2/auth';
    localStorage.removeItem('oauth_result');

    const params = {
      client_id: this.clientId,
      redirect_uri: this.redirectUri,
      response_type: 'token',
      scope: 'https://www.googleapis.com/auth/drive.appdata',
      state: 'debug_implicit_test'
    };
    
    if (prompt) params.prompt = prompt;

    const queryStrings = new URLSearchParams(params).toString();
    const targetUrl = `${oauth2Endpoint}?${queryStrings}`;

    const popupName = `oauth_popup_${Date.now()}`;
    window.open(targetUrl, popupName, 'width=500,height=600,left=100,top=100,menubar=no,toolbar=no,location=no,status=no');

    this._authPromise = new Promise((resolve, reject) => {
      const pollTimer = setInterval(() => {
        const rawResult = localStorage.getItem('oauth_result');
      
        if (rawResult) {
          clearInterval(pollTimer); 

          try {
            const data = JSON.parse(rawResult);
            localStorage.removeItem('oauth_result'); 

            if (data.error) {
              this.progress('auth', 'fail');
              this._authPromise = null;
              reject(new Error(data.error));
              return;
            }

            if (data.token) {
              const expiresAt = Date.now() + (3600 * 1000) - (5 * 60 * 1000);
              
              this.state.loggedIn = true;
              this.state.token = data.token;
              this.state.expiresAt = expiresAt;
              
              localStorage.setItem('dapi_access_token', data.token);
              localStorage.setItem('dapi_expires_at', expiresAt.toString());

              this.progress('auth', 'done');
              this._authPromise = null;
              
              resolve({ ok: true, token: data.token, silent: false });
            }
          } catch (e) {
            this.progress('auth', 'fail');
            this._authPromise = null;
            reject(e);
          }
        }
      }, 200);
    });

    return this._authPromise;
  }

  signOut() {
    this.state.loggedIn = false;
    this.state.token = null;
    this.state.expiresAt = 0;
    this.state.email = null;
    this._idCache = {};
    localStorage.removeItem('dapi_access_token');
    localStorage.removeItem('dapi_expires_at');
    this.progress('signOut', 'done');
  }

  /* ==================================================
     Google Drive自体
     ================================================== */

  async getAbout(fields) {
    return this.request('GET', 'about', {
      params: { fields }
    });
  }

  async getEmail() {
    if (this.state.email) return this.state.email;
    const data = await this.getAbout('user(emailAddress)');
    this.state.email = data.user.emailAddress;
    return this.state.email;
  }
  
  /* ==================================================
     Folder&Path
     ================================================== */
     
  // integration, createFile, _idCacheに依存
  async createFolder({path, fileId}) {
    const resolved = await this.integration({path, fileId});
    let currentPath = resolved.path;
    let currentId = resolved.fileId;

    const parts = currentPath.split('/').filter(Boolean);
    if (parts.length === 0) return 'appDataFolder';
    if (this._idCache[currentPath]) return this._idCache[currentPath];
    
    this.progress('createFolder', 'start');
    
    let lastId = 'appDataFolder';
    for (let i = 0; i < parts.length; i++) {
      const part = parts[i];
      const parent = parts.slice(0, i).join('/');
      const fullSubPath = parent ? `${parent}/${part}` : part;
      
      let targetId = this._idCache[fullSubPath];
      if (!targetId) {
        targetId = await this.getFileId({path: fullSubPath});
      }
      
      if (!targetId) {
        this.progress('createFolder', 'new Folder Creating');
        const created = await this.createFile({parentPath: parent, name: part, mimeType: 'application/vnd.google-apps.folder'});
        targetId = created.id;
      }
      
      lastId = targetId;
      this._idCache[fullSubPath] = lastId;
    }
    
    return lastId;
  }
  
  // integration, requestに依存
  async createFile({parentPath, parentId, name, mimeType, description=''}) {
    const resolved = await this.integration({path: parentPath, fileId: parentId});
    const _parentId = resolved.fileId;
    const _parentPath = resolved.path;

    if ((_parentPath !== "" && !_parentPath) || !name || !mimeType) return null;
    
    const meta = {
      name,
      mimeType,
      parents: [_parentId],
      description
    };
    
    return await this.request('POST', 'files', { body: meta });
  }
  
  // filterPath, _idCache, requestに依存
  async getFileId({path}) {
    const cleanPath = this.filterPath({path});
    const parts = cleanPath.split('/').filter(Boolean);
    if (parts.length === 0) return 'appDataFolder';
    if (this._idCache[cleanPath]) return this._idCache[cleanPath];

    let parentId = 'appDataFolder';

    for (let i = 0; i < parts.length; i++) {
      const part = parts[i];
      const _path = parts.slice(0, i + 1).join('/');
      const id = this._idCache[_path];
      if (id) {
        parentId = id;
        continue;
      }
      
      const isLast = i === parts.length - 1;
      let q = `'${parentId}' in parents and name = '${part}' and trashed = false`;
      if (!isLast) {
        q += ` and mimeType = 'application/vnd.google-apps.folder'`;
      }

      const res = await this.request('GET', 'files', {
        params: { q, spaces: 'appDataFolder', fields: 'files(id)' }
      });

      if (!res.files || res.files.length === 0) {
        return null; 
      }
      parentId = res.files[0].id;
      this._idCache[_path] = parentId;
    }
    
    return parentId;
  }
  
  filterPath({path}) {
    if (path === undefined || path === null) return '';
    return path.split('/').filter(Boolean).join('/');
  }
  
  async getPath({fileId}) {
    if (!fileId || fileId === 'appDataFolder') return '';
    const names = [];
    let currentId = fileId;
    
    try {
      do {
        // API仕様に合わせて name と parents を明示的に要求
        const res = await this.request('GET', `files/${currentId}`, {
          params: { fields: 'name, parents' }
        });
        
        if (!res) break;
        names.unshift(res.name);
        
        // 親がいるかチェック。いなければ（ルートに到達したら）終了
        if (res.parents && res.parents.length > 0) {
          currentId = res.parents[0];
        } else {
          currentId = null;
        }
      } while(currentId && currentId !== 'appDataFolder');
      
      return names.join('/');
    } catch (e) {
      console.error('[getPath] エラー:', e);
      return '';
    }
  }
  
  async integration({path, fileId}) {
    const cleanPath = path !== undefined && path !== null ? this.filterPath({path}) : null;
    
    let _path = cleanPath;
    let id = fileId;
    if (_path === null && id) {
      _path = await this.getPath({fileId: id});
    } else if (_path !== null && !id) {
      id = await this.getFileId({path: _path});
    }
    
    return { path: _path, fileId: id };
  }
  
  async getParentId({path, id}) {
    // pathで渡された時
    if (path !== undefined && path !== null) {
      const cleanPath = this.filterPath({path});
      if (cleanPath === "") return null;
      if (cleanPath.length === 0) return 'appDataFolder';
      const _path = cleanPath.split('/').slice(0,-1).join('/');
      return await this.getFileId({path: path});
    }
    const resolved = await this.integration({path, fileId: id});
    const targetPath = resolved.path;
    const targetId = resolved.fileId;

    const res = await this.request('GET', `files/${targetId}`, {
      params: { fields: 'parents' }
    });
    
    if (targetPath && targetId) {
      this._idCache[targetPath] = targetId;
    }
    
    return res.parents ?? [];
  }
  
  async getFileInfo({path, fileId, fields='id, name, mimeType'}) {
    const resolved = await this.integration({path, fileId});
    const targetId = resolved.fileId;
    
    return await this.request('GET', `files/${targetId}`, {
      params: { fields }
    });
  }
  
  async listFiles({path, fileId}) {
    const resolved = await this.integration({path, fileId});
    const parentId = resolved.fileId;
    const parentPath = resolved.path;

    if (!parentId) return null;
    const q = `'${parentId}' in parents and trashed = false`;
    const fields = 'nextPageToken, files(id, name, mimeType, size, createdTime, modifiedTime)';
    let children = [];
    let pageToken = null;
    
    this.progress('listFiles', 'start');
    
    do {
      const params = {
        q,
        spaces: 'appDataFolder',
        fields: fields,
        pageSize: 2
      };
      
      if (pageToken) params.pageToken = pageToken;
      
      const res = await this.request('GET', 'files', { params });
      
      if (res.files && res.files.length > 0) {
        for (let file of res.files) {
          const childPath = parentPath ? `${parentPath}/${file.name}` : file.name;
          this._idCache[childPath] = file.id;
        }
        children = children.concat(res.files);
      }
      
      pageToken = res.nextPageToken;
      if (pageToken) this.progress('listFiles', 'fetching_next_page');
    } while (pageToken);
    
    this.progress('listFiles', `done: total ${children.length} items`);
    return children;
  }
  
  async removeFile({path, fileId}) {
    const resolved = await this.integration({path, fileId});
    const targetPath = resolved.path;
    const targetId = resolved.fileId;
    
    if (!targetId || targetId === 'appDataFolder') {
      console.warn(`[removeFile] パスまたはIDが見つかりません: ${path || fileId}`);
      return null; 
    }

    const file = await this.request('PATCH', `files/${targetId}`, {
      body: { trashed: true }
    });
    
    if (file && targetPath) {
      const cacheKeys = Object.keys(this._idCache);
      for (const key of cacheKeys) {
        if (key === targetPath || key.startsWith(`${targetPath}/`)) {
          delete this._idCache[key];
        }
      }
    }
    
    return file;
  }
  
  async removeAllFiles() {
    const list = await this.listFiles({path: ''});
    if (!list || list.length === 0) return [];
    
    // 💡 修正: 逐次 await してログを出しつつ安全に一元管理して削除する
    const results = [];
    for (let file of list) {
      const res = await this.removeFile({fileId: file.id});
      console.log('Deleted:', file.name, res);
      results.push(res);
    }
    return results;
  }

  async saveFile({path, fileId, data, mimeType="application/json"}) {
    const cleanPath = this.filterPath({path});
    if (!cleanPath) return {
      ok: false
    }
    
    // 既に作成されている場合は_fileIdが取得できる。
    const {path: _path, fileId: _fileId} = await this.integration({path, fileId});
    let _mimeType = mimeType;
    
    let bodyData = data;
    if (typeof data === "object" && !(data instanceof Blob) && !(data instanceof ArrayBuffer)) {
      bodyData = JSON.stringify(data);
      _mimeType = "application/json";
    }
    
    this.progress('saveFile', 'start');
    
    // 既にファイルが存在する場合
    if (_fileId && _fileId !== 'appDataFolder') {
      const res = await this.request('PATCH',
        `upload/drive/v3/files/${_fileId}`,
        {
          origin: true,
          params: {
            uploadType: 'media'
          },
          headers: {
            'Content-Type': _mimeType
          },
          body: bodyData
        }
      );
      
      this.progress('saveFile', 'update:done');
      return res;
    } else {
      // ファイルが存在しない場合
      
      const list = cleanPath.split('/');
      const name = list.pop();
      let parentId = (await this.getParentId({path: cleanPath}))?[0] : null;
      if(!parentId)
        parentId = await this.createFolder({path: list.join('/')});
      
      const created = await this.createFile({
        parentId,
        name,
        mimeType: _mimeType
      });
      
      const res = await this.request(
        'PATCH',
        `upload/drive/v3/files/${created.id}`,
        {
          origin: true,
          params: {
            uploadType: 'media'
          },
          headers: {
            'Content-Type': _mimeType
          },
          body: bodyData
        }
      );
      
      console.log('file size:', bodyData.length);
      
      this.progress('saveFile', 'create:done');
      return res;
    }
  }
  
  async getFile({path, fileId}) {
    const _fileId = fileId ?? await this.getFileId({path});
    if (!_fileId) {
      console.log('ファイルが見つかりません');
      return null;
    }
    this.progress('getInfo', await this.getFileInfo({fileId: _fileId}));
    const res = await this.request('GET', `files/${_fileId}`, {
      params: {alt: 'media'}
    });
    return res;
  }
  
  async #miniGetStructure({parentPath, parentId}) {
    if (!parentId) return null;
    const q = `'${parentId}' in parents and trashed = false`;
    const fields = 'nextPageToken, files(id, name, mimeType, size)';
    let structure = {};
    let pageToken = null;
    
    do {
      const params = {
        q,
        spaces: 'appDataFolder',
        fields: fields,
        pageSize: 100
      };
      
      if (pageToken) params.pageToken = pageToken;
      
      const res = await this.request('GET', 'files', { params });
      
      if (res.files && res.files.length > 0) {
        for (let file of res.files) {
          const childPath = parentPath ? `${parentPath}/${file.name}` : file.name;
          this._idCache[childPath] = file.id;
          
          // フォルダ
          if (file.mimeType === 'application/vnd.google-apps.folder') {
            structure[file.name] = await this.#miniGetStructure({parentPath: childPath, parentId: file.id});
          } else { // ファイル
            structure[file.name] = {
              file: true,
              mimeType: file.mimeType,
              fileId: file.id,
              size: file.size
            };
          }
        }
      }
      
      pageToken = res.nextPageToken;
    } while (pageToken);
    
    return structure
  }
  
  async getStructure() {
    const parentPath = '';
    const parentId = 'appDataFolder';
    
    return structuredClone(await this.#miniGetStructure({parentPath, parentId}));
  }
  
  async search({keyword, ancestor, parent, mimeType}, {limit=20, offset=0, sortBy="created_date"}) {
    if (path === undefined && id === undefined && name === undefined) return;
    let id = null;
    const cleanPath = this.filterPath({path});
    if (cleanPath)
      return fileId = await this.fileId({path: cleanPath});
    
    
  }

    <script>

      function logResult(title, data, isError = false) {
        const timestamp = new Date().toLocaleTimeString();
        let logText = `[${timestamp}] === ${title} ===\n`;
        if (isError) {
          logText += `❌ ERROR CODE: ${data.code || 'UNKNOWN'}\nMessage: ${data.message || data}\n`;
          if (data.stack) logText += `${data.stack}\n`;
        } else {
          logText += typeof data === 'object' ? JSON.stringify(data, null, 2) : data;
        }
        elConsole.innerText = logText + '\n\n' + elConsole.innerText;
        console.log(`[Playground] ${title}`, data);
      }

      function logProgress(phase, detail) {
        const p = document.createElement('div');
        p.textContent = `[${phase}] ${typeof detail === 'object' ? JSON.stringify(detail) : detail}`;
        elProgress.insertBefore(p, elProgress.firstChild);
      }

      document.getElementById('btnClearConsole').addEventListener('click', () => {
        elConsole.innerText = 'コンソールをクリアしました。';
