<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="2～4人で遊べるリバーシのブラウザゲーム。ローカル対戦・オンライン対戦(P2P)の両方に対応しています。">
    <title>Reversi</title>
    <link rel="stylesheet" href="/statics/main-style.css" />
    <script type="module" src="/statics/main-script.js"></script>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        width: 100vw;
        background: grey;
        padding: 4px 10px;
        box-sizing: border-box;
        gap: 4px;
      }

      .headerRow {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 2px;
      }

      .label {
        margin: auto 0px auto 2px;
        color: black;
        background: white;
      }

      select, input {
        box-sizing: border-box;
        margin: 2px;
        border: none;
        height: 36px;
        border-radius: 0px;
        font-size: 16px;
      }

      #explain {
        color: white;
        margin-left: 50px;
        background: #dd2500;
      }

      #roomIdInput {
        width: 120px;
      }

      #connectButton {
        color: white;
        background: #2266cc;
      }

      #connectionStatus {
        margin: auto 0px auto 10px;
        color: white;
        font-family: sans-serif;
        font-size: 14px;
      }

      #myPlayerBadge {
        margin: auto 0px auto 10px;
        color: white;
        font-family: sans-serif;
        font-size: 14px;
        display: none;
      }

      #main {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        min-height: 0;
        position: relative;
      }

      #boardArea {
        flex: 1 1 auto;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 0;
      }

      #canvas {
        display: block;
      }

      footer {
        flex-shrink: 0;
        width: 100vw;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
        border-top: 1px solid black;
        box-sizing: border-box;
      }

      #overlay-button {
        border: none;
        height: 25px;
        border-radius: 0px;
        font-size: 20px;
      }

      #overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      #overlay-area {
        background: white;
        padding: 20px 40px;
        border-radius: 8px;
        text-align: center;
        font-size: 18px;
        max-width: 80vw;
      }

      #connectingOverlay {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        z-index: 900;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        font-family: sans-serif;
        text-align: center;
        gap: 12px;
      }

      #connectingOverlay .spinnerText {
        font-size: 18px;
      }

      #connectingOverlay .peerCount {
        font-size: 15px;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="headerRow">
        <nav class="breadcrumb" data-bg-color="rgba( 255, 255, 255, 0.3)"></nav>
        <span class="label">モード:</span>
        <select id="modeSelect">
          <option value="local">ローカル(1台)</option>
          <option value="online">通信対戦</option>
        </select>
        <span class="label">user:</span>
        <select id="userNum">
          <option>2</option>
          <option>3</option>
          <option>4</option>
        </select>
        <span class="label">size:</span>
        <select id="size">
          <option>6</option>
          <option selected>8</option>
          <option>10</option>
          <option>12</option>
          <option>14</option>
          <option>20</option>
        </select>
        <span class="label">補助:</span>
        <select id="assist">
          <option>あり</option>
          <option>なし</option>
        </select>
        <span class="label" id="extinctLabel">全滅:</span>
        <select id="extinct">
          <option>あり</option>
          <option selected>なし</option>
        </select>
        <input type="button" value="新規開始" id="startButton" onclick="start();">
        <input type="button" value="遊び方" id="explain" onclick="explain();">
      </div>
      <div class="headerRow" id="onlinePanel" style="display: none;">
        <span class="label">部屋ID:</span>
        <input type="text" id="roomIdInput" placeholder="room123">
        <input type="button" value="接続" id="connectButton" onclick="connectOnline();">
        <span id="connectionStatus">未接続</span>
        <span id="myPlayerBadge"></span>
      </div>
    </header>

    <div id="main">
      <div id="boardArea">
        <canvas id="canvas"></canvas>
      </div>

      <div id="connectingOverlay">
        <div class="spinnerText" id="connectingOverlayText">相手の接続を待っています…</div>
        <div class="peerCount" id="peerCountText">接続人数: 1人</div>
      </div>
    </div>

    <footer id="footer"></footer>

    <div id="overlay">
      <div id="overlay-area">
        <div id="overlay-text">
          ようこそ!<br>
          <span style="color: red;">※3・4人用でプレイする場合は、<br>
          ヘッダーの「遊び方」をご参照ください。<br>
          ⚠️人数/盤面サイズを変更すると、<span style="color: #700">盤面がリセット</span>されます。
          </span>
        </div>
        <input type="button" id="overlay-button" value="OK" onclick="closeOverlay()">
      </div>
    </div>

    <script type="module">
      import Transmission from "./transmission.js";

      const COLORS = {
        1: "black",
        2: "white",
        3: "#cc0000",
        4: "#0000cc",
      };

      const SIGNALING_SERVER_URL = "signaling-server-dman.onrender.com";

      window.onload = () => {
        window.tm = null;

        const canvas = document.getElementById("canvas");
        const sizeElem = document.getElementById("size");
        const userElem = document.getElementById("userNum");
        const assistElem = document.getElementById("assist");
        const extinctElem = document.getElementById("extinct");
        const extinctLabelElem = document.getElementById("extinctLabel");
        const footerElem = document.getElementById("footer");
        const overlayElem = document.getElementById("overlay");
        const overlayTextElem = document.getElementById("overlay-text");
        const modeSelectElem = document.getElementById("modeSelect");
        const onlinePanelElem = document.getElementById("onlinePanel");
        const roomIdInputElem = document.getElementById("roomIdInput");
        const connectionStatusElem = document.getElementById("connectionStatus");
        const startButtonElem = document.getElementById("startButton");
        const myPlayerBadgeElem = document.getElementById("myPlayerBadge");
        const boardAreaElem = document.getElementById("boardArea");
        const connectingOverlayElem = document.getElementById("connectingOverlay");
        const connectingOverlayTextElem = document.getElementById("connectingOverlayText");
        const peerCountTextElem = document.getElementById("peerCountText");

        let l = Math.min(boardAreaElem.clientWidth, boardAreaElem.clientHeight) - 20;
        canvas.width = l;
        canvas.height = l;
        const ctx = canvas.getContext("2d");

        // ---- ゲーム状態 ----
        let map = [];
        let validList = [];
        let assist = true;
        let extinctAllowed = false; 
        let user = 3;               
        let num = 8;                
        let r = l / num;
        let player = 1;             
        let extinctList = [];       

        // ---- 通信対戦の状態 ----
        let mode = "local";         
        let myPlayer = null;        
        let isHost = false;         
        let connectedPeerCount = 1; 

        function updateConnectingOverlay(status) {
          if (mode !== "online" || status === "CONNECTED") {
            connectingOverlayElem.style.display = "none";
            return;
          }
          connectingOverlayElem.style.display = "flex";
          connectingOverlayTextElem.textContent =
            status === "WAITING" ? "参加者の接続を待っています…" :
            status === "CONNECTING" ? "接続処理中…" :
            status === "DISCONNECTED" ? "接続が切断されました" :
            "通信対戦の準備をしています…";
          peerCountTextElem.textContent = "接続人数: " + connectedPeerCount + "人";
        }

        // 基本のローカル表示用。自分にしか見せたくない警告などに使う。
        function showLocalOverlay(html) {
          overlayTextElem.innerHTML = html;
          overlayElem.style.display = "flex";
        }

        // 【修正】全員の画面に表示させる大事なメッセージ用の関数
        function showGlobalOverlay(html, fromRemote = false) {
          overlayTextElem.innerHTML = html;
          overlayElem.style.display = "flex";

          // オンライン対戦中、かつリモート（相手）から受信したものでないなら全員へ送信
          if (mode === "online" && window.tm && !fromRemote) {
            window.tm.sendData("udp", {
              reason: "MSG",
              html: html
            });
          }
        }

        window.closeOverlay = () => {
          overlayElem.style.display = "none";
        };

        function activePlayers() {
          const list = [];
          for (let p = 1; p <= user; p++) {
            if (!extinctList.includes(p)) list.push(p);
          }
          return list;
        }

        function updateExtinctControlState() {
          const disabled = user === 2 || (mode === "online" && !isHost);
          extinctLabelElem.style.opacity = user === 2 ? "0.2" : "1";
          extinctElem.style.opacity = user === 2 ? "0.2" : "1";
          extinctElem.disabled = disabled;
        }

        function view() {
          ctx.clearRect(0, 0, l, l);
          ctx.fillStyle = "#008800";
          ctx.fillRect(0, 0, l, l);
          ctx.strokeStyle = "black";
          for (let k = 1; k < num; k++) {
            ctx.beginPath();
            ctx.moveTo(k * r, 0);
            ctx.lineTo(k * r, l);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, k * r);
            ctx.lineTo(l, k * r);
            ctx.stroke();
          }

          if (assist && (mode === "local" || player === myPlayer)) {
            ctx.strokeStyle = COLORS[player];
            for (const [x, y] of validList) {
              ctx.beginPath();
              ctx.arc(x * r + r / 2, y * r + r / 2, r / 4, 0, 2 * Math.PI);
              ctx.stroke();
            }
          }

          for (let row = 0; row < num; row++) {
            for (let col = 0; col < num; col++) {
              const stone = map[row][col];
              if (stone !== 0) {
                ctx.beginPath();
                ctx.fillStyle = COLORS[stone];
                ctx.arc(col * r + r / 2, row * r + r / 2, (3 * r) / 8, 0, 2 * Math.PI);
                ctx.fill();
              }
            }
          }
        }

        function renderFooter() {
          footerElem.innerHTML = "";
          for (let p = 1; p <= user; p++) {
            if (extinctList.includes(p)) continue;

            const span = document.createElement("span");
            span.style.display = "flex";
            span.style.alignItems = "center";
            span.style.gap = "5px";

            const circle = document.createElement("div");
            circle.style.width = "20px";
            circle.style.height = "20px";
            circle.style.borderRadius = "50%";
            circle.style.background = COLORS[p];
            circle.style.border = p === player ? "3px solid gold" : "1px solid #333";

            const count = map.flat().filter((v) => v === p).length;

            span.appendChild(circle);
            span.appendChild(document.createTextNode("Player" + p + ": " + count + "石"));
            footerElem.appendChild(span);
          }
        }

        function renderMyPlayerBadge() {
          if (mode !== "online" || myPlayer === null) {
            myPlayerBadgeElem.style.display = "none";
            return;
          }
          myPlayerBadgeElem.style.display = "block";
          myPlayerBadgeElem.textContent = "あなたは Player" + myPlayer + " (" + COLORS[myPlayer] + ")";
        }

        window.explain = () => {
          showLocalOverlay(`このゲームは2～4人で遊べるオセロ風ゲームです。<br>
・プレイヤーは順番に空きマスに自分の石を置き、縦・横・斜めで相手の石を挟むと自分の色に変えられます。<br>
  ・人数を変更すると、<span style="color: #700">盤面がリセット</span>されます。<br>
  ・「全滅」"あり"の場合、<span style="color: #700">3人以上でのプレイでは、置いた結果、他プレイヤーの石がなくなる場所には置けません。</span><br>
  ・「全滅」を"なし"にした場合、置ける場所がない場合は手番がスキップされます。<br>
  ・全員が置ける場所を失した時点でゲームは終了し、石の数が最も多いプレイヤーが勝利です。<br><br>
  ・「通信対戦」を選ぶと、同じ部屋IDを入力した相手とオンラインで対戦できます。<br>
  ・部屋を作成した側がホストとなり、盤面設定(人数・サイズなど)を管理します。`);
        };

        function stonesToFlip(x, y, forPlayer) {
          const dx = [-1, 0, 1, -1, 1, -1, 0, 1];
          const dy = [-1, -1, -1, 0, 0, 1, 1, 1];
          const flips = [];

          for (let k = 0; k < 8; k++) {
            let nx = x + dx[k];
            let ny = y + dy[k];
            const line = [];

            while (nx >= 0 && nx < num && ny >= 0 && ny < num) {
              const stone = map[ny][nx];
              if (stone === 0) break;
              if (stone === forPlayer) {
                flips.push(...line);
                break;
              }
              line.push([nx, ny]);
              nx += dx[k];
              ny += dy[k];
            }
          }
          return flips;
        }

        function checkStone(x, y, forPlayer) {
          if (map[y][x] !== 0) return "すでに置かれているため配置できません。";

          const flips = stonesToFlip(x, y, forPlayer);
          if (flips.length === 0) return "返す石がないため配置できません。";

          if (!extinctAllowed && user >= 3) {
            for (const p of activePlayers()) {
              if (p === forPlayer) continue;
              const total = map.flat().filter((v) => v === p).length;
              const flipped = flips.filter(([fx, fy]) => map[fy][fx] === p).length;
              if (total === flipped) {
                return "player" + p + "の石が無くなるため配置できません。";
              }
            }
          }

          return flips;
        }

        function check(x, y) {
          if (x < 0 || y < 0 || x >= num || y >= num) return "盤面の外には配置できません。";
          return checkStone(x, y, player);
        }

        function hasValidMove(forPlayer) {
          const moves = [];
          for (let y = 0; y < num; y++) {
            for (let x = 0; x < num; x++) {
              if (typeof checkStone(x, y, forPlayer) !== "string") moves.push([x, y]);
            }
          }
          return moves;
        }

        function placeStone(x, y, flips) {
          map[y][x] = player;
          for (const [fx, fy] of flips) map[fy][fx] = player;
        }

        function updateExtinctList() {
          for (const p of activePlayers()) {
            const remaining = map.flat().filter((v) => v === p).length;
            if (remaining === 0) {
              extinctList.push(p);
              // 【修正】全滅は重要なゲーム進行情報なので全員に通知
              showGlobalOverlay("player" + p + "の石が無くなりました。");
            }
          }
        }

        function finish() {
          let result = "";
          const counts = [];
          for (let p = 1; p <= user; p++) {
            const count = map.flat().filter((v) => v === p).length;
            counts.push(count);
            result +=
              '<span style="color: ' + COLORS[p] + '; -webkit-text-stroke: 1px black; text-stroke: 1px black;">player' +
              p + '</span>:<span style="font-weight: bold;">' + count + "</span><br>";
          }

          const maxVal = Math.max(...counts);
          const winners = [];
          for (let i = 0; i < counts.length; i++) {
            if (counts[i] === maxVal) winners.push("player" + (i + 1));
          }

          result += winners.length === user
            ? "引き分け"
            : '勝利:<span style="font-weight: bold;">' + winners.join("と") + "</span>";
          
          // 【修正】ゲーム終了画面は全員に共有
          showGlobalOverlay(result);
        }

        function next() {
          const active = activePlayers();
          if (active.length === 0) {
            finish();
            return;
          }

          const startIndex = Math.max(active.indexOf(player), 0);
          const skipped = [];

          for (let i = 1; i <= active.length; i++) {
            const candidate = active[(startIndex + i) % active.length];
            const moves = hasValidMove(candidate);

            if (moves.length > 0) {
              player = candidate;
              validList = moves;
              for (const p of skipped) {
                // 【修正】パスが発生したことは全員に通知
                showGlobalOverlay("player" + p + "は配置できる場所がないため、スキップします。");
              }
              renderFooter();
              renderMyPlayerBadge();
              return;
            }
            skipped.push(candidate);
          }

          // 【修正】置く場所が全滅して終了するアナウンスを全員に通知
          showGlobalOverlay("置く場所がないため、終了します。");
          finish();
        }

        function init() {
          extinctList = [];
          map = [];
          const emptyRow = () => new Array(num).fill(0);
          for (let k = 0; k < num; k++) map.push(emptyRow());

          updateExtinctControlState();

          if (user === 2) {
            for (let row = 0; row < num; row++) {
              if (row === num / 2 - 1) {
                map[row][row] = 2;
                map[row][row + 1] = 1;
              } else if (row === num / 2) {
                map[row][row - 1] = 1;
                map[row][row] = 2;
              }
            }
          } else if (user === 3) {
            for (let row = 0; row < num; row++) {
              if (row === (num - 1) / 2 - 1) {
                map[row][row] = 2;
                map[row][row + 1] = 1;
                map[row][row + 2] = 3;
              } else if (row === (num - 1) / 2) {
                map[row][row - 1] = 3;
                map[row][row] = 2;
                map[row][row + 1] = 1;
              } else if (row === (num - 1) / 2 + 1) {
                map[row][row - 2] = 1;
                map[row][row - 1] = 3;
                map[row][row] = 2;
              }
            }
          } else if (user === 4) {
            for (let row = 0; row < num; row++) {
              if (row === num / 2 - 2) {
                map[row][row] = 1;
                map[row][row + 2] = 3;
                map[row][row + 3] = 2;
              } else if (row === num / 2 - 1) {
                map[row][row - 1] = 2;
                map[row][row] = 4;
                map[row][row + 1] = 1;
              } else if (row === num / 2) {
                map[row][row - 1] = 3;
                map[row][row] = 2;
                map[row][row + 1] = 4;
              } else if (row === num / 2 + 1) {
                map[row][row - 3] = 4;
                map[row][row - 2] = 1;
                map[row][row] = 3;
              }
            }
          }

          player = 1;
          validList = hasValidMove(player);
          view();
          renderFooter();
          renderMyPlayerBadge();
        }

        window.start = () => {
          if (mode === "online" && !isHost) return;

          user = parseInt(userElem.value, 10);
          num = parseInt(sizeElem.value, 10);
          r = l / num;
          init();

          if (mode === "online" && window.tm) {
            broadcastFullState("init");
          }
        };

        assistElem.addEventListener("change", (e) => {
          assist = e.target.value === "あり";
          view();
        });

        extinctElem.addEventListener("change", (e) => {
          if (user === 2 || (mode === "online" && !isHost)) return;
          extinctAllowed = e.target.value === "あり";
          validList = hasValidMove(player);
          view();

          if (mode === "online" && window.tm) {
            broadcastFullState("settings");
          }
        });

        sizeElem.addEventListener("change", () => {
          if (mode === "online" && !isHost) return; 
          start();
        });

        userElem.addEventListener("change", () => {
          if (mode === "online" && !isHost) return;

          if (userElem.value === "2") {
            sizeElem.innerHTML = `
              <option>6</option>
              <option selected>8</option>
              <option>10</option>
              <option>12</option>
              <option>14</option>
              <option>20</option>
            `;
          } else if (userElem.value === "3") {
            sizeElem.innerHTML = `
              <option>7</option>
              <option selected>9</option>
              <option>11</option>
              <option>13</option>
              <option>15</option>
              <option>21</option>
            `;
          } else if (userElem.value === "4") {
            sizeElem.innerHTML = `
              <option>8</option>
              <option selected>10</option>
              <option>12</option>
              <option>14</option>
              <option>16</option>
              <option>22</option>
            `;
          }
          start();
        });

        function attemptMove(x, y) {
          const ret = check(x, y);
          if (typeof ret === "string") {
            // 【修正】置けない警告は本人のみのローカル画面に出す
            showLocalOverlay(ret);
            return;
          }

          placeStone(x, y, ret);
          updateExtinctList();
          next();
          view();

          if (mode === "online" && window.tm) {
            broadcastFullState("move");
          }
        }

        function handlePointer(clientX, clientY) {
          if (mode === "online" && player !== myPlayer) {
            // 【修正】手番違いの警告は本人のみのローカル画面に出す
            showLocalOverlay("自分の手番ではありません。");
            return;
          }

          const rect = canvas.getBoundingClientRect();
          const x = Math.floor((clientX - rect.left) / r);
          const y = Math.floor((clientY - rect.top) / r);
          attemptMove(x, y);
        }

        canvas.addEventListener("touchstart", (e) => {
          e.preventDefault();
          handlePointer(e.touches[0].clientX, e.touches[0].clientY);
        });

        canvas.addEventListener("click", (e) => {
          handlePointer(e.clientX, e.clientY);
        });

        // ==== 通信対戦(P2P)関連 ====
        modeSelectElem.addEventListener("change", () => {
          mode = modeSelectElem.value;
          onlinePanelElem.style.display = mode === "online" ? "flex" : "none";

          if (mode === "local") {
            if (window.tm) window.tm.clear();
            window.tm = null;
            myPlayer = null;
            isHost = false;
            connectedPeerCount = 1;
            connectionStatusElem.textContent = "未接続";
            startButtonElem.disabled = false;
            userElem.disabled = false;
            sizeElem.disabled = false;
            updateExtinctControlState();
            renderMyPlayerBadge();
            updateConnectingOverlay("IDLE");
          } else {
            startButtonElem.disabled = true;
            userElem.disabled = true;
            sizeElem.disabled = true;
            updateConnectingOverlay("IDLE");
          }
        });

        function broadcastFullState(reason) {
          if (!window.tm) return;
          window.tm.sendData("udp", {
            reason,
            user,
            num,
            assist,
            extinctAllowed,
            map,
            player,
            extinctList,
            validList,
          });
        }

        function applyFullState(state) {
          user = state.user;
          num = state.num;
          r = l / num;
          assist = state.assist;
          extinctAllowed = state.extinctAllowed;
          map = state.map;
          player = state.player;
          extinctList = state.extinctList;
          validList = state.validList;

          userElem.value = String(user);
          
          if (user === 3) {
            sizeElem.innerHTML = `<option>7</option><option selected>9</option><option>11</option><option>13</option><option>15</option><option>21</option>`;
          } else if (user === 4) {
            sizeElem.innerHTML = `<option>8</option><option selected>10</option><option>12</option><option>14</option><option>16</option><option>22</option>`;
          } else {
            sizeElem.innerHTML = `<option>6</option><option selected>8</option><option>10</option><option>12</option><option>14</option><option>20</option>`;
          }
          
          sizeElem.value = String(num);
          assistElem.value = assist ? "あり" : "なし";
          extinctElem.value = extinctAllowed ? "あり" : "なし";
          updateExtinctControlState();

          view();
          renderFooter();
          renderMyPlayerBadge();
        }

        window.connectOnline = async () => {
          const roomId = roomIdInputElem.value.trim();
          if (!roomId) {
            showLocalOverlay("部屋IDを入力してください。");
            return;
          }

          if (window.tm) {
            window.tm.clear();
            window.tm = null;
          }

          window.tm = new Transmission(SIGNALING_SERVER_URL, roomId);

          isHost = false;
          myPlayer = null;
          connectedPeerCount = 1;
          updateConnectingOverlay("WAITING");

          window.tm.onStatusUpdate = (status) => {
            connectionStatusElem.textContent = statusLabel(status);
            
            if (status === "CONNECTED") {
              const ids = window.tm.getConnectorIds() || [];
              const myId = window.tm.getMyId ? window.tm.getMyId() : window.tm.myId;
              
              const allMembers = [myId, ...ids].filter(Boolean).sort();
              isHost = (allMembers[0] === myId) || ids.length === 0;
              
              myPlayer = isHost ? 1 : allMembers.indexOf(myId) + 1;
              
              connectedPeerCount = allMembers.length;
              startButtonElem.disabled = !isHost;
              userElem.disabled = !isHost;
              sizeElem.disabled = !isHost;
              updateExtinctControlState();

              if (isHost) {
                start();
              }
              renderMyPlayerBadge();
            }

            if (status === "DISCONNECTED") {
              connectedPeerCount = 1;
              showLocalOverlay("相手との接続が切断されました。");
            }

            updateConnectingOverlay(status);
          };

          const handleRoomChange = () => {
            if (window.tm && window.tm.status === "CONNECTED") {
              const ids = window.tm.getConnectorIds() || [];
              const myId = window.tm.getMyId ? window.tm.getMyId() : window.tm.myId;
              const allMembers = [myId, ...ids].filter(Boolean).sort();
              
              isHost = (allMembers[0] === myId);
              myPlayer = allMembers.indexOf(myId) + 1;
              
              connectedPeerCount = allMembers.length;
              peerCountTextElem.textContent = "接続人数: " + connectedPeerCount + "人";
              
              startButtonElem.disabled = !isHost;
              userElem.disabled = !isHost;
              sizeElem.disabled = !isHost;
              
              if (isHost) {
                broadcastFullState("sync");
              }
              renderMyPlayerBadge();
            }
          };

          window.tm.onJoin = handleRoomChange;
          window.tm.onLeave = handleRoomChange;

          window.tm.onDataReceived = (payload) => {
            if (payload) {
              if (payload.reason === "MSG") {
                // 【修正】ゲーム内での重要アナウンス（パス・全滅・終了）のみ同期表示する
                showGlobalOverlay(payload.html, true);
              } else if (payload.reason) {
                applyFullState(payload);
              }
            }
          };

          window.tm.onLog = (type, message) => {
            console.log(`[Transmission Log - ${type}]`, message);
            if (type === "error") {
              showLocalOverlay(message);
            }
          };

          const numPlayers = parseInt(userElem.value, 10);
          const connectionType = numPlayers > 2 ? "mesh" : "p2p";
          
          await window.tm.connect(connectionType);
        };

        function statusLabel(status) {
          switch (status) {
            case "IDLE": return "未接続";
            case "PREPARING": return "準備中";
            case "WAITING": return "マッチング待機中";
            case "CONNECTING": return "接続中";
            case "CONNECTED": return "接続完了";
            case "DISCONNECTED": return "切断";
            default: return status;
          }
        }

        window.addEventListener("resize", () => {
          l = Math.min(boardAreaElem.clientWidth, boardAreaElem.clientHeight) - 20;
          canvas.width = l;
          canvas.height = l;
          r = l / num;
          view();
        });

        start();
      };
    </script>
  </body>
</html>
