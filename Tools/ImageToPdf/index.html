<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>Image to PDF Converter</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
      /* 全体レイアウト */
      body {
        margin: 0;
        padding: 0;
        display: flex;
        height: 100vh;
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
        background-color: #f4f7f6;
        color: #333;
      }

      /* サイドバー設定エリア */
      aside {
        width: 320px;
        padding: 25px;
        background-color: #ffffff;
        border-right: 1px solid #ddd;
        display: flex;
        flex-direction: column;
        gap: 18px;
        box-sizing: border-box;
        overflow-y: auto;
      }

      h2 {
        margin: 0 0 10px 0;
        font-size: 1.2rem;
        border-bottom: 2px solid #007bff;
        padding-bottom: 8px;
      }

      /* メインプレビューエリア */
      main {
        flex: 1;
        padding: 30px;
        overflow-y: auto;
      }

      /* 入力要素の共通スタイル */
      .control-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      label {
        font-size: 13px;
        font-weight: bold;
        color: #555;
      }

      input[type="text"],
      select,
      input[type="file"],
      input[type="range"] {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
      }

      /* ボタン類の共通スタイル */
      .btn {
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
      }

      #btn-save {
        margin-top: 10px;
        background-color: #007bff;
        color: white;
        font-size: 16px;
      }

      #btn-save:hover {
        background-color: #0056b3;
      }

      .btn-outline {
        background-color: #f8f9fa;
        border: 1px solid #ddd;
        color: #555;
        font-size: 12px;
      }

      .btn-outline:hover {
        background-color: #e9ecef;
      }

      /* 画像カードのグリッド表示 */
      #preview-grid {
        display: grid;
        /* スライダーで変更される変数を参照 */
        grid-template-columns: repeat(auto-fill, minmax(var(--thumb-size, 130px), 1fr));
        gap: 15px;
      }

      /* 画像カード（ドラッグ安定化） */
      .image-card {
        background: white;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #e0e0e0;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        cursor: grab;
        text-align: center;
        user-select: none;
        -webkit-user-drag: none;
      }

      .image-card img {
        width: 100%;
        border-radius: 4px;
        pointer-events: none;
        display: block;
      }

      .file-name {
        margin-top: 8px;
        font-size: 10px;
        color: #888;
        word-break: break-all;
        height: 1.2em;
        overflow: hidden;
      }

      /* 生成中のオーバーレイ */
      #overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 1000;
      }
    </style>
  </head>

  <body>

    <div id="overlay">
      <div id="progress-text" style="font-size: 18px;">PDFを生成中... (0/0)</div>
    </div>

    <aside>
      <h2>PDF出力設定</h2>

      <div class="control-group">
        <label>画像を選択（複数可）</label>
        <input type="file" id="input-files" multiple accept="image/*">
      </div>

      <div class="control-group">
        <label>表示サイズ: <span id="label-thumb-size">130</span>px</label>
        <input type="range" id="input-thumb-size" min="80" max="300" value="130">
      </div>

      <div class="control-group">
        <label>名前で並び替え</label>
        <button id="btn-sort" class="btn btn-outline">ファイル名順 (昇順)</button>
      </div>

      <div class="control-group">
        <label>保存ファイル名</label>
        <input type="text" id="input-filename" value="images_to_pdf">
      </div>

      <div class="control-group">
        <label>用紙サイズ</label>
        <select id="select-papersize">
          <optgroup label="A列 (標準)">
            <option value="a3">A3 (297 x 420 mm)</option>
            <option value="a4" selected>A4 (210 x 297 mm)</option>
            <option value="a5">A5 (148 x 210 mm)</option>
            <option value="a6">A6 (105 x 148 mm)</option>
          </optgroup>
          <optgroup label="B列 (日本規格)">
            <option value="b4">B4 (257 x 364 mm)</option>
            <option value="b5">B5 (182 x 257 mm)</option>
            <option value="b6">B6 (128 x 182 mm)</option>
          </optgroup>
          <optgroup label="写真・ハガキ">
            <option value="postcard">ハガキ (100 x 148 mm)</option>
            <option value="l_size">L判 (89 x 127 mm)</option>
            <option value="2l_size">2L判 (127 x 178 mm)</option>
          </optgroup>
        </select>
      </div>

      <div class="control-group">
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
          <input type="checkbox" id="check-portrait" checked>
          <span>縦向き (Portrait)</span>
        </label>
      </div>

      <button id="btn-save" class="btn">PDFを保存する</button>
    </aside>

    <main>
      <div id="preview-grid"></div>
    </main>

    <script>
      /**
       * 用紙寸法の詳細データ (mm単位)
       */
      const PAPER_SIZE_CONFIG = {
        "a3":       { w: 297, h: 420 },
        "a4":       { w: 210, h: 297 },
        "a5":       { w: 148, h: 210 },
        "a6":       { w: 105, h: 148 },
        "b4":       { w: 257, h: 364 },
        "b5":       { w: 182, h: 257 },
        "b6":       { w: 128, h: 182 },
        "postcard": { w: 100, h: 148 },
        "l_size":   { w: 89,  h: 127 },
        "2l_size":  { w: 127, h: 178 }
      };

      const EXPORT_QUALITY_DPI = 150;
      let sortAscending = true; // ソート順の状態管理

      const fileInput = document.getElementById("input-files");
      const previewGrid = document.getElementById("preview-grid");
      const saveButton = document.getElementById("btn-save");
      const thumbSlider = document.getElementById("input-thumb-size");
      const thumbLabel = document.getElementById("label-thumb-size");
      const sortButton = document.getElementById("btn-sort");

      /**
       * 画像選択時の処理
       */
      fileInput.addEventListener("change", function() {
        const files = fileInput.files;

        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          const blobUrl = URL.createObjectURL(file);

          const card = document.createElement("div");
          card.className = "image-card";
          card.dataset.url = blobUrl;
          card.dataset.name = file.name; // ソート用にファイル名を保持

          card.innerHTML = `
            <img src="${blobUrl}">
            <div class="file-name">${file.name}</div>
          `;

          // ダブルクリックで削除する機能を追加
          card.addEventListener("dblclick", function() {
            const result = confirm("この画像を削除しますか？\n" + file.name);
            if (result === true) {
              card.remove();
            }
          });

          previewGrid.appendChild(card);
        }
      });

      /**
       * 表示サイズの変更（スライダー）
       */
      thumbSlider.addEventListener("input", function() {
        const value = thumbSlider.value;
        thumbLabel.innerText = value;
        // CSS変数を使ってグリッドのサイズを一括変更
        document.documentElement.style.setProperty("--thumb-size", value + "px");
      });

      /**
       * ファイル名での並び替え
       */
      sortButton.addEventListener("click", function() {
        const cards = Array.from(document.querySelectorAll(".image-card"));
        
        cards.sort(function(a, b) {
          const nameA = a.dataset.name.toLowerCase();
          const nameB = b.dataset.name.toLowerCase();
          
          if (sortAscending === true) {
            return nameA.localeCompare(nameB);
          } else {
            return nameB.localeCompare(nameA);
          }
        });

        // 並び替えた要素を再配置
        cards.forEach(function(card) {
          previewGrid.appendChild(card);
        });

        // 状態を反転させ、ボタンのテキストを更新
        sortAscending = !sortAscending;
        sortButton.innerText = sortAscending ? "ファイル名順 (昇順)" : "ファイル名順 (降順)";
      });

      /**
       * ドラッグ&ドロップ並び替えの初期化
       */
      new Sortable(previewGrid, {
        animation: 200,
        forceFallback: true,
        fallbackTolerance: 3
      });

      /**
       * PDF生成実行
       */
      saveButton.addEventListener("click", async function() {
        const cards = document.querySelectorAll(".image-card");
        
        if (cards.length === 0) {
          alert("画像が追加されていません。");
          return;
        }

        const overlay = document.getElementById("overlay");
        const progressDisplay = document.getElementById("progress-text");
        overlay.style.display = "flex";

        const sizeKey = document.getElementById("select-papersize").value;
        const isPortrait = document.getElementById("check-portrait").checked;
        const filename = document.getElementById("input-filename").value;

        const basePaper = PAPER_SIZE_CONFIG[sizeKey];
        
        let pageWidth, pageHeight, orientationCode;

        if (isPortrait === true) {
          pageWidth = basePaper.w;
          pageHeight = basePaper.h;
          orientationCode = "p";
        } else {
          pageWidth = basePaper.h;
          pageHeight = basePaper.w;
          orientationCode = "l";
        }

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          orientation: orientationCode,
          unit: "mm",
          format: [pageWidth, pageHeight]
        });

        for (let i = 0; i < cards.length; i++) {
          progressDisplay.innerText = "生成中... (" + (i + 1) + " / " + cards.length + ")";

          if (i > 0) {
            pdf.addPage([pageWidth, pageHeight], orientationCode);
          }

          const currentImageUrl = cards[i].dataset.url;
          const layoutData = await processImageForPdf(currentImageUrl, pageWidth, pageHeight);

          pdf.addImage(
            layoutData.data,
            "JPEG",
            layoutData.x,
            layoutData.y,
            layoutData.width,
            layoutData.height
          );

          await new Promise(function(resolve) {
            setTimeout(resolve, 10);
          });
        }

        pdf.save(filename + ".pdf");
        overlay.style.display = "none";
      });

      /**
       * 画像を解析し、用紙に最適化された配置データを返す
       */
      async function processImageForPdf(url, pw, ph) {
        return new Promise(function(resolve) {
          const img = new Image();
          
          img.onload = function() {
            const imgW = img.width;
            const imgH = img.height;
            const imgRatio = imgW / imgH;
            const pageRatio = pw / ph;

            let drawW, drawH;
            if (imgRatio > pageRatio) {
              drawW = pw;
              drawH = pw / imgRatio;
            } else {
              drawH = ph;
              drawW = ph * imgRatio;
            }

            const posX = (pw - drawW) / 2;
            const posY = (ph - drawH) / 2;

            const canvas = document.createElement("canvas");
            canvas.width = Math.round((drawW / 25.4) * EXPORT_QUALITY_DPI);
            canvas.height = Math.round((drawH / 25.4) * EXPORT_QUALITY_DPI);
            
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            resolve({
              data: canvas.toDataURL("image/jpeg", 0.8),
              width: drawW,
              height: drawH,
              x: posX,
              y: posY
            });
          };
          img.src = url;
        });
      }
    </script>
  </body>
</html>
