<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPLAY — Video Player</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400&display=swap');

      :root {
        --bg:       #080a0f;
        --surface:  #0e1118;
        --surface2: #151b26;
        --border:   #1e2738;
        --accent:   #00e5ff;
        --text:     #e8edf5;
        --text-dim: #5a6478;
        --text-mid: #8a94a8;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'Syne', sans-serif;
        overflow: hidden;
        user-select: none;
      }

      /* ─────────────────────────────────────────
         UPLOAD SCREEN
      ───────────────────────────────────────── */
      #upload-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 32px;
        background: var(--bg);
        z-index: 100;
        transition: opacity .4s, visibility .4s;
      }
      #upload-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .logo {
        font-size: 48px; font-weight: 800; letter-spacing: -2px;
        color: var(--accent);
        text-shadow: 0 0 40px rgba(0,229,255,.3);
      }
      .logo span { color: var(--text-dim); }

      .drop-zone {
        width: 480px; max-width: 90vw;
        border: 2px dashed var(--border);
        border-radius: 20px;
        padding: 60px 40px;
        text-align: center;
        cursor: pointer;
        transition: border-color .3s, background .3s, transform .2s;
        background: var(--surface);
        position: relative;
      }
      .drop-zone:hover,
      .drop-zone.drag-over {
        border-color: var(--accent);
        background: rgba(0,229,255,.03);
        transform: scale(1.01);
      }
      .drop-zone-icon {
        font-size: 52px; margin-bottom: 20px; display: block;
        filter: drop-shadow(0 0 16px rgba(0,229,255,.4));
      }
      .drop-zone h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
      .drop-zone p  { color: var(--text-dim); font-size: 14px; font-family: 'JetBrains Mono', monospace; }
      .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
      .supported { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }

      /* ─────────────────────────────────────────
         LOADING SCREEN
      ───────────────────────────────────────── */
      #loading-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px;
        background: var(--bg);
        z-index: 99;
        opacity: 0; visibility: hidden;
        transition: opacity .4s, visibility .4s;
      }
      #loading-screen.visible { opacity: 1; visibility: visible; }

      .loading-label {
        font-size: 11px; font-family: 'JetBrains Mono', monospace;
        color: var(--text-dim); letter-spacing: 4px; text-transform: uppercase;
      }
      .loading-filename {
        font-size: 18px; font-weight: 700; color: var(--text);
        max-width: 70vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .loading-pct {
        font-family: 'JetBrains Mono', monospace;
        font-size: 56px; font-weight: 300;
        color: var(--accent); line-height: 1;
        min-width: 5ch; text-align: right;
        transition: color .3s;
      }
      .loading-pct.done { color: #00ff9d; }

      .progress-track {
        width: 420px; max-width: 82vw; height: 3px;
        background: var(--border); border-radius: 99px; overflow: hidden;
      }
      .progress-bar {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, var(--accent), #00b8ff);
        border-radius: 99px;
        box-shadow: 0 0 10px var(--accent);
        transition: width .3s linear;
      }

      .loading-status {
        font-size: 12px; font-family: 'JetBrains Mono', monospace;
        color: var(--text-dim); min-height: 1.5em; transition: color .3s;
      }
      .loading-status.ready { color: #00ff9d; }

      /* ─────────────────────────────────────────
         PLAYER SCREEN
      ───────────────────────────────────────── */
      #player-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        background: #000;
        opacity: 0; visibility: hidden;
        transition: opacity .5s, visibility .5s;
      }
      #player-screen.visible { opacity: 1; visibility: visible; }

      .video-wrap {
        flex: 1; min-height: 0;
        position: relative;
        display: flex; align-items: center; justify-content: center;
        background: #000; cursor: none; overflow: hidden;
      }
      video {
        max-width: 100%; max-height: 100%;
        display: block; outline: none;
      }

      .cursor-dot {
        position: absolute;
        width: 8px; height: 8px;
        background: var(--accent); border-radius: 50%;
        pointer-events: none;
        transform: translate(-50%, -50%);
        opacity: 0; transition: opacity .3s;
        z-index: 10; box-shadow: 0 0 8px var(--accent);
      }

      .center-overlay {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        display: flex; align-items: center; justify-content: center;
        width: 80px; height: 80px; border-radius: 50%;
        background: rgba(0,0,0,.55);
        border: 2px solid rgba(255,255,255,.15);
        font-size: 28px; pointer-events: none;
        opacity: 0; transition: opacity .25s; z-index: 20;
      }
      .center-overlay.show { opacity: 1; }

      .skip-label {
        position: absolute; top: 50%; transform: translateY(-50%);
        font-size: 13px; font-family: 'JetBrains Mono', monospace;
        color: rgba(255,255,255,.7);
        pointer-events: none; opacity: 0; transition: opacity .3s;
      }
      .skip-label.left  { left: 24px; }
      .skip-label.right { right: 24px; }
      .skip-label.show  { opacity: 1; }

      /* ─────────────────────────────────────────
         CONTROLS
      ───────────────────────────────────────── */
      .controls {
        background: linear-gradient(to top, #000, rgba(0,0,0,.92));
        padding: 10px 20px 16px;
        display: flex; flex-direction: column; gap: 10px;
        flex-shrink: 0;
      }

      .seek-row {
        display: flex; align-items: center; gap: 12px;
      }
      .time-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px; color: var(--text-mid);
        white-space: nowrap; min-width: 90px;
      }

      .slider-wrap {
        position: relative; flex: 1; height: 20px;
        display: flex; align-items: center; cursor: pointer;
      }
      .slider-track {
        position: absolute; left: 0; right: 0; height: 4px;
        background: var(--border); border-radius: 99px; overflow: hidden;
        transition: height .15s;
      }
      .slider-wrap:hover .slider-track { height: 6px; }

      .slider-buffered {
        position: absolute; left: 0; height: 100%;
        background: rgba(255,255,255,.15);
        border-radius: 99px; width: 0%; pointer-events: none;
      }
      .slider-fill {
        position: relative; height: 100%;
        background: linear-gradient(90deg, var(--accent), #00b8ff);
        border-radius: 99px; width: 0%;
        box-shadow: 0 0 8px rgba(0,229,255,.4);
      }
      .slider-thumb {
        position: absolute;
        width: 14px; height: 14px;
        background: #fff; border-radius: 50%;
        top: 50%; transform: translate(-50%, -50%); left: 0%;
        box-shadow: 0 0 0 3px rgba(0,229,255,.3);
        pointer-events: none; transition: transform .1s, box-shadow .1s;
      }
      .slider-wrap:hover .slider-thumb {
        transform: translate(-50%, -50%) scale(1.3);
        box-shadow: 0 0 0 4px rgba(0,229,255,.4);
      }

      .btn-row {
        display: flex; align-items: center; gap: 6px;
      }
      .btn {
        background: none; border: none; cursor: pointer;
        color: var(--text-mid);
        display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border-radius: 8px; font-size: 16px;
        transition: color .2s, background .2s, transform .1s;
        flex-shrink: 0;
      }
      .btn:hover  { color: var(--accent); background: rgba(0,229,255,.08); }
      .btn:active { transform: scale(.9); }
      .btn.primary {
        color: var(--text); font-size: 20px; width: 44px; height: 44px;
      }
      .btn.primary:hover { color: var(--accent); }

      .separator { flex: 1; }

      .vol-group {
        display: flex; align-items: center; gap: 6px;
      }
      .vol-slider { width: 80px; }

      .speed-btn {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px; padding: 0 10px; width: auto;
        border: 1px solid var(--border); border-radius: 6px;
      }
      .speed-btn:hover { border-color: var(--accent); }

      .speed-popup {
        position: absolute; bottom: calc(100% + 6px); right: 0;
        background: var(--surface2); border: 1px solid var(--border);
        border-radius: 10px; overflow: hidden;
        opacity: 0; visibility: hidden; transform: translateY(6px);
        transition: opacity .2s, transform .2s, visibility .2s;
        z-index: 50; min-width: 90px;
      }
      .speed-popup.open { opacity: 1; visibility: visible; transform: translateY(0); }
      .speed-opt {
        padding: 10px 16px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px; color: var(--text-mid); cursor: pointer;
        transition: background .15s, color .15s;
      }
      .speed-opt:hover  { background: rgba(0,229,255,.08); color: var(--accent); }
      .speed-opt.active { color: var(--accent); }

      .new-file-btn {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px; padding: 0 10px; width: auto;
        border: 1px solid var(--border); border-radius: 6px; letter-spacing: .5px;
      }
    </style>
  </head>
  <body>

    <!-- ── UPLOAD ── -->
    <div id="upload-screen">
      <div class="logo">VP<span>LAY</span></div>
      <div class="drop-zone" id="drop-zone">
        <span class="drop-zone-icon">🎬</span>
        <h2>動画ファイルをドロップ</h2>
        <p>またはクリックしてファイルを選択</p>
        <input type="file" id="file-input" accept="video/*">
      </div>
      <div class="supported">MP4 · MOV · MKV · AVI · WEBM · その他</div>
    </div>

    <!-- ── LOADING ── -->
    <div id="loading-screen">
      <div class="loading-label">Loading</div>
      <div class="loading-filename" id="loading-filename">—</div>
      <div class="loading-pct" id="loading-pct">0%</div>
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="loading-status" id="loading-status">バッファリング中...</div>
    </div>

    <!-- ── PLAYER ── -->
    <div id="player-screen">
      <div class="video-wrap" id="video-wrap">
        <div class="cursor-dot" id="cursor-dot"></div>
        <video id="video" preload="auto" playsinline></video>
        <div class="center-overlay" id="center-overlay">▶</div>
        <div class="skip-label left"  id="skip-left">◀◀ 15秒</div>
        <div class="skip-label right" id="skip-right">15秒 ▶▶</div>
      </div>

      <div class="controls">
        <div class="seek-row">
          <span class="time-label" id="time-label">0:00 / 0:00</span>
          <div class="slider-wrap" id="seek-wrap">
            <div class="slider-track">
              <div class="slider-buffered" id="buf-fill"></div>
              <div class="slider-fill" id="seek-fill"></div>
            </div>
            <div class="slider-thumb" id="seek-thumb"></div>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn"         id="btn-back15">⏮</button>
          <button class="btn primary" id="btn-play">▶</button>
          <button class="btn"         id="btn-fwd15">⏭</button>
          <div class="separator"></div>
          <div class="vol-group">
            <button class="btn" id="btn-mute">🔊</button>
            <div class="slider-wrap vol-slider" id="vol-wrap">
              <div class="slider-track">
                <div class="slider-fill" id="vol-fill"></div>
              </div>
              <div class="slider-thumb" id="vol-thumb"></div>
            </div>
          </div>
          <div style="position:relative">
            <button class="btn speed-btn" id="btn-speed">1.0x</button>
            <div class="speed-popup" id="speed-popup">
              <div class="speed-opt" data-speed="0.25">0.25x</div>
              <div class="speed-opt" data-speed="0.5">0.5x</div>
              <div class="speed-opt" data-speed="0.75">0.75x</div>
              <div class="speed-opt active" data-speed="1">1.0x</div>
              <div class="speed-opt" data-speed="1.25">1.25x</div>
              <div class="speed-opt" data-speed="1.5">1.5x</div>
              <div class="speed-opt" data-speed="2">2.0x</div>
            </div>
          </div>
          <button class="btn new-file-btn" id="btn-new">📂 変更</button>
        </div>
      </div>
    </div>

    <script>
      (() => {
        // ── DOM refs ──────────────────────────────────────────
        const uploadScreen  = document.getElementById('upload-screen');
        const loadingScreen = document.getElementById('loading-screen');
        const playerScreen  = document.getElementById('player-screen');
        const dropZone      = document.getElementById('drop-zone');
        const fileInput     = document.getElementById('file-input');
        const loadingFn     = document.getElementById('loading-filename');
        const loadingPct    = document.getElementById('loading-pct');
        const progressBar   = document.getElementById('progress-bar');
        const loadingStatus = document.getElementById('loading-status');
        const video         = document.getElementById('video');
        const videoWrap     = document.getElementById('video-wrap');
        const cursorDot     = document.getElementById('cursor-dot');
        const centerOverlay = document.getElementById('center-overlay');
        const skipLeft      = document.getElementById('skip-left');
        const skipRight     = document.getElementById('skip-right');
        const timeLabel     = document.getElementById('time-label');
        const seekWrap      = document.getElementById('seek-wrap');
        const seekFill      = document.getElementById('seek-fill');
        const seekThumb     = document.getElementById('seek-thumb');
        const bufFill       = document.getElementById('buf-fill');
        const volWrap       = document.getElementById('vol-wrap');
        const volFill       = document.getElementById('vol-fill');
        const volThumb      = document.getElementById('vol-thumb');
        const btnPlay       = document.getElementById('btn-play');
        const btnBack15     = document.getElementById('btn-back15');
        const btnFwd15      = document.getElementById('btn-fwd15');
        const btnMute       = document.getElementById('btn-mute');
        const btnSpeed      = document.getElementById('btn-speed');
        const speedPopup    = document.getElementById('speed-popup');
        const btnNew        = document.getElementById('btn-new');

        // ── State ─────────────────────────────────────────────
        let objectUrl      = null;   // current File object URL (single copy in memory)
        let isMuted        = false;
        let savedVol       = 1;
        let isDraggingSeek = false;
        let isDraggingVol  = false;
        let overlayTimer   = null;
        let skipTimer      = null;
        let cursorTimer    = null;
        let progressTimer  = null;

        // ── Utilities ─────────────────────────────────────────
        const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
        const toPct = (v, max)    => clamp((v / max) * 100, 0, 100);

        const fmt = s => {
          if (!isFinite(s) || isNaN(s)) return '0:00';
          const h   = Math.floor(s / 3600);
          const m   = Math.floor((s % 3600) / 60);
          const sec = Math.floor(s % 60);
          return h
            ? `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`
            : `${m}:${String(sec).padStart(2, '0')}`;
        };

        function setSlider(fill, thumb, p) {
          fill.style.width = p + '%';
          thumb.style.left = p + '%';
        }

        function setProgress(p, status) {
          progressBar.style.width = clamp(p, 0, 100) + '%';
          loadingPct.textContent  = Math.round(clamp(p, 0, 100)) + '%';
          if (status !== undefined) loadingStatus.textContent = status;
        }

        function flashOverlay(icon) {
          centerOverlay.textContent = icon;
          centerOverlay.classList.add('show');
          clearTimeout(overlayTimer);
          overlayTimer = setTimeout(() => centerOverlay.classList.remove('show'), 600);
        }

        function flashSkip(dir) {
          const el = dir === 'left' ? skipLeft : skipRight;
          el.classList.add('show');
          clearTimeout(skipTimer);
          skipTimer = setTimeout(() => el.classList.remove('show'), 700);
        }

        // ── getBufferedEnd ────────────────────────────────────
        // Returns the furthest buffered second (0 if none).
        function getBufferedEnd() {
          if (!video.duration || !video.buffered.length) return 0;
          return video.buffered.end(video.buffered.length - 1);
        }

        // ── handleFile ────────────────────────────────────────
        // Key insight: URL.createObjectURL(File) hands the browser a direct
        // reference to the file on disk — zero memory copy. The browser's
        // native media pipeline handles buffering exactly like a server-side
        // stream, so there is no RAM explosion and no crash.
        //
        // Progress is measured via video.buffered as the browser reads ahead,
        // with a polling loop so it stays responsive across all browsers.
        function handleFile(file) {
          if (!file || !file.type.startsWith('video/')) return;

          // Tear down previous session cleanly
          clearInterval(progressTimer);
          video.pause();
          video.removeAttribute('src');
          video.load();
          if (objectUrl) { URL.revokeObjectURL(objectUrl); objectUrl = null; }

          // Show loading screen
          uploadScreen.classList.add('hidden');
          loadingScreen.classList.add('visible');
          loadingPct.classList.remove('done');
          loadingStatus.classList.remove('ready');
          loadingFn.textContent = file.name;
          setProgress(0, 'バッファリング中...');

          // Create a zero-copy object URL directly from the File handle
          objectUrl = URL.createObjectURL(file);
          video.src = objectUrl;
          video.preload = 'auto';
          video.load();

          // ── Progress polling ──
          // Poll video.buffered every 200 ms.
          // We wait until bufferedEnd / duration >= 1.0 (fully buffered).
          progressTimer = setInterval(() => {
            const dur = video.duration;
            if (!dur || !isFinite(dur)) {
              setProgress(2, 'メタデータを読み込み中...');
              return;
            }
            const bufferedEnd = getBufferedEnd();
            const p = toPct(bufferedEnd, dur);
            setProgress(p, `バッファリング中... ${fmt(bufferedEnd)} / ${fmt(dur)}`);

            if (p >= 99.5) {
              clearInterval(progressTimer);
              onFullyBuffered();
            }
          }, 200);

          // canplaythrough fires when the browser believes it can play
          // to the end without stalling — treat this as "good enough"
          // in case buffered reporting is imprecise (e.g. on some codecs).
          video.addEventListener('canplaythrough', onCanPlayThrough, { once: true });

          // Error fallback
          video.addEventListener('error', onVideoError, { once: true });
        }

        function onCanPlayThrough() {
          // If buffered is already near 100% — just proceed.
          // If not (browser reported canplaythrough early), keep polling
          // until we either hit 99.5% or 3 s pass with no progress.
          const dur = video.duration;
          if (!dur) { onFullyBuffered(); return; }
          const p = toPct(getBufferedEnd(), dur);
          if (p >= 95) { clearInterval(progressTimer); onFullyBuffered(); }
          // else let the poll loop continue
        }

        function onFullyBuffered() {
          clearInterval(progressTimer);
          video.removeEventListener('canplaythrough', onCanPlayThrough);
          setProgress(100, '再生準備完了 ✓');
          loadingPct.classList.add('done');
          loadingStatus.classList.add('ready');

          setTimeout(() => {
            loadingScreen.classList.remove('visible');
            playerScreen.classList.add('visible');
            setVol(1);
            updateSeek();
          }, 350);
        }

        function onVideoError() {
          clearInterval(progressTimer);
          const code = video.error ? video.error.code : '?';
          alert(`動画の読み込みに失敗しました (code ${code})。対応形式か確認してください。`);
          loadingScreen.classList.remove('visible');
          uploadScreen.classList.remove('hidden');
          fileInput.value = '';
        }

        // ── Drop zone ─────────────────────────────────────────
        dropZone.addEventListener('dragover', e => {
          e.preventDefault(); dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', e => {
          e.preventDefault(); dropZone.classList.remove('drag-over');
          handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

        btnNew.addEventListener('click', () => {
          clearInterval(progressTimer);
          video.pause(); video.src = '';
          playerScreen.classList.remove('visible');
          uploadScreen.classList.remove('hidden');
          fileInput.value = '';
        });

        // ── Playback ──────────────────────────────────────────
        function togglePlay() {
          if (video.paused) { video.play(); flashOverlay('▶'); }
          else              { video.pause(); flashOverlay('⏸'); }
        }

        videoWrap.addEventListener('click', e => {
          if (e.target === cursorDot) return;
          togglePlay();
        });
        btnPlay.addEventListener('click', togglePlay);

        video.addEventListener('play',  () => { btnPlay.textContent = '⏸'; });
        video.addEventListener('pause', () => { btnPlay.textContent = '▶'; });
        video.addEventListener('ended', () => { btnPlay.textContent = '▶'; });

        // ── Skip 15s ─────────────────────────────────────────
        function skip(secs) {
          video.currentTime = clamp(video.currentTime + secs, 0, video.duration || 0);
          flashOverlay(secs > 0 ? '▶▶' : '◀◀');
          flashSkip(secs > 0 ? 'right' : 'left');
        }

        btnBack15.addEventListener('click', () => skip(-15));
        btnFwd15.addEventListener('click',  () => skip(+15));

        // ── Seek slider ───────────────────────────────────────
        function updateSeek() {
          if (!video.duration || isDraggingSeek) return;
          const p = toPct(video.currentTime, video.duration);
          setSlider(seekFill, seekThumb, p);
          timeLabel.textContent = `${fmt(video.currentTime)} / ${fmt(video.duration)}`;
          if (video.buffered.length > 0) {
            bufFill.style.width = toPct(getBufferedEnd(), video.duration) + '%';
          }
        }

        video.addEventListener('timeupdate',     updateSeek);
        video.addEventListener('loadedmetadata', updateSeek);

        function seekFromPointer(clientX) {
          const rect = seekWrap.getBoundingClientRect();
          const r    = clamp((clientX - rect.left) / rect.width, 0, 1);
          const t    = r * (video.duration || 0);
          video.currentTime = t;
          setSlider(seekFill, seekThumb, r * 100);
          timeLabel.textContent = `${fmt(t)} / ${fmt(video.duration)}`;
        }

        seekWrap.addEventListener('mousedown', e => {
          e.preventDefault(); isDraggingSeek = true; seekFromPointer(e.clientX);
        });
        document.addEventListener('mousemove', e => {
          if (isDraggingSeek) seekFromPointer(e.clientX);
        });
        document.addEventListener('mouseup', () => { isDraggingSeek = false; });

        seekWrap.addEventListener('touchstart', e => {
          e.preventDefault(); isDraggingSeek = true; seekFromPointer(e.touches[0].clientX);
        }, { passive: false });
        document.addEventListener('touchmove', e => {
          if (isDraggingSeek) seekFromPointer(e.touches[0].clientX);
        });
        document.addEventListener('touchend', () => { isDraggingSeek = false; });

        // ── Volume ────────────────────────────────────────────
        function setVol(v) {
          v = clamp(v, 0, 1);
          video.volume = v;
          setSlider(volFill, volThumb, v * 100);
          if (v > 0) savedVol = v;
          isMuted = (v === 0);
          btnMute.textContent = isMuted ? '🔇' : '🔊';
        }

        function volFromPointer(clientX) {
          const rect = volWrap.getBoundingClientRect();
          setVol((clientX - rect.left) / rect.width);
        }

        volWrap.addEventListener('mousedown', e => {
          e.preventDefault(); isDraggingVol = true; volFromPointer(e.clientX);
        });
        document.addEventListener('mousemove', e => {
          if (isDraggingVol) volFromPointer(e.clientX);
        });
        document.addEventListener('mouseup', () => { isDraggingVol = false; });

        btnMute.addEventListener('click', () => {
          isMuted ? setVol(savedVol || 1) : setVol(0);
        });

        // ── Speed ─────────────────────────────────────────────
        btnSpeed.addEventListener('click', e => {
          e.stopPropagation(); speedPopup.classList.toggle('open');
        });
        document.addEventListener('click', () => speedPopup.classList.remove('open'));

        speedPopup.querySelectorAll('.speed-opt').forEach(opt => {
          opt.addEventListener('click', e => {
            e.stopPropagation();
            const s = parseFloat(opt.dataset.speed);
            video.playbackRate   = s;
            btnSpeed.textContent = Number.isInteger(s) ? s + '.0x' : s + 'x';
            speedPopup.querySelectorAll('.speed-opt').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            speedPopup.classList.remove('open');
          });
        });

        // ── Keyboard ──────────────────────────────────────────
        document.addEventListener('keydown', e => {
          if (!playerScreen.classList.contains('visible')) return;
          if (e.target.tagName === 'INPUT') return;
          switch (e.code) {
            case 'Space':      e.preventDefault(); togglePlay(); break;
            case 'ArrowLeft':  e.preventDefault(); skip(-15); break;
            case 'ArrowRight': e.preventDefault(); skip(+15); break;
            case 'ArrowUp':    e.preventDefault(); setVol(video.volume + .1); break;
            case 'ArrowDown':  e.preventDefault(); setVol(video.volume - .1); break;
            case 'KeyM':       isMuted ? setVol(savedVol || 1) : setVol(0); break;
            case 'KeyF':       toggleFullscreen(); break;
          }
        });

        // ── Custom cursor ─────────────────────────────────────
        videoWrap.addEventListener('mousemove', e => {
          const r = videoWrap.getBoundingClientRect();
          cursorDot.style.left    = (e.clientX - r.left) + 'px';
          cursorDot.style.top     = (e.clientY - r.top) + 'px';
          cursorDot.style.opacity = '1';
          clearTimeout(cursorTimer);
          cursorTimer = setTimeout(() => { cursorDot.style.opacity = '0'; }, 2000);
        });
        videoWrap.addEventListener('mouseleave', () => { cursorDot.style.opacity = '0'; });

        // ── Fullscreen ────────────────────────────────────────
        function toggleFullscreen() {
          if (!document.fullscreenElement) playerScreen.requestFullscreen?.();
          else                             document.exitFullscreen?.();
        }
        videoWrap.addEventListener('dblclick', toggleFullscreen);

      })();
    </script>
  </body>
</html>
