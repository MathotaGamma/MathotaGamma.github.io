<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0c0c0c;
      --panel:  #131313;
      --border: #1e1e1e;
      --accent: #c8f04a;
      --muted:  #555;
      --text:   #e0e0e0;
      --me-bg:  #1a2600;
      --them-bg:#171717;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── LOBBY ─────────────────────────────────────────── */
    #lobby {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      animation: up .35s ease both;
    }

    @keyframes up {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: .12em;
      color: var(--accent);
      margin-bottom: 2.5rem;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .75rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }
    .dot.spin { background: #e0a020; animation: blink 1s infinite; }
    .dot.ok   { background: var(--accent); }
    .dot.err  { background: #d04040; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* room id box */
    .room-box {
      border: 1px solid var(--border);
      padding: 1rem;
      margin-bottom: 1.2rem;
      display: none;
    }
    .room-box.show { display: block; }

    .room-label {
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
    }

    .room-id {
      font-size: .85rem;
      color: var(--accent);
      word-break: break-all;
      margin-bottom: .8rem;
    }

    /* buttons */
    .btn {
      font-family: 'Syne', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .55rem 1.1rem;
      border: none;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .8; }
    .btn-accent { background: var(--accent); color: #0c0c0c; }
    .btn-ghost  { background: transparent; border: 1px solid var(--border); color: var(--muted); }

    /* join input row */
    .join-row {
      display: none;
      gap: .5rem;
      margin-bottom: 1.2rem;
    }
    .join-row.show { display: flex; }

    .join-input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: .8rem;
      padding: .55rem .8rem;
      outline: none;
    }
    .join-input:focus { border-color: var(--accent); }
    .join-input::placeholder { color: var(--muted); }

    /* waiting text */
    #waiting {
      font-size: .75rem;
      color: var(--muted);
      display: none;
    }
    #waiting.show { display: block; }

    /* ── CHAT ──────────────────────────────────────────── */
    #chat {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      max-height: 700px;
    }
    #chat.show { display: flex; }

    .chat-header {
      padding: .9rem 1.2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .72rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .chat-header strong {
      font-family: 'Syne', sans-serif;
      font-size: .85rem;
      color: var(--accent);
      letter-spacing: .08em;
      margin-right: auto;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); }

    .msg {
      max-width: 78%;
      padding: .55rem .85rem;
      font-size: .82rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.me   { background: var(--me-bg); color: var(--accent); align-self: flex-end; }
    .msg.them { background: var(--them-bg); color: var(--text); align-self: flex-start; border: 1px solid var(--border); }

    .msg-time {
      font-size: .6rem;
      color: var(--muted);
      margin-top: .2rem;
      text-align: right;
    }
    .msg.them .msg-time { text-align: left; }

    .input-row {
      display: flex;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: var(--panel);
      border: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: .85rem;
      padding: .9rem 1rem;
      outline: none;
    }
    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      color: #0c0c0c;
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .08em;
      padding: 0 1.2rem;
      cursor: pointer;
      transition: opacity .15s;
    }
    #send-btn:hover { opacity: .8; }
    #send-btn:disabled { opacity: .3; cursor: default; }
  </style>
</head>
<body>

<!-- ── LOBBY ── -->
<div id="lobby">
  <div class="logo">P2P CHAT</div>

  <div class="status-row">
    <span class="dot spin" id="dot"></span>
    <span id="status-txt">サーバー起動中…</span>
  </div>

  <!-- ホスト: 自分のRoom ID -->
  <div class="room-box" id="room-box">
    <div class="room-label">Your Room ID</div>
    <div class="room-id" id="room-id-txt"></div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap">
      <button class="btn btn-accent" id="copy-link-btn">🔗 招待リンクをコピー</button>
      <button class="btn btn-ghost"  id="copy-id-btn">ID だけコピー</button>
    </div>
  </div>

  <!-- ゲスト: Room IDを入力して参加 -->
  <div class="join-row" id="join-row">
    <input class="join-input" id="join-input" placeholder="相手の Room ID を入力" />
    <button class="btn btn-accent" id="join-btn">参加</button>
  </div>

  <div id="waiting">相手の接続を待機中…</div>
</div>

<!-- ── CHAT ── -->
<div id="chat">
  <div class="chat-header">
    <strong>P2P CHAT</strong>
    <span class="dot ok"></span>
    <span id="peer-label">接続中</span>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-row">
    <input id="msg-input" placeholder="メッセージを入力…" autocomplete="off" />
    <button id="send-btn">SEND</button>
  </div>
</div>

<script src="/statics/p2p/manager.js"></script>
<script>
  const SIGNALING = "wss://signaling-server-dman.onrender.com";
  const WAKE_URL  = "https://signaling-server-dman.onrender.com/";

  // ── DOM ──────────────────────────────────────────────────
  const $dot       = document.getElementById("dot");
  const $statusTxt = document.getElementById("status-txt");
  const $roomBox   = document.getElementById("room-box");
  const $roomIdTxt = document.getElementById("room-id-txt");
  const $copyLink  = document.getElementById("copy-link-btn");
  const $copyId    = document.getElementById("copy-id-btn");
  const $joinRow   = document.getElementById("join-row");
  const $joinInput = document.getElementById("join-input");
  const $joinBtn   = document.getElementById("join-btn");
  const $waiting   = document.getElementById("waiting");
  const $lobby     = document.getElementById("lobby");
  const $chat      = document.getElementById("chat");
  const $messages  = document.getElementById("messages");
  const $msgInput  = document.getElementById("msg-input");
  const $sendBtn   = document.getElementById("send-btn");

  // ── URLパラメータでゲスト判定 ──────────────────────────
  const params      = new URLSearchParams(location.search);
  const guestRoomId = params.get("room"); // ?room=xxxx で参加
  const isGuest     = !!guestRoomId;

  // ── ホストのroom_id生成 ────────────────────────────────
  const myRoomId = isGuest ? guestRoomId : crypto.randomUUID();

  // ── Render起動待ち ──────────────────────────────────────
  async function wakeServer() {
    const start = Date.now();
    while (Date.now() - start < 60000) {
      try {
        const r = await fetch(WAKE_URL, { cache: "no-store" });
        if (r.ok) return true;
      } catch (_) {}
      await new Promise(r => setTimeout(r, 3000));
      $statusTxt.textContent = `サーバー起動中… ${Math.round((Date.now()-start)/1000)}s`;
    }
    return false;
  }

  // ── チャット: メッセージ追加 ────────────────────────────
  function addMsg(text, side) {
    const now = new Date().toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" });
    const el = document.createElement("div");
    el.className = `msg ${side}`;
    el.innerHTML = `${text}<div class="msg-time">${now}</div>`;
    $messages.appendChild(el);
    $messages.scrollTop = $messages.scrollHeight;
  }

  // ── P2P接続開始 ─────────────────────────────────────────
  function startP2P(roomId) {
    $waiting.classList.add("show");

    const p2p = new P2P(`${SIGNALING}/ws/${roomId}`);

    p2p.on("open", () => {
      // ロビー→チャット切り替え
      $lobby.style.display = "none";
      $chat.classList.add("show");
      $sendBtn.disabled = false;
      $msgInput.focus();
    });

    p2p.on("data", (msg) => {
      addMsg(typeof msg === "string" ? msg : JSON.stringify(msg), "them");
    });

    p2p.on("close", () => addMsg("— 接続が切断されました —", "them"));
    p2p.on("error", (e) => addMsg(`[error] ${e?.message ?? e}`, "them"));

    // 送信
    function send() {
      const text = $msgInput.value.trim();
      if (!text) return;
      p2p.send(text);
      addMsg(text, "me");
      $msgInput.value = "";
    }
    $sendBtn.addEventListener("click", send);
    $msgInput.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) send(); });
  }

  // ── メイン ───────────────────────────────────────────────
  (async () => {
    const ok = await wakeServer();
    if (!ok) {
      $dot.className = "dot err";
      $statusTxt.textContent = "サーバー起動タイムアウト";
      return;
    }

    $dot.className = "dot ok";
    $statusTxt.textContent = "サーバー接続完了";

    if (isGuest) {
      // ゲスト: 直接接続開始
      startP2P(myRoomId);
    } else {
      // ホスト: Room IDを表示して待機
      $roomIdTxt.textContent = myRoomId;
      $roomBox.classList.add("show");
      $joinRow.classList.add("show");

      $copyLink.addEventListener("click", () => {
        const url = `${location.origin}${location.pathname}?room=${myRoomId}`;
        navigator.clipboard.writeText(url);
        $copyLink.textContent = "✓ コピーしました";
        setTimeout(() => ($copyLink.textContent = "🔗 招待リンクをコピー"), 1800);
      });

      $copyId.addEventListener("click", () => {
        navigator.clipboard.writeText(myRoomId);
        $copyId.textContent = "✓ コピー";
        setTimeout(() => ($copyId.textContent = "ID だけコピー"), 1500);
      });

      // 自分のroomで待機開始
      startP2P(myRoomId);

      // 手動でRoom IDを入力して参加する場合（別の部屋に入る）
      $joinBtn.addEventListener("click", () => {
        const id = $joinInput.value.trim();
        if (!id) return;
        startP2P(id);
      });
    }
  })();
</script>
</body>
</html>
