<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CompVis.Physics.Three — Demo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#111;color:#ddd;font-family:monospace;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh}
  #header{padding:8px 16px;background:#1a1a2e;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  #header h1{font-size:14px;color:#88ccff;white-space:nowrap}
  .btn{padding:4px 10px;background:#223;border:1px solid #446;color:#adf;border-radius:4px;cursor:pointer;font-size:12px;transition:background .15s}
  .btn:hover{background:#334}
  .btn.active{background:#226;border-color:#66f}
  select{background:#223;border:1px solid #446;color:#adf;padding:3px 6px;border-radius:4px;font-size:12px}
  #container{flex:1;position:relative}
  #stats{position:absolute;bottom:8px;left:8px;font-size:11px;color:#8a8;background:rgba(0,0,0,.6);padding:4px 8px;border-radius:4px;pointer-events:none}
  #info{position:absolute;top:8px;right:8px;font-size:11px;color:#888;background:rgba(0,0,0,.6);padding:6px 10px;border-radius:4px;line-height:1.8;pointer-events:none;max-width:220px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>🧪 CompVis.Physics.Three</h1>
    <select id="scene-select">
      <option value="basic">🌐 球の雨</option>
      <option value="stack">📦 積み重ね</option>
      <option value="rope">🪢 ロープ</option>
      <option value="cloth">🧵 布シミュレーション</option>
      <option value="domino">🎲 ドミノ</option>
      <option value="gravity">🌀 重力場</option>
      <option value="pendulum">🔵 振り子</option>
    </select>
    <button class="btn" id="btn-start">▶ 開始</button>
    <button class="btn" id="btn-stop">⏸ 停止</button>
    <button class="btn" id="btn-step">⏭ 1ステップ</button>
    <button class="btn" id="btn-reset">🔄 リセット</button>
    <button class="btn" id="btn-shoot">💥 発射</button>
    <span id="msg" style="font-size:11px;color:#fa8;"></span>
  </div>
  <div id="container">
    <div id="stats">初期化中...</div>
    <div id="info">
      <b style="color:#88ccff">操作方法</b><br>
      ドラッグ: 視点回転<br>
      スクロール: ズーム<br>
      右ドラッグ: パン<br>
      <br>
      <b style="color:#88ccff">API概要</b><br>
      addBody(opts)<br>
      addGround(opts)<br>
      addStack(r,c,d)<br>
      addRope(s,e,n)<br>
      addCloth(c,r,sp)<br>
      addSpring(a,b)<br>
      addHinge(a,b,...)<br>
      raycast(orig,dir)
    </div>
  </div>
</div>

<script>
// ============================
// CompVisJS を動的読み込み
// ============================
(async()=>{
  const msg = document.getElementById("msg");
  const stats = document.getElementById("stats");
  
  // CompVisJSをCDN/ローカルから読み込む想定
  // ここではインラインで最低限のCompVisスタブを定義する
  // (実際はCompVisJS.jsをscriptタグで読み込む)

  // ---- CompVisJS.js が読み込まれているか確認 ----
  if(typeof CompVis === "undefined"){
    msg.textContent = "CompVisJS.js が読み込まれていません";
    stats.textContent = "Error: CompVisJS.js required";
    return;
  }

  // ---- CompVis.Physics.js が読み込まれているか確認 ----
  if(!CompVis.Physics || !CompVis.Physics.Three){
    msg.textContent = "CompVis_Physics.js が読み込まれていません";
    stats.textContent = "Error: CompVis_Physics.js required";
    return;
  }

  // ---- ViewThree 初期化 ----
  const container = document.getElementById("container");
  const viewThree = new CompVis.ViewThree(container, { cameraPosition:{x:20,y:18,z:20} });
  await viewThree.initPromise;

  // 影を有効化
  viewThree.exec((THREE,scene,cam,renderer)=>{
    renderer.shadowMap.enabled=true;
    const dirLight=scene.children.find(c=>c.isDirectionalLight);
    if(dirLight){
      dirLight.castShadow=true;
      dirLight.shadow.mapSize.width=1024;
      dirLight.shadow.mapSize.height=1024;
    }
  });

  // ---- 物理エンジン初期化 ----
  let world = null;

  // ============================
  // シーン定義
  // ============================

  async function buildBasic(){
    world = new CompVis.Physics.Three(viewThree, {
      iterations: 8, subSteps: 2
    });
    world.addGround({size:[30,1,30], position:[0,-0.5,0], meshColor:0x226644});

    // 壁
    const wallOpts={shape:"box",mass:0,restitution:0.4,meshColor:0x334455};
    world.addBody({...wallOpts,size:[30,8,1],position:[0,3.5,-15]});
    world.addBody({...wallOpts,size:[30,8,1],position:[0,3.5, 15]});
    world.addBody({...wallOpts,size:[1,8,30],position:[-15,3.5,0]});
    world.addBody({...wallOpts,size:[1,8,30],position:[ 15,3.5,0]});

    // 球の雨
    let t=0;
    world.onStep((w,dt)=>{
      t+=dt;
      if(t>0.25){
        t=0;
        const x=(Math.random()-0.5)*12;
        const z=(Math.random()-0.5)*12;
        const r=0.4+Math.random()*0.6;
        w.addBody({
          shape:Math.random()<0.5?"sphere":"box",
          radius:r, size:[r*2,r*2,r*2],
          position:[x,14,z],
          mass:r*r*r,
          restitution:0.3+Math.random()*0.4,
          friction:0.3+Math.random()*0.4,
          meshColor:Math.floor(Math.random()*0xffffff)
        });
        // 最大50個まで
        const dynamic=w.bodies.filter(b=>!b.isStatic);
        if(dynamic.length>60){
          w.removeBody(dynamic[0]);
        }
      }
    });
  }

  async function buildStack(){
    world = new CompVis.Physics.Three(viewThree, {iterations:12,subSteps:3});
    world.addGround({size:[30,1,30],position:[0,-0.5,0],meshColor:0x226644});
    // ランダムな箱の積み重ね
    const colors=[0xff6644,0x44aaff,0xffcc44,0xaa44ff,0x44ffaa];
    for(let y=0;y<6;y++){
      for(let x=-2;x<=2;x++){
        const s=0.8+Math.random()*0.4;
        world.addBody({
          shape:"box",
          size:[s,s,s],
          position:[x*1.5+(Math.random()-0.5)*0.1, y*1.2+s/2+0.2, (Math.random()-0.5)*0.1],
          mass:s*s*s,
          restitution:0.1,
          friction:0.7,
          meshColor:colors[Math.floor(Math.random()*colors.length)]
        });
      }
    }
  }

  async function buildRope(){
    world = new CompVis.Physics.Three(viewThree, {iterations:20,subSteps:4});
    world.addGround({size:[30,1,30],position:[0,-0.5,0],meshColor:0x226644});

    // 複数ロープ
    world.addRope([0,12,0],  [0,0,0],  12, {fixStart:true, stiffness:600, damping:25, meshColor:0xffaa44});
    world.addRope([-4,12,0], [-4,0,0], 12, {fixStart:true, stiffness:600, damping:25, meshColor:0x44aaff});
    world.addRope([ 4,12,0], [ 4,2,0], 10, {fixStart:true, fixEnd:false, stiffness:500, meshColor:0xaa44ff});

    // ロープの末端に重り
    const ropes=world.bodies.filter(b=>!b.isStatic);
    // 末端を特定してmass増加 (簡易)
  }

  async function buildCloth(){
    world = new CompVis.Physics.Three(viewThree, {iterations:15,subSteps:4});
    world.addGround({size:[30,1,30],position:[0,-0.5,0],meshColor:0x226644});
    world.addCloth(10, 10, 0.9, {
      position:[0,12,0],
      fixTopAll:false,
      stiffness:700,
      damping:25,
      meshColor:0x66bbff
    });
    // 重力場を弱める
    world._defaultGravityField.vector=_V3(0,-5,0);
  }

  function _V3(x,y,z){ return {x,y,z}; }

  async function buildDomino(){
    world = new CompVis.Physics.Three(viewThree, {iterations:10,subSteps:2});
    world.addGround({size:[30,1,30],position:[0,-0.5,0],meshColor:0x226644});
    const N=20;
    for(let i=0;i<N;i++){
      const angle=i/N*Math.PI*2*2;
      const r=8-i*0.3;
      const x=Math.cos(angle)*r;
      const z=Math.sin(angle)*r;
      const body=world.addBody({
        shape:"box",
        size:[0.3,2,0.9],
        position:[x,1,z],
        mass:1,
        restitution:0.1,
        friction:0.6,
        meshColor: 0xff4444 + (i*3)%0xff
      });
      // 向きをラジアル方向に
      body.orientation=CompVis.Physics._Quat.fromAxisAngle(
        CompVis.Physics._Vec3.prototype.constructor?{x:0,y:1,z:0}:{x:0,y:1,z:0},
        angle+Math.PI/2
      );
    }
  }

  async function buildGravity(){
    world = new CompVis.Physics.Three(viewThree, {iterations:6,subSteps:2});
    // デフォルト重力をゼロに
    world._defaultGravityField.vector={x:0,y:0,z:0};
    // 点引力 (中心)
    world.addForceField({type:"point",origin:[0,0,0],strength:30,radius:100});
    // 渦巻き
    world.addForceField({type:"vortex",vector:[0,1,0],origin:[0,0,0],strength:15,radius:50});

    // 粒子を球状に配置
    for(let i=0;i<60;i++){
      const theta=Math.random()*Math.PI*2;
      const phi=Math.acos(2*Math.random()-1);
      const r=8+Math.random()*6;
      world.addBody({
        shape:"sphere",
        radius:0.3+Math.random()*0.3,
        position:[r*Math.sin(phi)*Math.cos(theta),r*Math.sin(phi)*Math.sin(theta),r*Math.cos(phi)],
        mass:0.5,
        meshColor:Math.floor(0x4488ff+Math.random()*0xaa7700),
        allowSleep:false
      });
    }
  }

  async function buildPendulum(){
    world = new CompVis.Physics.Three(viewThree, {iterations:15,subSteps:4});
    world.addGround({size:[30,1,30],position:[0,-0.5,0],meshColor:0x226644});
    // 固定点
    const anchor=world.addBody({shape:"sphere",radius:0.2,position:[0,14,0],mass:0,meshColor:0xffffff});
    // 振り子チェーン
    let prev=anchor;
    for(let i=1;i<=6;i++){
      const ball=world.addBody({
        shape:"sphere",
        radius:0.5,
        position:[i*2-6, 14-i*2, 0],
        mass:1,
        restitution:0.5,
        meshColor:0x44aaff+i*0x220000
      });
      world.addSpring(prev,ball,{
        restLength:2.5,
        stiffness:1200,
        damping:20,
        pivotA:[0,0,0],pivotB:[0,0,0]
      });
      prev=ball;
    }
    // 別チェーン
    prev=anchor;
    for(let i=1;i<=4;i++){
      const ball=world.addBody({
        shape:"box",
        size:[0.8,0.8,0.8],
        position:[i*1.5-8, 14-i*2, 4],
        mass:2,
        restitution:0.2,
        friction:0.5,
        meshColor:0xff8844
      });
      world.addSpring(prev,ball,{restLength:2.2,stiffness:1000,damping:15});
      prev=ball;
    }
  }

  // ============================
  // シーンビルド & リセット
  // ============================

  const scenes={
    basic:buildBasic, stack:buildStack, rope:buildRope,
    cloth:buildCloth, domino:buildDomino, gravity:buildGravity,
    pendulum:buildPendulum
  };

  async function loadScene(name){
    if(world){ await world.reset(); world=null; }
    msg.textContent="シーン構築中...";
    await scenes[name]?.();
    msg.textContent="";
    // 自動スタート
    world?.start();
    updateStatsLoop();
  }

  // ============================
  // UI
  // ============================
  document.getElementById("scene-select").addEventListener("change",e=>loadScene(e.target.value));
  document.getElementById("btn-start").addEventListener("click",()=>world?.start());
  document.getElementById("btn-stop").addEventListener("click",()=>world?.stop());
  document.getElementById("btn-step").addEventListener("click",()=>{ world?.stop(); world?.step(1/60); });
  document.getElementById("btn-reset").addEventListener("click",()=>loadScene(document.getElementById("scene-select").value));
  document.getElementById("btn-shoot").addEventListener("click",()=>{
    if(!world) return;
    world.shootBody({
      shape:"sphere",radius:0.8,
      position:[0,8,18],
      velocity:[0,2,-22],
      mass:2,meshColor:0xff3300,
      restitution:0.5
    });
  });

  // Stats更新
  function updateStatsLoop(){
    if(!world) return;
    stats.textContent = world.statsStr;
    requestAnimationFrame(updateStatsLoop);
  }

  // 初期シーンロード
  await loadScene("basic");

})();
</script>
</body>
</html>
