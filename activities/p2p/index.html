<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>P2P,FullMeshテスト</title>
    <script src="/statics/p2p/1-01-01/manager.js"></script>
  </head>
  <body>
    <input type="text" value="room" id="room"/>
    <select id="type">
      <option value="p2p" selected>P2P</option>
      <option value="mesh">FullMesh</option>
    </select>
    <input type="button" value="接続" onclick="connect_onclick();" /><div id="status"></div><div id="number"></div><br>
    <div id="my-id">My ID: ---</div><div id="connector-ids">connector IDs: ---</div>
    <textarea id="data" placeholder="送信するデータ※JSON形式で">{
  "text": "test"
}</textarea><br>
    <input type="button" value="送信" onclick="sendData_onclick();"/><br>
    <input type="button" value="Log Clear" onclick="logClear();"/><br>
    <textarea id="log" style="width: 100%; height: 200px;" placeholder="LOG..." readonly></textarea>
    <script type="module">
import Transmission from "https://mathotagamma.github.io/statics/p2p/1-01-02/manager.js";
window.onload = () => {
  let tm;
  const logTextarea = document.getElementById('log');
  const dataTextarea = document.getElementById('data');
  const statusDiv = document.getElementById("status");
  const typeSelect = document.getElementById('type');
  
  typeSelect.addEventListener('change', () => {
    logTextarea.value += 'type changed: '+typeSelect.value+'\n';
  })
  
  window.connect_onclick = async () => {
    if (tm) {
      tm.clear();
      tm = null;
    }
    tm = new Transmission("signaling-server-dman.onrender.com", document.getElementById('room').value);
    document.getElementById('connector-ids').innerHTML = 'Connector IDs: ---';
    document.getElementById('my-id').innerHTML = 'My ID: ---';
    statusDiv.innerHTML = tm.status;
    tm.onStatusUpdate = (status) => {
      statusDiv.innerHTML = status;
    }
    
    tm.onOpen = () => {
      document.getElementById('connector-ids').innerHTML = 'Connector IDs: '+tm.getConnectorIds().join(', ');
    }
    
    tm.onDataReceived = (data) => {
      logTextarea.value += JSON.stringify(data)+'\n';
    }

    tm.onLog = (type, message) => {
      logTextarea.value += message+'\n';
    }
    
    tm.onAssignedId = (id) => {
      document.getElementById('my-id').innerHTML = 'My ID: '+id;
    }
    
    tm.onJoin = () => {
      document.getElementById('connector-ids').innerHTML = 'Connector IDs: '+tm.getConnectorIds().join(', ');
    }
    
    tm.onLeave = () => {
      document.getElementById('connector-ids').innerHTML = 'Connector IDs: '+tm.getConnectorIds().join(', ');
    }
    
    await tm.connect(typeSelect.value);
  }
  
  window.sendData_onclick = () => {
    tm.sendData('udp', JSON.parse(dataTextarea.value));
  }

  window.logClear = () => {
    logTextarea.value = "";
  }
}
    </script>
  </body>
</html>
