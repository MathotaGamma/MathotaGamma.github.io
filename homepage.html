<html lang="ja">

    <meta charset="utf-8" />

    <meta name="keywords" content="make game,mathotagamma,ゲーム,ゲーム作成,ウェブゲーム,webゲーム" />
    <link rel="icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2431365242443921" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1Y8VQ2E2XK"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: sans-serif;
        background: linear-gradient(to bottom right, #e0f7fa, #ffffff);
        color: #333;
        padding-top: 60px;
      }

      header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: #3cb371;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 60px;
        padding: 0 20px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        z-index: 1000;
      }

      header button {
        background: #ffffff;
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        margin-left: 10px;
        color: #3cb371;
        transition: all 0.2s;
      }

      header button:hover {
        background: #f0f0f0;
      }

      main {
        max-width: 800px;
        margin: auto;
        padding: 20px;
        text-align: center;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: #00796b;
      }

      h2 {
        font-size: 1.25rem;
        margin: 1rem 0;
        color: #d32f2f;
      }

      .card {
        background: #ffffff;
        border-radius: 16px;
        padding: 20px;
        margin: 20px auto;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        text-align: left;
      }

      .card p {
        margin-bottom: 1rem;
      }

      .card a {
        color: #00796b;
        text-decoration: underline;
        font-weight: bold;
      }

      .card a:hover {
        color: #004d40;
      }

      .link-buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
      }

      .link-buttons a {
        background: #4caf50;
        color: white;
        padding: 12px 24px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
        transition: background 0.2s;
      }

      .link-buttons a:hover {
        background: #388e3c;
      }

      .ads {
        margin: 50px auto;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <noscript>
      <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MLJ4DHX7" height="0" width="0" style="display:none;visibility:hidden"></iframe>
    </noscript>

    <header>
      <div>
        <button onclick="LogOut()">Logout</button>
      </div>
      <div class="link-buttons">
        <button onclick="make_click()">Make</button>
        <button onclick="library_click()">Library</button>
      </div>
    </header>

    <main>
      <h1>Make & Play Game</h1>
      <h2 id="h2_title">こんにちは</h2>

      <div class="card">
        <p><a href="https://makeplayonline.onrender.com">オンライン版はこちら</a></p>
        <p>ゲームを作りたい場合は <strong>MakeGame</strong> を、遊びたい場合は <strong>Library</strong> を選んでください。</p>
        <p>
          <a href="./Makegame/make">MakeGame</a> ではコースを自作して遊べます。URLを共有することで他の人も遊べます。
        </p>
        <p>
          <a href="./Library/library-play">Library</a> ではゲームで遊べます。
        </p>

        <div class="link-buttons">
          <a href="./Makegame/make">MakeGame</a>
          <a href="./Library/library-play">Library</a>
        </div>
      </div>

      <div class="ads">
        <!-- Ad -->
        <ins class="adsbygoogle"
          style="display:block"
          data-ad-client="ca-pub-2431365242443921"
          data-ad-slot="3542042532"
          data-ad-format="auto"
          data-full-width-responsive="true"></ins>
        <script>
          (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
      </div>
    </main>

    <script>
      localStorage.setItem('Now','./Library/library-play');
      if(localStorage.getItem('name') == null){
        window.location.href = "./login";
      }

      document.getElementById('h2_title').innerText = localStorage.getItem('name') + " さん、こんにちは！";

      function LogOut() {
        alert('ログアウトしてログイン画面に移動します。');
        localStorage.setItem('Now','./Library/library-play');
        localStorage.removeItem('name');
        window.location.href = "./login";
      }

      function make_click() {
        window.location.href = "./Makegame/make";
      }

      function library_click() {
        window.location.href = "./Library/library-play";
      }
    </script>
  </body>
</html>
