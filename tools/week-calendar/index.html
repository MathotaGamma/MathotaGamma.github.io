<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>週間カレンダー</title>
    <link rel="stylesheet" href="/statics/main-style.css" />
    <script type="module" src="/statics/main-script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      #controls {
        margin-bottom: 20px;
        padding: 15px;
        background: #f4f4f4;
        border-radius: 8px;
        max-width: 800px;
      }
      .control-group {
        margin-bottom: 10px;
      }
      #calendar-area {
        background: white;
        display: inline-block;
        padding: 10px;
      }
      table {
        border-collapse: collapse;
        table-layout: fixed;
      }
      th, td {
        border: 1px solid #333;
        text-align: center;
        overflow: hidden;
      }
      th {
        background: #eee;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <div>
        <nav class="breadcrumb"></nav>
      </div>
      <div class="control-group">
        <label>横幅(px): <input type="number" id="tableWidth" value="900"></label>
        <label>フォントサイズ(px): <input type="number" id="fontSize" value="12"></label>
      </div>
      <div class="control-group">
        <label>列見出し (カンマ区切り):</label><br>
        <textarea id="headerSettings" style="width:100%; height:40px;">月,火,水,木,金,土,日</textarea>
      </div>
      <div class="control-group">
        <label>時間帯設定 (カンマ区切り):</label><br>
        <textarea id="timeSettings" style="width:100%; height:80px;">7:00-8:20,8:20-8:40,8:40-10:10,10:10-10:30,10:30-12:00,12:00-13:00,13:00-14:30,14:30-14:50,14:50-16:20,16:20-16:40,16:40-18:10,18:10-18:30,18:30-20:00,20:00-20:30,20:30-21:10,21:10-21:40,21:40-22:30,22:30-22:50,22:50-0:20</textarea>
      </div>
      <div class="control-group">
        <label>通常枠の高さ(px): <input type="number" id="mainHeight" value="50"></label>
        <label>間隔枠の高さ(px): <input type="number" id="gapHeight" value="20"></label>
        <button onclick="updateCalendar()">設定反映</button>
        <button onclick="downloadImage()">画像として保存</button>
      </div>
    </div>

    <div id="calendar-area">
      <table id="calendarTable">
        <thead id="headerRow"></thead>
        <tbody id="calendarBody"></tbody>
      </table>
    </div>

    <script>
      function updateCalendar() {
        const body = document.getElementById("calendarBody");
        const head = document.getElementById("headerRow");
        const table = document.getElementById("calendarTable");
        
        const width = document.getElementById("tableWidth").value;
        const fs = document.getElementById("fontSize").value + "px";
        const mh = document.getElementById("mainHeight").value + "px";
        const gh = document.getElementById("gapHeight").value + "px";
        
        const headers = document.getElementById("headerSettings").value.split(",");
        const times = document.getElementById("timeSettings").value.split(",");

        table.style.width = width + "px";
        body.innerHTML = "";
        head.innerHTML = "";

        // ヘッダー作成
        let headerHTML = "<tr><th style='width: 100px;'>Time</th>";
        headers.forEach(h => {
          headerHTML += `<th>${h}</th>`;
        });
        headerHTML += "</tr>";
        head.innerHTML = headerHTML;

        // 行作成
        times.forEach((time, index) => {
          const row = document.createElement("tr");
          // 偶数番目をメイン枠として高さを変える
          row.style.height = (index % 2 === 0) ? mh : gh;
          row.style.fontSize = fs;
          
          let rowHTML = `<td style="font-weight:bold;">${time}</td>`;
          headers.forEach(() => {
            rowHTML += `<td contenteditable="true"></td>`;
          });
          row.innerHTML = rowHTML;
          body.appendChild(row);
        });
      }

      function downloadImage() {
        // 余白を少し持たせて撮影
        html2canvas(document.getElementById("calendar-area")).then(canvas => {
          const link = document.createElement("a");
          link.download = "calendar.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
        });
      }

      updateCalendar();
    </script>
  </body>
</html>
