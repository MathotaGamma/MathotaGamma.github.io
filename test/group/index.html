<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0c0c0c; --panel:#111; --border:#1e1e1e;
      --accent:#4af0c8; --muted:#555; --text:#ddd;
      --me-bg:#002018;
    }
    body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; height:100dvh; display:flex; align-items:center; justify-content:center; }
    #lobby { width:100%; max-width:400px; padding:2.5rem 2rem; animation:up .3s ease both; }
    @keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; letter-spacing:.12em; color:var(--accent); margin-bottom:2.5rem; }
    .st-row { display:flex; align-items:center; gap:.55rem; font-size:.73rem; color:var(--muted); margin-bottom:1.8rem; }
    .dot { width:7px; height:7px; border-radius:50%; background:#333; flex-shrink:0; }
    .dot.spin{background:#e0a020;animation:blink 1s infinite} .dot.ok{background:var(--accent)} .dot.err{background:#d04040}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
    .field{margin-bottom:1rem}
    .field label{display:block;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
    .field input{width:100%;background:var(--panel);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.85rem;padding:.6rem .85rem;outline:none;transition:border-color .15s}
    .field input:focus{border-color:var(--accent)} .field input::placeholder{color:var(--muted)}
    .btn-row{display:flex;gap:.5rem;margin-top:1.2rem}
    .btn{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.6rem 1.2rem;border:none;cursor:pointer;transition:opacity .15s;flex:1}
    .btn:hover:not(:disabled){opacity:.8} .btn:disabled{opacity:.3;cursor:default}
    .btn-a{background:var(--accent);color:#0c0c0c}
    #share-strip{display:none;margin-top:1rem;font-size:.72rem;color:var(--muted)}
    #share-strip.show{display:block}
    #share-link{color:var(--accent);word-break:break-all;margin:.3rem 0 .5rem}
    .copy-small{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:.65rem;padding:.2rem .5rem;cursor:pointer}
    .copy-small:hover{border-color:var(--accent);color:var(--accent)}

    #chat{display:none;flex-direction:column;width:100%;max-width:500px;height:100dvh;max-height:720px}
    #chat.show{display:flex}
    .chat-header{padding:.8rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem;flex-shrink:0}
    .chat-header .logo{margin:0;font-size:.95rem}
    .member-badge{margin-left:auto;font-size:.68rem;color:var(--muted)}
    .member-badge span{color:var(--accent)}
    #reconnect-bar{display:none;background:#001a10;border-bottom:1px solid #003020;padding:.5rem 1rem;font-size:.72rem;color:#20e0a0;align-items:center;gap:.6rem}
    #reconnect-bar.show{display:flex}
    #reconnect-bar button{margin-left:auto;background:none;border:1px solid #003020;color:#20e0a0;font-family:'DM Mono',monospace;font-size:.65rem;padding:.2rem .6rem;cursor:pointer}
    .messages{flex:1;overflow-y:auto;padding:.8rem;display:flex;flex-direction:column;gap:.4rem}
    .messages::-webkit-scrollbar{width:3px} .messages::-webkit-scrollbar-thumb{background:var(--border)}
    .msg-wrap{display:flex;flex-direction:column}
    .msg-wrap.me{align-items:flex-end} .msg-wrap.sys{align-items:center}
    .msg-bubble{max-width:75%;padding:.5rem .8rem;font-size:.82rem;line-height:1.5;word-break:break-word}
    .me   .msg-bubble{background:var(--me-bg);color:var(--accent)}
    .them .msg-bubble{background:var(--panel);color:var(--text);border:1px solid var(--border)}
    .sys  .msg-bubble{background:transparent;color:#444;font-size:.68rem;font-style:italic}
    .msg-meta{font-size:.6rem;color:var(--muted);margin-top:.15rem;padding:0 .2rem}
    .input-row{display:flex;border-top:1px solid var(--border);flex-shrink:0}
    #msg-input{flex:1;background:var(--panel);border:none;color:var(--text);font-family:'DM Mono',monospace;font-size:.85rem;padding:.85rem 1rem;outline:none}
    #msg-input::placeholder{color:var(--muted)}
    #send-btn{background:var(--accent);color:#0c0c0c;border:none;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.08em;padding:0 1.2rem;cursor:pointer}
    #send-btn:hover:not(:disabled){opacity:.8} #send-btn:disabled{opacity:.3;cursor:default}
  </style>
</head>
<body>

<div id="lobby">
  <div class="logo">GROUP CHAT</div>
  <div class="st-row">
    <span class="dot spin" id="dot"></span>
    <span id="st-txt">サーバー起動中…</span>
  </div>
  <div class="field">
    <label>Room ID（空欄で新規作成）</label>
    <input id="room-input" placeholder="既存のRoom IDを入力して参加" />
  </div>
  <div class="btn-row">
    <button class="btn btn-a" id="start-btn" disabled>入室</button>
  </div>
  <div id="share-strip">
    <div>招待リンク：</div>
    <div id="share-link"></div>
    <button class="copy-small" id="copy-link">コピー</button>
  </div>
</div>

<div id="chat">
  <div class="chat-header">
    <div class="logo">GROUP CHAT</div>
    <div class="member-badge"><span id="member-count">1</span> 人接続中</div>
  </div>
  <div id="reconnect-bar">
    <span id="reconn-txt">切断されました。再接続中…</span>
    <button id="back-btn">待機画面に戻る</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-row">
    <input id="msg-input" placeholder="メッセージを入力…" autocomplete="off" />
    <button id="send-btn" disabled>SEND</button>
  </div>
</div>

<script src="statics/communication/manager.js"></script>
<script>
  const SIGNALING = "wss://signaling-server-dman.onrender.com";
  const WAKE_URL  = "https://signaling-server-dman.onrender.com/";

  const $dot         = document.getElementById("dot");
  const $stTxt       = document.getElementById("st-txt");
  const $roomInput   = document.getElementById("room-input");
  const $startBtn    = document.getElementById("start-btn");
  const $shareStr    = document.getElementById("share-strip");
  const $shareLink   = document.getElementById("share-link");
  const $copyLink    = document.getElementById("copy-link");
  const $lobby       = document.getElementById("lobby");
  const $chat        = document.getElementById("chat");
  const $memberCount = document.getElementById("member-count");
  const $reconnBar   = document.getElementById("reconnect-bar");
  const $reconnTxt   = document.getElementById("reconn-txt");
  const $backBtn     = document.getElementById("back-btn");
  const $messages    = document.getElementById("messages");
  const $msgInput    = document.getElementById("msg-input");
  const $sendBtn     = document.getElementById("send-btn");

  const params = new URLSearchParams(location.search);
  if(params.get("room")) $roomInput.value=params.get("room");

  let group = null;
  let dead  = false;
  let retries = 0;
  const MAX_RETRY = 8;

  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function nowStr(){ return new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}); }

  function addMsg(text,side,meta=""){
    const w=document.createElement("div");
    w.className=`msg-wrap ${side}`;
    w.innerHTML=`<div class="msg-bubble">${esc(text)}</div>${meta?`<div class="msg-meta">${meta}</div>`:""}`;
    $messages.appendChild(w);
    $messages.scrollTop=$messages.scrollHeight;
  }
  function addSys(t){ addMsg(t,"sys"); }
  function updateCount(){ $memberCount.textContent=group?group.members.length+1:1; }

  async function wakeServer(){
    const s=Date.now();
    while(Date.now()-s<60000){
      try{ const r=await fetch(WAKE_URL,{cache:"no-store"}); if(r.ok) return true; }catch(_){}
      $stTxt.textContent=`サーバー起動中… ${Math.round((Date.now()-s)/1000)}s`;
      await new Promise(r=>setTimeout(r,3000));
    }
    return false;
  }

  function startGroup(roomId){
    if(dead) return;
    group = new Group(`${SIGNALING}/ws/${roomId}`);

    group.on("ready", ()=>{
      retries=0;
      $reconnBar.classList.remove("show");
      $sendBtn.disabled=false;
      addSys(`入室しました (ID: ${group.id.slice(0,8)})`);
      updateCount();
      $msgInput.focus();
    });

    group.on("join", (peerId)=>{
      updateCount();
      addSys(`${peerId.slice(0,8)} が参加（${group.members.length+1}人）`);
    });

    group.on("leave", (peerId)=>{
      updateCount();
      addSys(`${peerId.slice(0,8)} が退出（${group.members.length+1}人）`);
      // 全員いなくなったら再接続待機
      if(group.members.length===0){
        $sendBtn.disabled=true;
        addSys("全員退出。新しいメンバーを待機中…");
      }
    });

    group.on("data", (peerId,msg)=>{
      addMsg(typeof msg==="string"?msg:JSON.stringify(msg), "them", `${peerId.slice(0,8)} · ${nowStr()}`);
    });

    group.on("error", e=> addSys(`error: ${e?.message??e}`));

    // シグナリングWS切断時は再接続
    group._sig.on("close", ()=>{
      if(dead) return;
      $sendBtn.disabled=true;
      retries++;
      if(retries>MAX_RETRY){
        $reconnTxt.textContent="再接続に失敗しました";
        $reconnBar.classList.add("show");
        return;
      }
      $reconnTxt.textContent=`シグナリング切断。再接続中… (${retries}/${MAX_RETRY})`;
      $reconnBar.classList.add("show");
      addSys("シグナリングサーバー切断。再接続中…");
      setTimeout(()=>startGroup(roomId),3000);
    });
  }

  function sendMsg(){
    const t=$msgInput.value.trim(); if(!t) return;
    group.broadcast(t);
    addMsg(t,"me",nowStr());
    $msgInput.value="";
  }
  $sendBtn.addEventListener("click",sendMsg);
  $msgInput.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();} });

  $backBtn.addEventListener("click",()=>{
    dead=true; group?.close();
    $chat.classList.remove("show"); $lobby.style.display="";
    $reconnBar.classList.remove("show"); $messages.innerHTML="";
    $sendBtn.disabled=true; dead=false; retries=0; group=null;
  });

  $startBtn.addEventListener("click",()=>{
    let roomId=$roomInput.value.trim();
    if(!roomId){
      roomId=crypto.randomUUID().slice(0,8);
      const url=`${location.origin}${location.pathname}?room=${roomId}`;
      $shareLink.textContent=url; $shareStr.classList.add("show");
    }
    $lobby.style.display="none"; $chat.classList.add("show");
    startGroup(roomId);
  });

  $copyLink.addEventListener("click",()=>{
    navigator.clipboard.writeText($shareLink.textContent);
    $copyLink.textContent="✓ コピー済み";
    setTimeout(()=>($copyLink.textContent="コピー"),1600);
  });

  (async()=>{
    const ok=await wakeServer();
    if(!ok){ $dot.className="dot err"; $stTxt.textContent="起動タイムアウト"; return; }
    $dot.className="dot ok"; $stTxt.textContent="サーバー接続完了";
    $startBtn.disabled=false;
  })();
</script>
</body>
</html>
