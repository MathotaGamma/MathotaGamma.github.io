<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPLAY — Extreme Stability</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400&display=swap');

      :root {
        --bg:       #080a0f;
        --surface:  #0e1118;
        --surface2: #151b26;
        --border:   #1e2738;
        --accent:   #00e5ff;
        --text:     #e8edf5;
        --text-dim: #5a6478;
        --text-mid: #8a94a8;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'Syne', sans-serif;
        overflow: hidden;
        user-select: none;
      }

      /* ─────────────────────────────────────────
          UPLOAD SCREEN
      ───────────────────────────────────────── */
      #upload-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 32px;
        background: var(--bg);
        z-index: 100;
        transition: opacity .4s, visibility .4s;
      }
      #upload-screen.hidden { opacity: 0; visibility: hidden; }

      .logo {
        font-size: 48px; font-weight: 800; letter-spacing: -2px;
        color: var(--accent);
        text-shadow: 0 0 40px rgba(0,229,255,.3);
      }
      .logo span { color: var(--text-dim); }

      .drop-zone {
        width: 480px; max-width: 90vw;
        border: 2px dashed var(--border);
        border-radius: 20px;
        padding: 60px 40px;
        text-align: center;
        cursor: pointer;
        transition: border-color .3s, background .3s, transform .2s;
        background: var(--surface);
        position: relative;
      }
      .drop-zone:hover, .drop-zone.drag-over {
        border-color: var(--accent);
        background: rgba(0,229,255,.03);
        transform: scale(1.01);
      }
      .drop-zone-icon { font-size: 52px; margin-bottom: 20px; display: block; filter: drop-shadow(0 0 16px rgba(0,229,255,.4)); }
      .drop-zone h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
      .drop-zone p  { color: var(--text-dim); font-size: 14px; font-family: 'JetBrains Mono', monospace; }
      .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

      /* ─────────────────────────────────────────
          LOADING SCREEN
      ───────────────────────────────────────── */
      #loading-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px;
        background: var(--bg);
        z-index: 99;
        opacity: 0; visibility: hidden;
        transition: opacity .4s, visibility .4s;
      }
      #loading-screen.visible { opacity: 1; visibility: visible; }

      .loading-label { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); letter-spacing: 4px; text-transform: uppercase; }
      .loading-filename { font-size: 18px; font-weight: 700; color: var(--text); max-width: 70vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .loading-pct { font-family: 'JetBrains Mono', monospace; font-size: 56px; font-weight: 300; color: var(--accent); line-height: 1; min-width: 5ch; text-align: right; }
      .loading-pct.done { color: #00ff9d; }

      .progress-track { width: 420px; max-width: 82vw; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
      .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #00b8ff); box-shadow: 0 0 10px var(--accent); transition: width 0.1s linear; }

      .loading-status { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); }

      /* ─────────────────────────────────────────
          PLAYER SCREEN
      ───────────────────────────────────────── */
      #player-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        background: #000;
        opacity: 0; visibility: hidden;
        transition: opacity .5s, visibility .5s;
      }
      #player-screen.visible { opacity: 1; visibility: visible; }

      .video-wrap { flex: 1; min-height: 0; position: relative; display: flex; align-items: center; justify-content: center; background: #000; cursor: none; overflow: hidden; }
      video { max-width: 100%; max-height: 100%; display: block; outline: none; }

      .cursor-dot { position: absolute; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); opacity: 0; transition: opacity 0.3s; z-index: 10; box-shadow: 0 0 8px var(--accent); }

      .center-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; width: 80px; height: 80px; border-radius: 50%; background: rgba(0,0,0,.55); border: 2px solid rgba(255,255,255,.15); font-size: 28px; pointer-events: none; opacity: 0; transition: opacity .25s; z-index: 20; }
      .center-overlay.show { opacity: 1; }

      /* ─────────────────────────────────────────
          CONTROLS
      ───────────────────────────────────────── */
      .controls { background: linear-gradient(to top, #000, rgba(0,0,0,.92)); padding: 10px 20px 16px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
      .seek-row { display: flex; align-items: center; gap: 12px; }
      .time-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-mid); white-space: nowrap; min-width: 90px; }

      .slider-wrap { position: relative; flex: 1; height: 20px; display: flex; align-items: center; cursor: pointer; }
      .slider-track { position: absolute; left: 0; right: 0; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
      .slider-fill { position: relative; height: 100%; background: linear-gradient(90deg, var(--accent), #00b8ff); border-radius: 99px; width: 0%; box-shadow: 0 0 8px rgba(0,229,255,.4); }
      .slider-thumb { position: absolute; width: 14px; height: 14px; background: #fff; border-radius: 50%; top: 50%; transform: translate(-50%, -50%); left: 0%; pointer-events: none; }

      .btn-row { display: flex; align-items: center; gap: 6px; }
      .btn { background: none; border: none; cursor: pointer; color: var(--text-mid); display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; font-size: 16px; transition: color .2s, background .2s; }
      .btn:hover  { color: var(--accent); background: rgba(0,229,255,.08); }
      .btn.primary { color: var(--text); font-size: 20px; width: 44px; height: 44px; }

      .vol-slider { width: 80px; }
      .speed-btn { font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 0 10px; width: auto; border: 1px solid var(--border); border-radius: 6px; }
      
      .speed-popup { position: absolute; bottom: calc(100% + 6px); right: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; opacity: 0; visibility: hidden; transition: 0.2s; z-index: 50; min-width: 90px; }
      .speed-popup.open { opacity: 1; visibility: visible; }
      .speed-opt { padding: 10px 16px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-mid); cursor: pointer; }
      .speed-opt:hover { background: rgba(0,229,255,.08); color: var(--accent); }
    </style>
  </head>
  <body>

    <!-- ── UPLOAD ── -->
    <div id="upload-screen">
      <div class="logo">VP<span>LAY</span></div>
      <div class="drop-zone" id="drop-zone">
        <span class="drop-zone-icon">🎬</span>
        <h2>動画ファイルをドロップ</h2>
        <p>RAMに完全展開してラグをゼロにします</p>
        <input type="file" id="file-input" accept="video/*">
      </div>
    </div>

    <!-- ── LOADING ── -->
    <div id="loading-screen">
      <div class="loading-label">Buffering into RAM</div>
      <div class="loading-filename" id="loading-filename">—</div>
      <div class="loading-pct" id="loading-pct">0%</div>
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="loading-status" id="loading-status">300MB以上の大容量ファイルを最適化中...</div>
    </div>

    <!-- ── PLAYER ── -->
    <div id="player-screen">
      <div class="video-wrap" id="video-wrap">
        <div class="cursor-dot" id="cursor-dot"></div>
        <video id="video"></video>
        <div class="center-overlay" id="center-overlay">▶</div>
      </div>

      <div class="controls">
        <div class="seek-row">
          <span class="time-label" id="time-label">0:00 / 0:00</span>
          <div class="slider-wrap" id="seek-wrap">
            <div class="slider-track"><div class="slider-fill" id="seek-fill"></div></div>
            <div class="slider-thumb" id="seek-thumb"></div>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn"         id="btn-back15">⏮</button>
          <button class="btn primary" id="btn-play">▶</button>
          <button class="btn"         id="btn-fwd15">⏭</button>
          <div style="flex:1"></div>
          <button class="btn" id="btn-mute">🔊</button>
          <div class="slider-wrap vol-slider" id="vol-wrap">
            <div class="slider-track"><div class="slider-fill" id="vol-fill"></div></div>
            <div class="slider-thumb" id="vol-thumb"></div>
          </div>
          <div style="position:relative">
            <button class="btn speed-btn" id="btn-speed">1.0x</button>
            <div class="speed-popup" id="speed-popup">
              <div class="speed-opt" data-speed="0.5">0.5x</div>
              <div class="speed-opt" data-speed="1">1.0x</div>
              <div class="speed-opt" data-speed="1.5">1.5x</div>
              <div class="speed-opt" data-speed="2.0">2.0x</div>
            </div>
          </div>
          <button class="btn speed-btn" onclick="location.reload()">📂 変更</button>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const video = document.getElementById('video');
        const fileInput = document.getElementById('file-input');
        const loadingScreen = document.getElementById('loading-screen');
        const progressBar = document.getElementById('progress-bar');
        const loadingPct = document.getElementById('loading-pct');
        let objectUrl = null;

        // --- 強制ロード (大容量対応) ---
        async function handleFile(file) {
          if (!file) return;
          if (objectUrl) URL.revokeObjectURL(objectUrl);

          document.getElementById('upload-screen').classList.add('hidden');
          loadingScreen.classList.add('visible');
          document.getElementById('loading-filename').textContent = file.name;

          try {
            const total = file.size;
            let loaded = 0;
            
            // TransformStreamを使って読み込み進捗を正確にキャッチ
            const progressStream = new TransformStream({
              transform(chunk, controller) {
                loaded += chunk.byteLength;
                const p = (loaded / total) * 100;
                progressBar.style.width = p + '%';
                loadingPct.textContent = Math.round(p) + '%';
                controller.enqueue(chunk);
              }
            });

            const response = new Response(file.stream().pipeThrough(progressStream));
            const blob = await response.blob(); 
            objectUrl = URL.createObjectURL(blob);
            video.src = objectUrl;

            video.onloadeddata = () => {
              loadingScreen.classList.remove('visible');
              document.getElementById('player-screen').classList.add('visible');
              video.play();
            };
          } catch (e) {
            alert('メモリ不足または読み込みエラーです。');
            location.reload();
          }
        }

        fileInput.onchange = e => handleFile(e.target.files[0]);

        // --- プレイヤーロジック ---
        const btnPlay = document.getElementById('btn-play');
        const togglePlay = () => {
          if (video.paused) { video.play(); btnPlay.textContent = '⏸'; flash('▶'); }
          else { video.pause(); btnPlay.textContent = '▶'; flash('⏸'); }
        };

        const flash = (txt) => {
          const ov = document.getElementById('center-overlay');
          ov.textContent = txt; ov.classList.add('show');
          setTimeout(() => ov.classList.remove('show'), 500);
        };

        btnPlay.onclick = togglePlay;
        document.getElementById('video-wrap').onclick = e => { if(e.target.id !== 'cursor-dot') togglePlay(); };
        document.getElementById('btn-fwd15').onclick = () => { video.currentTime += 15; flash('+15s'); };
        document.getElementById('btn-back15').onclick = () => { video.currentTime -= 15; flash('-15s'); };

        video.ontimeupdate = () => {
          const p = (video.currentTime / video.duration) * 100;
          document.getElementById('seek-fill').style.width = p + '%';
          document.getElementById('seek-thumb').style.left = p + '%';
          const fmt = s => Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
          document.getElementById('time-label').textContent = `${fmt(video.currentTime)} / ${fmt(video.duration)}`;
        };

        document.getElementById('seek-wrap').onmousedown = e => {
          const move = e => {
            const r = document.getElementById('seek-wrap').getBoundingClientRect();
            video.currentTime = ((e.clientX - r.left) / r.width) * video.duration;
          };
          move(e);
          window.onmousemove = move;
          window.onmouseup = () => window.onmousemove = null;
        };

        // 音量
        const setVol = (v) => {
          video.volume = Math.max(0, Math.min(1, v));
          document.getElementById('vol-fill').style.width = (video.volume * 100) + '%';
          document.getElementById('vol-thumb').style.left = (video.volume * 100) + '%';
        };
        document.getElementById('vol-wrap').onmousedown = e => {
          const move = e => setVol((e.clientX - document.getElementById('vol-wrap').getBoundingClientRect().left) / 80);
          move(e); window.onmousemove = move; window.onmouseup = () => window.onmousemove = null;
        };

        // 速度
        document.getElementById('btn-speed').onclick = () => document.getElementById('speed-popup').classList.toggle('open');
        document.querySelectorAll('.speed-opt').forEach(opt => {
          opt.onclick = () => {
            video.playbackRate = parseFloat(opt.dataset.speed);
            document.getElementById('btn-speed').textContent = opt.dataset.speed + 'x';
            document.getElementById('speed-popup').classList.remove('open');
          };
        });

        // カスタムカーソル
        const dot = document.getElementById('cursor-dot');
        document.getElementById('video-wrap').onmousemove = e => {
          const r = document.getElementById('video-wrap').getBoundingClientRect();
          dot.style.left = (e.clientX - r.left) + 'px';
          dot.style.top = (e.clientY - r.top) + 'px';
          dot.style.opacity = 1;
        };

        window.onkeydown = e => {
          if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
          if (e.code === 'ArrowRight') video.currentTime += 15;
          if (e.code === 'ArrowLeft') video.currentTime -= 15;
        };
      })();
    </script>
  </body>
</html>
